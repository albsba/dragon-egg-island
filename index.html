<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Dragon Egg Island</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      touch-action: manipulation;
    }

    * {
      touch-action: manipulation;
    }

    #canvas-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 3px solid #444;
      transform-origin: center center;
    }

    /* D-pad container */
    .dpad {
      position: fixed;
      display: none; /* hidden by default; shown via JS when touch detected */
      width: 180px;
      height: 180px;
      grid-template-columns: 60px 60px 60px;
      grid-template-rows: 60px 60px 60px;
      z-index: 100;
      touch-action: none;
    }

    .dpad.visible {
      display: grid;
    }

    #dpad-left {
      bottom: 20px;
      left: 20px;
    }

    #dpad-right {
      bottom: 20px;
      right: 20px;
    }

    .dpad-btn {
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 22px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      transition: opacity 0.08s;
      opacity: 0.75;
    }

    .dpad-btn:active, .dpad-btn.pressed {
      opacity: 1;
    }

    #dpad-left .dpad-btn {
      background: rgba(135, 206, 235, 0.55);
      color: #fff;
    }

    #dpad-right .dpad-btn {
      background: rgba(155, 89, 182, 0.55);
      color: #fff;
    }

    .dpad-up    { grid-column: 2; grid-row: 1; }
    .dpad-left  { grid-column: 1; grid-row: 2; }
    .dpad-center { grid-column: 2; grid-row: 2; display: flex; justify-content: center; align-items: center; font-size: 10px; font-weight: bold; font-family: monospace; }
    .dpad-right { grid-column: 3; grid-row: 2; }
    .dpad-down  { grid-column: 2; grid-row: 3; }

    #dpad-left .dpad-center {
      color: #87CEEB;
    }

    #dpad-right .dpad-center {
      color: #9B59B6;
    }

    /* Title screen touch buttons */
    #title-touch-btns {
      position: fixed;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      z-index: 100;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      touch-action: none;
    }

    #title-touch-btns.visible {
      display: flex;
    }

    .title-touch-btn {
      padding: 14px 40px;
      font-size: 18px;
      font-family: monospace;
      font-weight: bold;
      border: 2px solid #FFD700;
      border-radius: 10px;
      background: rgba(26, 26, 46, 0.85);
      color: #FFD700;
      cursor: pointer;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      min-width: 200px;
      text-align: center;
    }

    .title-touch-btn:active {
      background: rgba(255, 215, 0, 0.25);
    }

    /* Online room UI */
    #room-code-overlay {
      position: fixed;
      display: none;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 200;
      justify-content: center;
      align-items: center;
      background: rgba(26, 26, 46, 0.95);
      flex-direction: column;
      gap: 20px;
    }

    #room-code-overlay.visible {
      display: flex;
    }

    #room-code-overlay .room-label {
      color: #FFD700;
      font-family: monospace;
      font-size: 22px;
      font-weight: bold;
      text-align: center;
    }

    #room-code-overlay .room-sublabel {
      color: #aaa;
      font-family: monospace;
      font-size: 14px;
      text-align: center;
    }

    #room-code-input {
      width: 200px;
      padding: 16px;
      font-size: 36px;
      font-family: monospace;
      font-weight: bold;
      text-align: center;
      background: #2a2a4e;
      color: #FFD700;
      border: 3px solid #FFD700;
      border-radius: 12px;
      outline: none;
      letter-spacing: 12px;
      -webkit-appearance: none;
    }

    #room-code-input::placeholder {
      color: #555;
      letter-spacing: 4px;
      font-size: 20px;
    }

    .room-btn {
      padding: 14px 40px;
      font-size: 18px;
      font-family: monospace;
      font-weight: bold;
      border: 2px solid #FFD700;
      border-radius: 10px;
      background: rgba(26, 26, 46, 0.85);
      color: #FFD700;
      cursor: pointer;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      min-width: 200px;
      text-align: center;
    }

    .room-btn:active {
      background: rgba(255, 215, 0, 0.25);
    }

    .room-btn.back-btn {
      border-color: #888;
      color: #888;
      font-size: 14px;
      min-width: 120px;
      padding: 10px 24px;
      margin-top: 10px;
    }

    .room-status {
      color: #4CAF50;
      font-family: monospace;
      font-size: 16px;
      text-align: center;
    }

    .room-status.waiting {
      color: #aaa;
    }

    .room-status.error {
      color: #e74c3c;
    }

    .room-code-display {
      color: #FFD700;
      font-family: monospace;
      font-size: 64px;
      font-weight: bold;
      letter-spacing: 16px;
      text-align: center;
    }

    .connection-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }

    .connection-dot.green { background: #4CAF50; }
    .connection-dot.yellow { background: #FFC107; }
    .connection-dot.red { background: #e74c3c; }

    .super-btn {
      position: fixed;
      bottom: 200px;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      z-index: 20;
      border: 3px solid #FFD700;
      background: rgba(255, 215, 0, 0.2);
      color: #FFD700;
      font-family: monospace;
      font-weight: bold;
      font-size: 13px;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      opacity: 0.5;
    }

    #super-btn-left { left: 30px; }
    #super-btn-right { right: 30px; }

    .super-btn.ready {
      opacity: 1;
      background: rgba(255, 215, 0, 0.4);
      animation: superPulse 1s ease-in-out infinite;
    }

    @keyframes superPulse {
      0%   { transform: scale(1);   box-shadow: 0 0 10px rgba(255, 215, 0, 0.3); }
      50%  { transform: scale(1.1); box-shadow: 0 0 25px rgba(255, 215, 0, 0.6); }
      100% { transform: scale(1);   box-shadow: 0 0 10px rgba(255, 215, 0, 0.3); }
    }
  </style>
</head>
<body>
  <div id="canvas-wrapper">
    <canvas id="game" width="800" height="600"></canvas>
  </div>

  <!-- Left d-pad: Harper (Arrow keys) -->
  <div id="dpad-left" class="dpad">
    <button class="dpad-btn dpad-up"    data-key="ArrowUp">▲</button>
    <button class="dpad-btn dpad-left"  data-key="ArrowLeft">◄</button>
    <div class="dpad-center">Harper</div>
    <button class="dpad-btn dpad-right" data-key="ArrowRight">►</button>
    <button class="dpad-btn dpad-down"  data-key="ArrowDown">▼</button>
  </div>

  <!-- Right d-pad: Audrey (WASD keys) -->
  <div id="dpad-right" class="dpad">
    <button class="dpad-btn dpad-up"    data-key="w">▲</button>
    <button class="dpad-btn dpad-left"  data-key="a">◄</button>
    <div class="dpad-center">Audrey</div>
    <button class="dpad-btn dpad-right" data-key="d">►</button>
    <button class="dpad-btn dpad-down"  data-key="s">▼</button>
  </div>

  <!-- Title screen touch buttons (only visible on title screen + touch) -->
  <div id="title-touch-btns">
    <!-- Step: mode -->
    <button class="title-touch-btn" id="btn-1p">1 Player</button>
    <button class="title-touch-btn" id="btn-2p-local">2 Players - Same iPad</button>
    <button class="title-touch-btn" id="btn-2p-online">2 Players - 2 iPads</button>
    <!-- Step: character -->
    <button class="title-touch-btn" id="btn-harper" style="display:none;">Harper</button>
    <button class="title-touch-btn" id="btn-audrey" style="display:none;">Audrey</button>
    <!-- Step: gametype -->
    <button class="title-touch-btn" id="btn-adventure" style="display:none;">Adventure</button>
    <button class="title-touch-btn" id="btn-freeplay" style="display:none;">Free Play</button>
    <button class="title-touch-btn" id="btn-battle" style="display:none;">Dragon Battle</button>
    <!-- Step: online -->
    <button class="title-touch-btn" id="btn-create-room" style="display:none;">Create Room</button>
    <button class="title-touch-btn" id="btn-join-room" style="display:none;">Join Room</button>
  </div>

  <!-- Room code overlay (for hosting/joining) -->
  <div id="room-code-overlay">
    <!-- Content is set dynamically by JS -->
  </div>

  <!-- Super buttons -->
  <button id="super-btn-left" class="super-btn" style="display:none;">SUPER!</button>
  <button id="super-btn-right" class="super-btn" style="display:none;">SUPER!</button>

  <!-- Dragon select touch controls -->
  <div id="dragon-select-touch" style="display:none; position: fixed; bottom: 30px; left: 0; right: 0; z-index: 20; text-align: center;">
    <button id="dragon-prev" style="padding: 14px 28px; font-size: 22px; font-family: monospace; font-weight: bold; border: 2px solid #FFD700; border-radius: 10px; background: rgba(26,26,46,0.85); color: #FFD700; cursor: pointer; margin: 0 10px; touch-action: none; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none;">&#9664;</button>
    <button id="dragon-confirm" style="padding: 14px 36px; font-size: 18px; font-family: monospace; font-weight: bold; border: 2px solid #FFD700; border-radius: 10px; background: rgba(26,26,46,0.85); color: #FFD700; cursor: pointer; margin: 0 10px; touch-action: none; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none;">Select!</button>
    <button id="dragon-next" style="padding: 14px 28px; font-size: 22px; font-family: monospace; font-weight: bold; border: 2px solid #FFD700; border-radius: 10px; background: rgba(26,26,46,0.85); color: #FFD700; cursor: pointer; margin: 0 10px; touch-action: none; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none;">&#9654;</button>
  </div>

    function drawSprite(sprite, x, y, size) {
      const rows = sprite.length;
      const cols = sprite[0].length;
      const px = size / Math.max(rows, cols);
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (sprite[r][c]) {
            ctx.fillStyle = sprite[r][c];
            ctx.fillRect(x + c * px, y + r * px, Math.ceil(px), Math.ceil(px));
          }
        }
      }
    }

        ['',color1,color1,shine,color1,color1,color1,''],
        [color2,color1,color1,color1,color1,color1,color1,color2],
        [color2,color2,color1,color1,color1,color1,color2,color2],
        ['',color2,color2,color1,color1,color2,color2,''],

    function getPlayerInput(up, down, left, right) {
      let dx = 0, dy = 0;
      if (keys[up]) dy = -1;

      if (keys[left]) dx = -1;
      if (keys[right]) dx = 1;
      return { dx, dy };

    function drawTile(type, col, row) {
      const x = col * TILE;
      const y = (row + UI_ROWS) * TILE;
      const color = TILE_COLORS[type];

      if (type === 'flower_r' || type === 'flower_y' || type === 'flower_p') {
        // grass background
        ctx.fillStyle = TILE_COLORS['grass'];
        ctx.fillRect(x, y, TILE, TILE);
        // small colored circle
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(x + TILE / 2, y + TILE / 2, TILE * 0.28, 0, Math.PI * 2);
        ctx.fill();
        // white center
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(x + TILE / 2, y + TILE / 2, TILE * 0.1, 0, Math.PI * 2);
        ctx.fill();
      } else if (type === 'bush') {
        // grass background
        ctx.fillStyle = TILE_COLORS['grass'];
        ctx.fillRect(x, y, TILE, TILE);
        // green circle
        ctx.fillStyle = TILE_COLORS['bush'];
        ctx.beginPath();
        ctx.arc(x + TILE / 2, y + TILE * 0.6, TILE * 0.32, 0, Math.PI * 2);
        ctx.fill();
      } else if (type === 'mushroom') {
        // grass bg
        ctx.fillStyle = TILE_COLORS['grass'];
        ctx.fillRect(x, y, TILE, TILE);
        // brown stem
        ctx.fillStyle = '#8B4513';
        ctx.fillRect(x + TILE * 0.4, y + TILE * 0.55, TILE * 0.2, TILE * 0.35);
        // purple semicircle cap
        ctx.fillStyle = TILE_COLORS['mushroom'];
        ctx.beginPath();
        ctx.arc(x + TILE / 2, y + TILE * 0.55, TILE * 0.3, Math.PI, 0);
        ctx.fill();
        // white dot
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(x + TILE / 2, y + TILE * 0.42, TILE * 0.07, 0, Math.PI * 2);
        ctx.fill();
      } else if (type === 'moss') {
        ctx.fillStyle = TILE_COLORS['moss'];
        ctx.fillRect(x, y, TILE, TILE);
      } else if (type === 'crystal') {
        // cave_floor bg
        ctx.fillStyle = TILE_COLORS['cave_floor'];
        ctx.fillRect(x, y, TILE, TILE);
        // diamond shape
        ctx.fillStyle = TILE_COLORS['crystal'];
        ctx.beginPath();
        ctx.moveTo(x + TILE / 2, y + TILE * 0.15);
        ctx.lineTo(x + TILE * 0.75, y + TILE / 2);
        ctx.lineTo(x + TILE / 2, y + TILE * 0.85);
        ctx.lineTo(x + TILE * 0.25, y + TILE / 2);
        ctx.closePath();
        ctx.fill();
        // white shine dot
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(x + TILE * 0.4, y + TILE * 0.35, TILE * 0.06, 0, Math.PI * 2);
        ctx.fill();
      } else if (type === 'gem_blue' || type === 'gem_pink') {
        // cave_floor bg
        ctx.fillStyle = TILE_COLORS['cave_floor'];
        ctx.fillRect(x, y, TILE, TILE);
        // small colored circle
        ctx.fillStyle = TILE_COLORS[type];
        ctx.beginPath();
        ctx.arc(x + TILE / 2, y + TILE / 2, TILE * 0.2, 0, Math.PI * 2);
        ctx.fill();
        // white shine
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(x + TILE * 0.45, y + TILE * 0.4, TILE * 0.06, 0, Math.PI * 2);
        ctx.fill();
      } else if (type === 'lava' || type === 'lava2') {
        // Animated lava pulse - varies green channel for flickering glow
        const pulse = Math.sin(state.time * 3 + col * 0.5 + row * 0.3) * 0.15;
        const baseColor = type === 'lava' ? [255, 111, 0] : [230, 81, 0];
        const g = Math.max(0, Math.min(255, baseColor[1] + Math.floor(pulse * 255)));
        ctx.fillStyle = 'rgb(' + baseColor[0] + ',' + g + ',' + baseColor[2] + ')';
        ctx.fillRect(x, y, TILE, TILE);
      } else if (type === 'ember') {
        // ash bg
        ctx.fillStyle = TILE_COLORS['ash'];
        ctx.fillRect(x, y, TILE, TILE);
        // small orange-red dot
        ctx.fillStyle = TILE_COLORS['ember'];
        ctx.beginPath();
        ctx.arc(x + TILE / 2, y + TILE / 2, TILE * 0.12, 0, Math.PI * 2);
        ctx.fill();
      } else if (type === 'rainbow_water') {
        // Animated rainbow shimmer - cycles hue based on time and position
        const hue = ((state.time * 50) + col * 20 + row * 20) % 360;
        ctx.fillStyle = 'hsl(' + hue + ', 70%, 60%)';
        ctx.fillRect(x, y, TILE, TILE);
      } else if (type === 'rainbow_flower') {
        // rainbow_grass bg
        ctx.fillStyle = TILE_COLORS['rainbow_grass'];
        ctx.fillRect(x, y, TILE, TILE);
        // color-cycling flower
        const flowerHue = ((state.time * 80) + col * 30 + row * 30) % 360;
        ctx.fillStyle = 'hsl(' + flowerHue + ', 80%, 65%)';
        ctx.beginPath();
        ctx.arc(x + TILE / 2, y + TILE / 2, TILE * 0.28, 0, Math.PI * 2);
        ctx.fill();
        // white center
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(x + TILE / 2, y + TILE / 2, TILE * 0.1, 0, Math.PI * 2);
        ctx.fill();
      } else if (type === 'sparkle_tile') {
        // rainbow_grass bg
        ctx.fillStyle = TILE_COLORS['rainbow_grass'];
        ctx.fillRect(x, y, TILE, TILE);
        // pulsing white dot
        const sparkleAlpha = Math.sin(state.time * 4 + col + row) * 0.4 + 0.6;
        ctx.fillStyle = 'rgba(255, 255, 255, ' + sparkleAlpha + ')';
        ctx.beginPath();
        ctx.arc(x + TILE / 2, y + TILE / 2, TILE * 0.15, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.fillStyle = color || '#000';
        ctx.fillRect(x, y, TILE, TILE);
      }
    }

    function drawZone(zone) {
      for (let row = 0; row < MAP_ROWS; row++) {
        for (let col = 0; col < COLS; col++) {
          drawTile(zone.map[row][col], col, row);
        }
      }
    }

    function drawPlayers() {
      for (const p of getActivePlayers()) {
        drawSprite(p.sprite, p.x * TILE, (p.y + UI_ROWS) * TILE, TILE);

        if (p.name === 'Harper') {
          const sx = p.x * TILE + TILE - 6;
          const sy = (p.y + UI_ROWS) * TILE + 2;
          const twinkle = Math.sin(state.time * 3) * 0.3 + 0.7;
          ctx.fillStyle = `rgba(255, 255, 255, ${twinkle})`;
          ctx.font = '8px serif';
          ctx.textAlign = 'left';
          ctx.fillText('\u2744', sx, sy + 8);
        }

        if (p.name === 'Audrey') {
          const sx = p.x * TILE + TILE - 6;
          const sy = (p.y + UI_ROWS) * TILE + 2;
          const twinkle = Math.sin(state.time * 4) * 0.3 + 0.7;
          ctx.fillStyle = `rgba(200, 150, 255, ${twinkle})`;
          ctx.font = '8px serif';
          ctx.textAlign = 'left';
          ctx.fillText('\u2726', sx, sy + 8);
        }
      }
    }

    function drawEggs() {
      for (const egg of state.eggs) {
        const bob = Math.sin(state.time * 2 + egg.bobOffset) * 3;
        const px = egg.x * TILE + 4;
        const py = (egg.y + UI_ROWS) * TILE + bob;

        // Glow effect
        const glowAlpha = 0.3 + Math.sin(state.time * 3 + egg.bobOffset) * 0.15;
        ctx.fillStyle = `rgba(255, 255, 200, ${glowAlpha})`;
        ctx.beginPath();
        ctx.arc(egg.x * TILE + TILE / 2, (egg.y + UI_ROWS) * TILE + TILE / 2 + bob, TILE / 2, 0, Math.PI * 2);
        ctx.fill();

        drawSprite(EGG_SPRITES[egg.type], px, py, TILE * 0.75);
      }
    }

    function drawDragons() {
      for (let i = 0; i < state.dragons.length; i++) {
        const d = state.dragons[i];
        const bounce = Math.sin(state.time * 4 + i * 0.8) * 2;
        drawSprite(
          DRAGON_SPRITES[d.type],
          d.x * TILE + 6,
          (d.y + UI_ROWS) * TILE + bounce + 4,
          TILE * 0.6
        );
      }
    }

    function drawUI() {
      // Background bar
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, CANVAS_W, UI_ROWS * TILE);

      // Zone name
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 14px monospace';

      // Dragon collection icons
      const allTypes = ['fire', 'nature', 'love', 'shadow', 'star', 'ice', 'rainbow'];
      const startX = 10;
      const y = 34;

      for (let i = 0; i < allTypes.length; i++) {
        const type = allTypes[i];
        const count = state.collection[type] || 0;
        const x = startX + i * 80;

        if (count > 0) {
          drawSprite(DRAGON_SPRITES[type], x, y - 6, 20);
          ctx.fillStyle = '#fff';
          ctx.font = '12px monospace';
          ctx.textAlign = 'left';
          ctx.fillText('x' + count, x + 24, y + 8);
        } else {
          ctx.fillStyle = '#444';
          ctx.fillRect(x, y - 4, 16, 16);
          ctx.fillStyle = '#555';
          ctx.font = '12px monospace';
          ctx.textAlign = 'left';
          ctx.fillText('?', x + 4, y + 8);
        }

      if (state.playerMode === '2p-online') {
        ctx.fillStyle = players[0].color;

        const p2Label = state.isGuest ? 'You' : 'Online';
        ctx.fillText(players[1].name + ' (' + p2Label + ')', CANVAS_W - 10, 34);

      if (state.mode === 'adventure') {

        const unlockOrder = [

          { zone: 'enchanted', count: 8 },
          { zone: 'crystal', count: 12 },
          { zone: 'snowy', count: 16 },
          { zone: 'volcano', count: 20 },
          { zone: 'rainbow', count: 25 },
        ];
        ctx.textAlign = 'center';
        ctx.fillStyle = '#aaa';
        ctx.font = '11px monospace';
        let nextUnlock = null;
        for (const u of unlockOrder) {
          if (!state.unlockedZones.includes(u.zone)) {
            nextUnlock = u;
            break;
          }

        if (nextUnlock) {
          ctx.fillText('Collect ' + totalCollected + '/' + nextUnlock.count + ' eggs to unlock ' + ZONES[nextUnlock.zone].name, CANVAS_W / 2, CANVAS_H - 8);
        } else {
          ctx.fillText('All zones unlocked! Explore everywhere!', CANVAS_W / 2, CANVAS_H - 8);
        }
      }

      // Divider line
      ctx.strokeStyle = '#444';
      ctx.beginPath();
      ctx.moveTo(0, UI_ROWS * TILE);
      ctx.lineTo(CANVAS_W, UI_ROWS * TILE);
      ctx.stroke();

    function drawUnlockEffect() {
      if (!state.unlockEffect) return;
      const t = state.unlockEffect.timer;
      const alpha = Math.max(0, 1 - t / 2);

      for (let i = 0; i < 15; i++) {
        const x = (8 + i) * TILE + Math.sin(t * 5 + i) * 5;
        const y = (MAP_ROWS - 1 + UI_ROWS) * TILE + Math.cos(t * 4 + i * 0.5) * 10;
        ctx.fillStyle = `rgba(255, 255, 100, ${alpha * (0.5 + Math.sin(t * 8 + i) * 0.5)})`;
        ctx.fillRect(x - 2, y - 2, 4, 4);

      if (t < 1.5) {
        ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
        ctx.font = 'bold 18px monospace';
        ctx.textAlign = 'center';
        const unlockedName = ZONES[state.unlockEffect.zone] ? ZONES[state.unlockEffect.zone].name : 'New Zone';

      if (roomRef && state.isHost) {
        roomRef.remove();
      } else if (roomRef && state.isGuest) {
        roomRef.child('guest').remove();
      }
      roomRef = null;
      state.isHost = false;
      state.isGuest = false;
      state.roomCode = null;
      state.onlineStatus = null;
      state.guestConnected = false;
      state.hostConnected = false;
    }

    // Guest input received by host
    let remoteGuestInput = { dx: 0, dy: 0, battleX: -1, superPressed: false };

    function createRoom() {
      initFirebase();
      state.roomCode = generateRoomCode();
      state.isHost = true;
      state.onlineStatus = 'waiting';

      roomRef = firebaseDb.ref('rooms/' + state.roomCode);

      // Write host entry
      roomRef.child('host').set({ connected: true });
      roomRef.child('host').onDisconnect().remove();
      roomRef.child('input/guest').set({ dx: 0, dy: 0 });

      // Listen for guest connection
      guestConnectionListener = roomRef.child('guest/connected').on('value', function(snap) {
        if (snap.val() === true) {
          state.guestConnected = true;
          if (state.onlineStatus === 'waiting') {
            state.onlineStatus = 'connected';
            // Move to gametype selection
            hideRoomOverlay();
            state.titleStep = 'gametype';
            state.titleSelection = 0;
            updateTitleTouchUI();
          }
        } else {
          if (state.guestConnected && state.screen === 'playing') {
            state.guestConnected = false;
            state.onlineStatus = 'disconnected';
          }
        }
      });

      // Listen for guest input
      guestInputListener = roomRef.child('input/guest').on('value', function(snap) {
        const val = snap.val();
        if (val) {
          remoteGuestInput.dx = val.dx || 0;
          remoteGuestInput.dy = val.dy || 0;
          remoteGuestInput.battleX = (val.bx != null) ? val.bx : -1;
          if (val.sp) {
            remoteGuestInput.superPressed = true;
          }
        }
      });

      showRoomOverlayHost();
    }

    function joinRoom(code) {
      initFirebase();
      state.roomCode = code;
      state.isGuest = true;
      state.onlineStatus = 'joining';

      roomRef = firebaseDb.ref('rooms/' + code);

      // Check if room exists
      roomRef.child('host/connected').once('value', function(snap) {
        if (!snap.val()) {
          state.onlineStatus = null;
          state.isGuest = false;
          roomRef = null;
          showRoomOverlayJoinError('Room not found');
          return;
        }

        // Write guest entry
        roomRef.child('guest').set({ connected: true });
        roomRef.child('guest').onDisconnect().remove();

        state.onlineStatus = 'connected';
        state.hostConnected = true;

        // Listen for host disconnect
        hostConnectionListener = roomRef.child('host/connected').on('value', function(hSnap) {
          if (hSnap.val() !== true && state.hostConnected) {
            state.hostConnected = false;
            state.onlineStatus = 'disconnected';
            // Return to title if host left
            if (state.screen === 'playing') {
              cleanupFirebase();
              returnToTitle();
            }
          }
        });

        // Listen for game state (this is the main sync channel)
        gameStateListener = roomRef.child('gameState').on('value', function(gsSnap) {
          const gs = gsSnap.val();
          if (!gs) return;

          if (gs.started && state.screen === 'title') {
            // Game has started, switch to the correct screen
            state.playerMode = '2p-online';
            state.activePlayerCount = 2;
            state.activePlayer = null;
            hideRoomOverlay();
            // The screen will be set by applyRemoteGameState via gs.scr
            if (gs.scr) {
              state.screen = gs.scr;
            } else {
              state.screen = 'playing';
            }
            updateTitleTouchUI();
          }

          if (gs.started) {
            applyRemoteGameState(gs);
          }
        });

        showRoomOverlayGuestConnected();
      });
    }

    function compressGameState() {
      const syncData = {
        p: [
          { x: players[0].x, y: players[0].y },
          { x: players[1].x, y: players[1].y }
        ],
        z: state.currentZone,
        e: state.eggs.map(function(egg) {
          return { t: egg.type, x: egg.x, y: egg.y, b: egg.bobOffset };
        }),
        d: state.dragons.map(function(d) {
          return { t: d.type, fp: d.followPlayer, x: d.x, y: d.y };
        }),
        h: state.hatching.map(function(h) {
          return { t: h.type, x: h.x, y: h.y, tm: h.timer, ph: h.phase };
        }),
        c: state.collection,
        ul: state.unlockedZones,
        ue: state.unlockEffect ? { tm: state.unlockEffect.timer, zone: state.unlockEffect.zone } : null,
        m: state.mode,
        t: state.time,
        started: true
      };

      // Include screen so guest knows what mode we're in
      syncData.scr = state.screen;

      if (state.screen === 'battle' || state.screen === 'dragonSelect') {
        syncData.bat = {
          w: state.battle.wave,
          ws: state.battle.waveState,
          wt: state.battle.waveTimer,
          pd: state.battle.playerDragons,
          dsi: state.dragonSelectIndex,
          dsp: state.dragonSelectPlayer,
          bp: state.battle.battlePlayers.map(function(bp) {
            return {
              x: Math.round(bp.x), h: bp.hearts, sm: Math.round(bp.superMeter),
              a: bp.alive, rt: bp.respawnTimer, it: bp.invTimer,
              sh: bp.shieldActive, sb: bp.speedBoost,
            };
          }),
          en: state.battle.enemies.map(function(e) {
            return {
              tp: e.type, x: Math.round(e.x), y: Math.round(e.y),
              hp: e.hp, mhp: e.maxHp, c: e.curing, ct: e.cureTimer,
            };
          }),
          sh: state.battle.shots.slice(0, 30).map(function(s) {
            return {
              x: Math.round(s.x), y: Math.round(s.y),
              c: s.color, ie: !!s.isEnemy,
            };
          }),
          dr: state.battle.drops.map(function(d) {
            return {
              tp: d.type, x: Math.round(d.x), y: Math.round(d.y),
              c: d.color, sy: d.symbol,
            };
          }),
          ef: state.battle.effects.slice(0, 10).map(function(e) {
            return {
              tp: e.type, x: Math.round(e.x), y: Math.round(e.y),
              t: e.timer, mt: e.maxTimer,
            };
          }),
        };
      }

      return syncData;
    }

    function applyRemoteGameState(gs) {
      if (gs.p && gs.p[0]) {
        players[0].x = gs.p[0].x;
        players[0].y = gs.p[0].y;
      }
      if (gs.p && gs.p[1]) {
        players[1].x = gs.p[1].x;
        players[1].y = gs.p[1].y;
      }
      if (gs.z) state.currentZone = gs.z;
      if (gs.e) {
        state.eggs = gs.e.map(function(e) {
          return { type: e.t, x: e.x, y: e.y, bobOffset: e.b };
        });
      } else {
        state.eggs = [];
      }
      if (gs.d) {
        state.dragons = gs.d.map(function(d) {
          return { type: d.t, followPlayer: d.fp, x: d.x, y: d.y };
        });
      } else {
        state.dragons = [];
      }
      if (gs.h) {
        state.hatching = gs.h.map(function(h) {
          return { type: h.t, x: h.x, y: h.y, timer: h.tm, phase: h.ph };
        });
      } else {
        state.hatching = [];
      }
      if (gs.c) state.collection = gs.c;
      if (gs.ul) state.unlockedZones = gs.ul;
      if (gs.ue) {
        state.unlockEffect = { timer: gs.ue.tm, zone: gs.ue.zone };
      } else {
        state.unlockEffect = null;
      }
      if (gs.m) state.mode = gs.m;
      if (gs.t != null) state.time = gs.t;

      // Screen sync (battle / dragonSelect / playing)
      if (gs.scr) {
        state.screen = gs.scr;
      }

      // Battle state sync
      if (gs.bat) {
        const bat = gs.bat;
        state.battle.wave = bat.w;
        state.battle.waveState = bat.ws;
        state.battle.waveTimer = bat.wt;
        state.battle.playerDragons = bat.pd;
        state.dragonSelectIndex = bat.dsi;
        state.dragonSelectPlayer = bat.dsp;

        // Update battle players
        if (bat.bp) {
          bat.bp.forEach(function(bp, i) {
            const local = state.battle.battlePlayers[i];
            if (!local) return;
            local.x = bp.x; local.hearts = bp.h; local.superMeter = bp.sm;
            local.alive = bp.a; local.respawnTimer = bp.rt; local.invTimer = bp.it;
            local.shieldActive = bp.sh; local.speedBoost = bp.sb;
          });
        }

        // Replace enemies from host
        if (bat.en) {
          state.battle.enemies = bat.en.map(function(e) {
            return {
              type: e.tp, x: e.x, y: e.y, hp: e.hp, maxHp: e.mhp,
              curing: e.c, cureTimer: e.ct, timer: 0,
              size: ENEMY_TYPES[e.tp] ? ENEMY_TYPES[e.tp].size : 20,
              color: ENEMY_TYPES[e.tp] ? ENEMY_TYPES[e.tp].color : '#888',
              pattern: ENEMY_TYPES[e.tp] ? ENEMY_TYPES[e.tp].pattern : 'straight',
            };
          });
        } else {
          state.battle.enemies = [];
        }

        // Replace shots from host
        if (bat.sh) {
          state.battle.shots = bat.sh.map(function(s) {
            return { x: s.x, y: s.y, vx: 0, vy: 0, color: s.c, isEnemy: s.ie };
          });
        } else {
          state.battle.shots = [];
        }

        // Replace drops from host
        if (bat.dr) {
          state.battle.drops = bat.dr.map(function(d) {
            return { type: d.tp, x: d.x, y: d.y, vy: 0, color: d.c, symbol: d.sy };
          });
        } else {
          state.battle.drops = [];
        }

        // Replace effects from host
        if (bat.ef) {
          state.battle.effects = bat.ef.map(function(e) {
            return { type: e.tp, x: e.x, y: e.y, timer: e.t, maxTimer: e.mt };
          });
        } else {
          state.battle.effects = [];
        }
      }
    }

    function syncToFirebase() {
      if (!roomRef || !state.isHost) return;
      roomRef.child('gameState').set(compressGameState());
    }

    function sendGuestInput(dx, dy, battleX, superPressed) {
      if (!roomRef || !state.isGuest) return;
      const data = { dx: dx, dy: dy };
      if (battleX != null) data.bx = battleX;
      if (superPressed) data.sp = true;
      roomRef.child('input/guest').set(data);
    }

    function startHostSync() {
      if (syncInterval) clearInterval(syncInterval);
      syncInterval = setInterval(syncToFirebase, 66); // ~15 fps
    }

    // ---- Room overlay UI helpers ----

    function showRoomOverlayHost() {

        '<button class="room-btn back-btn" id="btn-room-back">Back</button>';

        hideRoomOverlay();

      titleTouchBtns.classList.remove('visible');
    }

    function showRoomOverlayJoin() {

        '<button class="room-btn" id="btn-room-connect">Join</button>' +

    function showRoomOverlayJoinError(msg) {

    function showRoomOverlayGuestConnected() {

    function hideRoomOverlay() {
      const overlay = document.getElementById('room-code-overlay');
      overlay.classList.remove('visible');
      overlay.innerHTML = '';
    }

    function returnToTitle() {
      state.screen = 'title';
      state.titleStep = 'mode';
      state.titleSelection = 0;
      state.isHost = false;
      state.isGuest = false;
      state.playerMode = null;
      hideRoomOverlay();
      updateTitleTouchUI();
    }

    // Cleanup on page close
    window.addEventListener('beforeunload', function() {
      cleanupFirebase();
    });

    // ============================================================
    // GAME LOGIC
    // ============================================================
    const MOVE_DELAY = 0.12;

    function spawnEggsForZone(zoneKey) {
      state.eggs = [];
      const zone = ZONES[zoneKey];
      const eggTypes = zone.eggs;

      const candidates = [];
      for (let r = 2; r < MAP_ROWS - 2; r++) {
        for (let c = 2; c < COLS - 2; c++) {
          const tile = zone.map[r][c];
          if (tile === 'grass' || tile === 'grass2' || tile === 'cave_floor' || tile === 'snow' || tile === 'snow2' || tile === 'ash' || tile === 'rainbow_grass') {
            candidates.push({ x: c, y: r });
          }
        }
      }

      // Shuffle
      for (let i = candidates.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
      }

      const count = state.mode === 'freeplay' ? 8 : 5;
      for (let i = 0; i < Math.min(count, candidates.length); i++) {
        const type = eggTypes[Math.floor(Math.random() * eggTypes.length)];
        state.eggs.push({
          type: type,
          x: candidates[i].x,
          y: candidates[i].y,
          bobOffset: Math.random() * Math.PI * 2,
        });
      }
    }

    function checkZoneTransition() {
      for (const conn of ZONE_CONNECTIONS) {
        if (state.currentZone !== conn.from) continue;
        if (conn.unlockRequired && !state.unlockedZones.includes(conn.to)) continue;

        for (const p of getActivePlayers()) {
          const atEdge =
            (conn.edge === 'bottom' && p.y >= MAP_ROWS - 1) ||
            (conn.edge === 'top' && p.y <= 0);

          if (atEdge) {
            const tile = ZONES[conn.from].map[p.y][p.x];
            if (tile === 'path') {
              transitionToZone(conn.to, conn.edge);
              return;
            }
          }
        }
      }
    }

    function transitionToZone(zoneKey, fromEdge) {
      state.currentZone = zoneKey;
      for (const p of getActivePlayers()) {
        if (fromEdge === 'bottom') {
          p.y = 1;
        } else {
          p.y = MAP_ROWS - 2;
        }
      }
      state.particles = [];
      spawnEggsForZone(zoneKey);
    }

    function checkEggCollection() {
      for (let i = state.eggs.length - 1; i >= 0; i--) {
        const egg = state.eggs[i];
        for (const p of getActivePlayers()) {
          if (p.x === egg.x && p.y === egg.y) {
            state.hatching.push({
              type: egg.type,
              x: egg.x,
              y: egg.y,
              timer: 0,
              phase: 'wobble',
            });
            state.eggs.splice(i, 1);
            break;
          }
        }
      }
    }

    function updateDragons(dt) {
      for (let i = 0; i < state.dragons.length; i++) {
        const d = state.dragons[i];
        // In 1p mode, all dragons follow the single active player
        const leaderPlayerIndex = state.activePlayerCount === 1 ? state.activePlayer : d.followPlayer;
        const leader = i === 0
          ? players[leaderPlayerIndex]
          : (state.dragons[i - 1].followPlayer === leaderPlayerIndex ? state.dragons[i - 1] : players[leaderPlayerIndex]);

        const dx = leader.x - d.x;
        const dy = leader.y - d.y;
        const dist = Math.abs(dx) + Math.abs(dy);

        if (dist > 1.5) {
          d.x += Math.sign(dx) * dt * 5;
          d.y += Math.sign(dy) * dt * 5;
        }
      }
    }

    function checkUnlocks() {
      if (state.mode !== 'adventure') return;

      const totalCollected = Object.values(state.collection).reduce((a, b) => a + b, 0);

      const unlockThresholds = [
        { zone: 'heart', count: 5 },
        { zone: 'enchanted', count: 8 },
        { zone: 'crystal', count: 12 },
        { zone: 'snowy', count: 16 },
        { zone: 'volcano', count: 20 },
        { zone: 'rainbow', count: 25 },
      ];

      for (const u of unlockThresholds) {
        if (totalCollected >= u.count && !state.unlockedZones.includes(u.zone)) {
          state.unlockedZones.push(u.zone);
          state.unlockEffect = { timer: 0, zone: u.zone };
        }
      }
    }

    function updateUnlockEffect(dt) {
      if (!state.unlockEffect) return;
      state.unlockEffect.timer += dt;
      if (state.unlockEffect.timer > 2) {
        state.unlockEffect = null;
      }
    }

    function updateHatching(dt) {
      for (let i = state.hatching.length - 1; i >= 0; i--) {
        const h = state.hatching[i];
        h.timer += dt;

        if (h.phase === 'wobble' && h.timer > 0.5) {
          h.phase = 'crack';
          h.timer = 0;
        } else if (h.phase === 'crack' && h.timer > 0.4) {
          h.phase = 'hatch';
          h.timer = 0;
        } else if (h.phase === 'hatch' && h.timer > 0.6) {
          state.collection[h.type] = (state.collection[h.type] || 0) + 1;

          const followPlayer = state.activePlayerCount === 1 ? state.activePlayer : state.dragons.length % 2;
          state.dragons.push({
            type: h.type,
            followPlayer: followPlayer,
            x: players[followPlayer].x,
            y: players[followPlayer].y,
          });

          checkUnlocks();

          state.hatching.splice(i, 1);

          // Respawn in freeplay
          if (state.mode === 'freeplay' && state.eggs.length < 3) {
            spawnEggsForZone(state.currentZone);
          }
        }
      }
    }

    function drawHatching() {
      for (const h of state.hatching) {
        const px = h.x * TILE;
        const py = (h.y + UI_ROWS) * TILE;

        if (h.phase === 'wobble') {
          const wobble = Math.sin(h.timer * 20) * 3;
          drawSprite(EGG_SPRITES[h.type], px + 4 + wobble, py, TILE * 0.75);
        } else if (h.phase === 'crack') {
          drawSprite(EGG_SPRITES[h.type], px + 4, py, TILE * 0.75);
          ctx.strokeStyle = '#333';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(px + TILE / 2, py + 4);
          ctx.lineTo(px + TILE / 2 + 4, py + TILE / 2);
          ctx.lineTo(px + TILE / 2 - 2, py + TILE - 4);
          ctx.stroke();
        } else if (h.phase === 'hatch') {
          const sparkleCount = 6;
          for (let s = 0; s < sparkleCount; s++) {
            const angle = (s / sparkleCount) * Math.PI * 2 + h.timer * 5;
            const dist = h.timer * 30;
            const sx = px + TILE / 2 + Math.cos(angle) * dist;
            const sy = py + TILE / 2 + Math.sin(angle) * dist;
            const alpha = 1 - h.timer / 0.6;
            ctx.fillStyle = `rgba(255, 255, 100, ${alpha})`;
            ctx.fillRect(sx - 2, sy - 2, 4, 4);
          }
          const scale = h.timer / 0.6;
          drawSprite(DRAGON_SPRITES[h.type], px + 6, py + 4, TILE * 0.6 * scale);
        }
      }
    }

    function isSolid(zoneKey, col, row) {
      const zone = ZONES[zoneKey];
      if (col < 0 || col >= COLS || row < 0 || row >= MAP_ROWS) return true;
      const tile = zone.map[row][col];
      return SOLID_TILES.includes(tile);
    }

    function getActivePlayers() {
      if (state.activePlayerCount === 1) {
        return [players[state.activePlayer]];
      }
      return players;
    }

    function isOccupiedByOtherPlayer(playerIndex, col, row) {
      if (state.activePlayerCount === 1) return false;
      for (let i = 0; i < players.length; i++) {
        if (i !== playerIndex && players[i].x === col && players[i].y === row) return true;
      }
      return false;
    }

    function updatePlayers(dt) {
      const activePlayers = getActivePlayers();
      for (let ai = 0; ai < activePlayers.length; ai++) {
        const p = activePlayers[ai];
        // Find the real player index for isOccupiedByOtherPlayer
        const pi = players.indexOf(p);
        p.moveTimer -= dt;
        if (p.moveTimer > 0) continue;

        // For online mode: host uses local input for player 0, remote input for player 1
        let input;
        if (state.isHost && pi === 1) {
          // Use guest's remote input
          input = { dx: remoteGuestInput.dx, dy: remoteGuestInput.dy };
        } else {
          input = getPlayerInput(p.keys.up, p.keys.down, p.keys.left, p.keys.right);
        }
        if (input.dx === 0 && input.dy === 0) continue;

        let nx = p.x + input.dx;
        let ny = p.y + input.dy;

        if (!isSolid(state.currentZone, nx, ny) && !isOccupiedByOtherPlayer(pi, nx, ny)) {
          p.x = nx;
          p.y = ny;
          p.moveTimer = MOVE_DELAY;
        } else if (input.dx !== 0 && !isSolid(state.currentZone, p.x + input.dx, p.y) && !isOccupiedByOtherPlayer(pi, p.x + input.dx, p.y)) {
          p.x += input.dx;
          p.moveTimer = MOVE_DELAY;
        } else if (input.dy !== 0 && !isSolid(state.currentZone, p.x, p.y + input.dy) && !isOccupiedByOtherPlayer(pi, p.x, p.y + input.dy)) {
          p.y += input.dy;
          p.moveTimer = MOVE_DELAY;
        }
      }
    }

    // ============================================================
    // TITLE SCREEN
    // ============================================================
    function drawTitleScreen() {
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

      // Stars

    function updateTitleScreen() {
      if (state.titleStep === 'mode') {
        if (keys['ArrowUp'] || keys['w']) {
          state.titleSelection = Math.max(0, state.titleSelection - 1);
          keys['ArrowUp'] = false; keys['w'] = false;
        }
        if (keys['ArrowDown'] || keys['s']) {
          state.titleSelection = Math.min(2, state.titleSelection + 1);
          keys['ArrowDown'] = false; keys['s'] = false;
        }
        if (keys['Enter'] || keys[' '] || keys['ArrowRight']) {
          keys['Enter'] = false; keys[' '] = false; keys['ArrowRight'] = false;
          if (state.titleSelection === 0) {
            state.playerMode = '1p';
            state.titleStep = 'character';
            state.titleSelection = 0;
          } else if (state.titleSelection === 1) {
            state.playerMode = '2p-local';
            state.titleStep = 'gametype';
            state.titleSelection = 0;
          } else if (state.titleSelection === 2) {
            state.playerMode = '2p-online';
            state.titleStep = 'online';
            state.titleSelection = 0;
          }
          updateTitleTouchUI();
        }

      } else if (state.titleStep === 'online') {
        if (keys['ArrowUp'] || keys['w']) {
          state.titleSelection = 0;
          keys['ArrowUp'] = false; keys['w'] = false;
        }
        if (keys['ArrowDown'] || keys['s']) {
          state.titleSelection = 1;
          keys['ArrowDown'] = false; keys['s'] = false;
        }
        if (keys['Escape'] || keys['ArrowLeft']) {
          state.titleStep = 'mode';
          state.titleSelection = 2;
          keys['Escape'] = false; keys['ArrowLeft'] = false;
          updateTitleTouchUI();
        }
        if (keys['Enter'] || keys[' ']) {
          keys['Enter'] = false; keys[' '] = false;
          if (state.titleSelection === 0) {
            createRoom();
          } else {
            showRoomOverlayJoin();
          }
        }

      } else if (state.titleStep === 'character') {
        if (keys['ArrowLeft'] || keys['a']) {
          state.titleSelection = 0;
          keys['ArrowLeft'] = false; keys['a'] = false;
        }
        if (keys['ArrowRight'] || keys['d']) {
          state.titleSelection = 1;
          keys['ArrowRight'] = false; keys['d'] = false;
        }
        if (keys['Escape'] || keys['ArrowUp'] || keys['w']) {
          state.titleStep = 'mode';
          state.titleSelection = 0;
          keys['Escape'] = false; keys['ArrowUp'] = false; keys['w'] = false;
          updateTitleTouchUI();
        }
        if (keys['Enter'] || keys[' ']) {
          keys['Enter'] = false; keys[' '] = false;
          state.selectedChar = state.titleSelection === 0 ? 'harper' : 'audrey';
          state.titleStep = 'gametype';
          state.titleSelection = 0;
          updateTitleTouchUI();
        }

      } else if (state.titleStep === 'gametype') {
        if (keys['ArrowUp'] || keys['w']) {
          state.titleSelection = Math.max(0, state.titleSelection - 1);
          keys['ArrowUp'] = false; keys['w'] = false;
        }
        if (keys['ArrowDown'] || keys['s']) {
          state.titleSelection = Math.min(2, state.titleSelection + 1);
          keys['ArrowDown'] = false; keys['s'] = false;
        }
        if (keys['Escape'] || keys['ArrowLeft']) {
          if (state.playerMode === '1p') {
            state.titleStep = 'character';
          } else if (state.playerMode === '2p-online') {
            // Don't go back from gametype if online and connected
            // (host picks mode after guest joins)
            state.titleStep = 'mode';
            cleanupFirebase();
          } else {
            state.titleStep = 'mode';
          }
          state.titleSelection = 0;
          keys['Escape'] = false; keys['ArrowLeft'] = false;
          updateTitleTouchUI();
        }
        if (keys['Enter'] || keys[' ']) {
          keys['Enter'] = false; keys[' '] = false;
          if (state.titleSelection === 2) {
            // Dragon Battle
            state.screen = 'dragonSelect';
            state.dragonSelectPlayer = 0;
            state.dragonSelectIndex = 0;
            if (state.isHost) { startHostSync(); syncToFirebase(); }
            updateTitleTouchUI();
          } else {
            startGame(state.titleSelection === 0 ? 'adventure' : 'freeplay');
            updateTitleTouchUI();
          }
        }
      }
    }

    function startGame(mode) {
      state.screen = 'playing';
      state.mode = mode;
      state.currentZone = 'meadow';
      state.collection = {};
      state.dragons = [];
      state.eggs = [];
      state.particles = [];
      state.hatching = [];
      state.unlockEffect = null;

      if (mode === 'freeplay') {
        state.unlockedZones = ['meadow', 'heart', 'enchanted', 'crystal', 'snowy', 'volcano', 'rainbow'];
      } else {
        state.unlockedZones = ['meadow'];
      }

      if (state.playerMode === '1p') {
        state.activePlayerCount = 1;
        if (state.selectedChar === 'harper') {
          state.activePlayer = 0;
          players[0].x = 12;
          players[0].y = 7;
        } else {
          state.activePlayer = 1;
          players[1].x = 12;
          players[1].y = 7;
        }
      } else {
        state.activePlayerCount = 2;
        state.activePlayer = null;
        players[0].x = 11;
        players[0].y = 7;
        players[1].x = 13;
        players[1].y = 7;
      }

      spawnEggsForZone('meadow');

      // Start online sync if host
      if (state.isHost) {
        startHostSync();
        // Send initial state so guest can start
        syncToFirebase();
      }
    }

    function spawnParticle(zoneKey) {
      const p = {
        x: Math.random() * CANVAS_W,
        y: Math.random() * CANVAS_H,
        vx: (Math.random() - 0.5) * 20,
        vy: -Math.random() * 15 - 5,
        life: Math.random() * 3 + 2,
        maxLife: 0,
        size: Math.random() * 3 + 2,
        type: zoneKey,
      };
      p.maxLife = p.life;

      if (zoneKey === 'meadow') {
        p.vy = Math.random() * 10 + 5;
        p.vx = (Math.random() - 0.5) * 30;
        p.color = ['#e74c3c', '#f1c40f', '#e84393', '#fff'][Math.floor(Math.random() * 4)];
      } else if (zoneKey === 'heart') {
        p.vy = -(Math.random() * 10 + 5);
        p.vx = (Math.random() - 0.5) * 15;
        p.color = '#ff69b4';
        p.isHeart = true;
      } else if (zoneKey === 'enchanted') {
        p.vy = Math.random() * 8 + 3;
        p.vx = (Math.random() - 0.5) * 20;
        p.color = ['#1a5c14', '#E040FB', '#558B2F', '#90EE90'][Math.floor(Math.random() * 4)];
      } else if (zoneKey === 'crystal') {
        p.vy = -(Math.random() * 5 + 2);
        p.vx = (Math.random() - 0.5) * 10;
        p.color = ['#E1BEE7', '#64B5F6', '#F48FB1', '#fff'][Math.floor(Math.random() * 4)];
      } else if (zoneKey === 'snowy') {
        p.vy = Math.random() * 15 + 5;
        p.vx = (Math.random() - 0.5) * 25;
        p.color = '#fff';
      } else if (zoneKey === 'volcano') {
        p.vy = -(Math.random() * 20 + 10);
        p.vx = (Math.random() - 0.5) * 20;
        p.color = ['#FF6F00', '#E65100', '#BF360C', '#FFD700'][Math.floor(Math.random() * 4)];
      } else if (zoneKey === 'rainbow') {
        p.vy = -(Math.random() * 10 + 5);
        p.vx = (Math.random() - 0.5) * 20;
        const rainbowHue = Math.floor(Math.random() * 360);
        p.color = 'hsl(' + rainbowHue + ', 80%, 65%)';
      }

      state.particles.push(p);
    }

    function updateParticles(dt) {
      if (state.particles.length < MAX_PARTICLES && Math.random() < 0.1) {
        spawnParticle(state.currentZone);
      }

      for (let i = state.particles.length - 1; i >= 0; i--) {
        const p = state.particles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.life -= dt;

        if (p.life <= 0 || p.y < 0 || p.y > CANVAS_H || p.x < 0 || p.x > CANVAS_W) {
          state.particles.splice(i, 1);
        }
      }
    }

    function drawParticles() {
      for (const p of state.particles) {
        const alpha = Math.min(1, p.life / (p.maxLife * 0.3));
        ctx.globalAlpha = alpha * 0.6;

        if (p.isHeart) {
          ctx.fillStyle = p.color;
          ctx.font = (p.size * 3) + 'px serif';
          ctx.textAlign = 'left';
          ctx.fillText('\u2665', p.x, p.y);
        } else {
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      ctx.globalAlpha = 1;
    }

    function scaleCanvas() {
      const scaleX = window.innerWidth  / CANVAS_W;
      const scaleY = window.innerHeight / CANVAS_H;
      const scale  = Math.min(scaleX, scaleY);
      canvas.style.transform = `scale(${scale})`;

    // ============================================================
    // TOUCH SUPPORT
    // ============================================================
    const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

    // D-pad visibility is managed by updateTitleTouchUI()

    // Wire each d-pad button: touchstart sets key true, touchend sets false.
    // We attach listeners to each button individually so multi-touch works.
    document.querySelectorAll('.dpad-btn').forEach(function(btn) {
      const key = btn.getAttribute('data-key');

      btn.addEventListener('touchstart', function(e) {
        e.preventDefault();
        keys[key] = true;
        btn.classList.add('pressed');
      }, { passive: false });

      btn.addEventListener('touchend', function(e) {
        e.preventDefault();
        keys[key] = false;
        btn.classList.remove('pressed');
      }, { passive: false });

      btn.addEventListener('touchcancel', function(e) {
        e.preventDefault();
        keys[key] = false;
        btn.classList.remove('pressed');
      }, { passive: false });
    });

    // ---- Battle touch drag controls ----
    const touchDrag = {
      left: { active: false, id: -1, startX: 0, currentX: 0 },
      right: { active: false, id: -1, startX: 0, currentX: 0 },
    };
    let guestSuperPressed = false;
    let battleDragHintTimer = 3;

    document.addEventListener('touchstart', function(e) {
      if (state.screen !== 'battle') return;

      for (let ti = 0; ti < e.changedTouches.length; ti++) {
        const touch = e.changedTouches[ti];
        // Don't capture touches on super buttons
        const target = document.elementFromPoint(touch.clientX, touch.clientY);
        if (target && (target.id === 'super-btn-left' || target.id === 'super-btn-right')) continue;

        const screenMid = window.innerWidth / 2;

        if (state.activePlayerCount === 1) {
          // Single player: whole screen controls their dragon
          const side = state.activePlayer === 0 ? 'left' : 'right';
          touchDrag[side] = { active: true, id: touch.identifier, startX: touch.clientX, currentX: touch.clientX };
        } else {
          // Two player (local or online guest sends separately):
          if (touch.clientX < screenMid) {
            touchDrag.left = { active: true, id: touch.identifier, startX: touch.clientX, currentX: touch.clientX };
          } else {
            touchDrag.right = { active: true, id: touch.identifier, startX: touch.clientX, currentX: touch.clientX };
          }
        }
      }
    }, { passive: true });

    document.addEventListener('touchmove', function(e) {
      if (state.screen !== 'battle') return;

      for (let ti = 0; ti < e.changedTouches.length; ti++) {
        const touch = e.changedTouches[ti];
        if (touchDrag.left.active && touchDrag.left.id === touch.identifier) {
          touchDrag.left.currentX = touch.clientX;
        }
        if (touchDrag.right.active && touchDrag.right.id === touch.identifier) {
          touchDrag.right.currentX = touch.clientX;
        }
      }
    }, { passive: true });

    document.addEventListener('touchend', function(e) {
      for (let ti = 0; ti < e.changedTouches.length; ti++) {
        const touch = e.changedTouches[ti];
        if (touchDrag.left.active && touchDrag.left.id === touch.identifier) {
          touchDrag.left.active = false;
        }
        if (touchDrag.right.active && touchDrag.right.id === touch.identifier) {
          touchDrag.right.active = false;
        }
      }
    });

    document.addEventListener('touchcancel', function(e) {
      for (let ti = 0; ti < e.changedTouches.length; ti++) {
        const touch = e.changedTouches[ti];
        if (touchDrag.left.active && touchDrag.left.id === touch.identifier) {
          touchDrag.left.active = false;
        }
        if (touchDrag.right.active && touchDrag.right.id === touch.identifier) {
          touchDrag.right.active = false;
        }
      }
    });

    // Title screen touch buttons
    const titleTouchBtns = document.getElementById('title-touch-btns');

    // IDs for each step's buttons
    const TITLE_STEP_BTNS = {
      mode:      ['btn-1p', 'btn-2p-local', 'btn-2p-online'],
      character: ['btn-harper', 'btn-audrey'],
      gametype:  ['btn-adventure', 'btn-freeplay', 'btn-battle'],
      online:    ['btn-create-room', 'btn-join-room'],
    };

    function updateTitleTouchUI() {
      const dpadLeft  = document.getElementById('dpad-left');
      const dpadRight = document.getElementById('dpad-right');

      if (state.screen === 'title') {
        titleTouchBtns.classList.add('visible');
        dpadLeft.classList.remove('visible');
        dpadRight.classList.remove('visible');

        // Show only the buttons for the current step
        const allStepBtns = [].concat(
          TITLE_STEP_BTNS.mode,
          TITLE_STEP_BTNS.character,
          TITLE_STEP_BTNS.gametype
        );
        allStepBtns.forEach(function(id) {
          const el = document.getElementById(id);
          if (el) el.style.display = 'none';
        });
        const currentBtns = TITLE_STEP_BTNS[state.titleStep] || [];
        currentBtns.forEach(function(id) {
          const el = document.getElementById(id);
          if (el) el.style.display = '';
        });
      } else {
        titleTouchBtns.classList.remove('visible');
        // Hide d-pads on dragon select screen (uses its own controls)
        if (state.screen === 'dragonSelect') {
          dpadLeft.classList.remove('visible');
          dpadRight.classList.remove('visible');
          return;
        }
        // Show appropriate d-pad(s) for playing screen (hide for battle - uses drag)
        if (!isTouchDevice) return;
        if (state.screen === 'battle') {
          // Battle uses drag controls, not d-pads
          dpadLeft.classList.remove('visible');
          dpadRight.classList.remove('visible');
          return;
        }
        if (state.screen !== 'playing') {
          dpadLeft.classList.remove('visible');
          dpadRight.classList.remove('visible');
          return;
        }
        if (state.playerMode === '2p-online') {
          // Online: host gets left d-pad (Harper), guest gets right d-pad (Audrey)
          if (state.isHost) {
            dpadLeft.classList.add('visible');
            dpadRight.classList.remove('visible');
          } else if (state.isGuest) {
            dpadLeft.classList.remove('visible');
            dpadRight.classList.add('visible');
          }
        } else if (state.activePlayerCount === 1) {
          if (state.activePlayer === 0) {
            dpadLeft.classList.add('visible');
            dpadRight.classList.remove('visible');
          } else {
            dpadLeft.classList.remove('visible');
            dpadRight.classList.add('visible');
          }
        } else {
          dpadLeft.classList.add('visible');
          dpadRight.classList.add('visible');
        }
      }
    }

    // ---- Touch button wiring ----

    function titleTouchBtn(id, handler) {
      const el = document.getElementById(id);
      if (!el) return;
      el.addEventListener('touchstart', function(e) {
        e.preventDefault();
        handler();
      }, { passive: false });
      el.addEventListener('click', handler);
    }

    titleTouchBtn('btn-1p', function() {
      state.playerMode = '1p';
      state.titleStep = 'character';

    titleTouchBtn('btn-2p-local', function() {

    titleTouchBtn('btn-harper', function() {

    titleTouchBtn('btn-audrey', function() {

    titleTouchBtn('btn-2p-online', function() {

    titleTouchBtn('btn-battle', function() {
