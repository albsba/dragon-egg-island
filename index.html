    // ============================================================
    // DRAGON SELECT SCREEN
    // ============================================================
    const DRAGON_KEYS = Object.keys(DRAGON_CONFIGS); // ['fire','ice','nature','love','shadow','star','rainbow']

    function drawDragonSelect() {
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

      // Stars background
      for (let i = 0; i < 50; i++) {
        const sx = (Math.sin(i * 127.1) * 0.5 + 0.5) * CANVAS_W;
        const sy = (Math.cos(i * 311.7) * 0.5 + 0.5) * CANVAS_H;
        const twinkle = Math.sin(state.time * 2 + i) * 0.5 + 0.5;
        ctx.fillStyle = 'rgba(255, 255, 255, ' + (twinkle * 0.5) + ')';
        ctx.fillRect(sx, sy, 2, 2);
      }

      // Title
      const selectingPlayer = state.dragonSelectPlayer;
      const playerName = selectingPlayer === 0 ? players[0].name : players[1].name;
      ctx.fillStyle = '#FFD700';
      ctx.font = 'bold 24px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(playerName + ', choose your dragon!', CANVAS_W / 2, 60);

      // Dragon row
      const totalDragons = DRAGON_KEYS.length;
      const spacing = 100;
      const startX = CANVAS_W / 2 - ((totalDragons - 1) * spacing) / 2;

      for (let i = 0; i < totalDragons; i++) {
        const key = DRAGON_KEYS[i];
        const cfg = DRAGON_CONFIGS[key];
        const dx = startX + i * spacing;
        const dy = 120;

        // Highlight box on selected
        if (i === state.dragonSelectIndex) {
          ctx.strokeStyle = '#FFD700';
          ctx.lineWidth = 3;
          ctx.strokeRect(dx - 24, dy - 8, 48, 56);
        }

        // Dragon sprite
        drawSprite(DRAGON_SPRITES[key], dx - 16, dy, 32);

        // Name underneath
        ctx.fillStyle = i === state.dragonSelectIndex ? '#FFD700' : '#888';
        ctx.font = '10px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(key.charAt(0).toUpperCase() + key.slice(1), dx, dy + 52);
      }

      // Large preview of selected dragon
      const selKey = DRAGON_KEYS[state.dragonSelectIndex];
      const selCfg = DRAGON_CONFIGS[selKey];

      drawSprite(DRAGON_SPRITES[selKey], CANVAS_W / 2 - 48, 220, 96);

      // Dragon info
      ctx.fillStyle = selCfg.color;
      ctx.font = 'bold 22px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(selCfg.name, CANVAS_W / 2, 350);

      ctx.fillStyle = '#ccc';
      ctx.font = '14px monospace';
      ctx.fillText('Shot: ' + selCfg.shotType, CANVAS_W / 2, 380);
      ctx.fillText('Super: ' + selCfg.superName, CANVAS_W / 2, 402);

      // Show player 1's choice if player 2 is selecting
      const selectDragons = state.dragonSelectMode === 'flight' ? state.flight.playerDragons : state.dragonSelectMode === 'snake' ? state.snake.playerDragons : state.battle.playerDragons;
      if (state.dragonSelectPlayer === 1 && selectDragons[0] !== null) {
        const p1Key = selectDragons[0];
        const p1Cfg = DRAGON_CONFIGS[p1Key];
        ctx.fillStyle = '#888';
        ctx.font = '13px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(players[0].name + ' chose: ' + p1Cfg.name, CANVAS_W / 2, 440);
        drawSprite(DRAGON_SPRITES[p1Key], CANVAS_W / 2 - 16, 455, 32);
      }

      // Controls hint
      ctx.fillStyle = '#555';
      ctx.font = '11px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('Left/Right to browse  |  Enter/Space to select', CANVAS_W / 2, CANVAS_H - 30);
    }

    function updateDragonSelect() {
      const totalDragons = DRAGON_KEYS.length;

      if (keys['ArrowLeft'] || keys['a']) {
        state.dragonSelectIndex = (state.dragonSelectIndex - 1 + totalDragons) % totalDragons;
        keys['ArrowLeft'] = false; keys['a'] = false;
      }
      if (keys['ArrowRight'] || keys['d']) {
        state.dragonSelectIndex = (state.dragonSelectIndex + 1) % totalDragons;
        keys['ArrowRight'] = false; keys['d'] = false;
      }
      if (keys['Enter'] || keys[' ']) {
        keys['Enter'] = false; keys[' '] = false;
        const chosenDragon = DRAGON_KEYS[state.dragonSelectIndex];
        if (state.dragonSelectMode === 'flight') {
          state.flight.playerDragons[state.dragonSelectPlayer] = chosenDragon;
        } else if (state.dragonSelectMode === 'snake') {
          state.snake.playerDragons[state.dragonSelectPlayer] = chosenDragon;
        } else {
          state.battle.playerDragons[state.dragonSelectPlayer] = chosenDragon;
        }

        if (state.dragonSelectPlayer === 0 && state.activePlayerCount === 2) {
          // Advance to player 2
          state.dragonSelectPlayer = 1;
          state.dragonSelectIndex = 0;
        } else {
          // Start the appropriate mode
          if (state.dragonSelectMode === 'flight') {
            startFlight();
          } else if (state.dragonSelectMode === 'snake') {
            startSnake();
          } else {
            startBattle();
          }
        }
      }
      if (keys['Escape']) {
        keys['Escape'] = false;
        if (state.dragonSelectPlayer === 1) {
          // Go back to player 1 selection
          state.dragonSelectPlayer = 0;
          if (state.dragonSelectMode === 'flight') {
            state.flight.playerDragons[0] = null;
          } else if (state.dragonSelectMode === 'snake') {
            state.snake.playerDragons[0] = null;
          } else {
            state.battle.playerDragons[0] = null;
          }
          state.dragonSelectIndex = 0;
        } else {
          // Go back to title gametype step
          state.screen = 'title';
          state.titleStep = 'gametype';
          state.titleSelection = state.dragonSelectMode === 'flight' ? 3 : state.dragonSelectMode === 'snake' ? 4 : 2;
          updateTitleTouchUI();
        }
      }

      updateDragonSelectTouch();
    }

    function startFlight() {
      state.screen = 'flight';
      state.flight.scrollSpeed = 100;
      state.flight.distance = 0;
      state.flight.score = 0;
      state.flight.obstacles = [];
      state.flight.eggs = [];
      state.flight.spawnTimer = 2;
      state.flight.eggSpawnTimer = 1;
      state.flight.players[0] = { y: CANVAS_H / 2 - 40, vy: 0, stunTimer: 0, shieldTimer: 0 };
      state.flight.players[1] = { y: CANVAS_H / 2 + 40, vy: 0, stunTimer: 0, shieldTimer: 0 };

      updateDragonSelectTouch();
      updateTitleTouchUI();
    }

    function spawnFlightObstacle() {
      const minGap = Math.max(120, 220 - state.flight.distance * 0.01);
      const gapHeight = minGap + Math.random() * 40;
      const gapY = gapHeight / 2 + 40 + Math.random() * (CANVAS_H - gapHeight - 80);
      const types = ['rock', 'ice', 'lava', 'tree'];

      state.flight.obstacles.push({
        x: CANVAS_W + 20,
        gapY: gapY,
        gapHeight: gapHeight,
        type: types[Math.floor(Math.random() * types.length)],
        scored: false,
      });
    }

    function updateFlightPlayers(dt) {
      const activePlayers = getActivePlayers();
      for (let i = 0; i < activePlayers.length; i++) {
        const p = activePlayers[i];
        const pi = state.activePlayerCount === 1 ? state.activePlayer : i;
        const fp = state.flight.players[pi];

        if (fp.stunTimer > 0) {
          fp.stunTimer -= dt;
          continue;
        }

        const input = getPlayerInput(p.keys.up, p.keys.down, p.keys.left, p.keys.right);

        // Gravity + input
        fp.vy += 80 * dt; // gentle gravity
        if (input.dy < 0) fp.vy = -180; // up
        if (input.dy > 0) fp.vy = 180; // down

        fp.y += fp.vy * dt;
        fp.y = Math.max(30, Math.min(CANVAS_H - 30, fp.y));

        // Dampen velocity
        fp.vy *= 0.95;
      }
    }

    function checkFlightCollisions() {
      const playerX = 100; // fixed X position on screen

      for (let i = 0; i < state.activePlayerCount; i++) {
        const pi = state.activePlayerCount === 1 ? state.activePlayer : i;
        const fp = state.flight.players[pi];
        if (fp.stunTimer > 0 || fp.shieldTimer > 0) continue;

        for (const obs of state.flight.obstacles) {
          if (Math.abs(obs.x - playerX) > 25) continue;

          const inGap = fp.y > obs.gapY - obs.gapHeight / 2 + 10 &&
                        fp.y < obs.gapY + obs.gapHeight / 2 - 10;
          if (!inGap) {
            fp.stunTimer = 1;
            fp.vy = 0;
            sfxPlayerHit();
            break;
          }
        }

        // Score for passing obstacles
        for (const obs of state.flight.obstacles) {
          if (!obs.scored && obs.x < playerX - 20) {
            obs.scored = true;
            state.flight.score += 10;
          }
        }
      }
    }

    function checkFlightEggs() {
      const playerX = 100;
      for (let i = state.flight.eggs.length - 1; i >= 0; i--) {
        const egg = state.flight.eggs[i];
        for (let pi2 = 0; pi2 < state.activePlayerCount; pi2++) {
          const idx = state.activePlayerCount === 1 ? state.activePlayer : pi2;
          const fp = state.flight.players[idx];
          if (Math.abs(egg.x - playerX) < 20 && Math.abs(egg.y - fp.y) < 20) {
            state.flight.score += 25;
            sfxCollect();
            state.flight.eggs.splice(i, 1);
            break;
          }
        }
      }
    }

    function updateFlight(dt) {
      // Increase speed gradually
      state.flight.scrollSpeed = Math.min(300, 100 + state.flight.distance * 0.005);
      state.flight.distance += state.flight.scrollSpeed * dt;

      // Spawn obstacles
      state.flight.spawnTimer -= dt;
      var spawnInterval = Math.max(1.5, 2.5 - state.flight.distance * 0.0003);
      if (state.flight.spawnTimer <= 0) {
        spawnFlightObstacle();
        state.flight.spawnTimer = spawnInterval;
      }

      // Spawn eggs
      state.flight.eggSpawnTimer -= dt;
      if (state.flight.eggSpawnTimer <= 0) {
        state.flight.eggSpawnTimer = 1.5 + Math.random();
        var eggTypes = ['fire','nature','love','ice','star','shadow','ghost','thorn'];
        state.flight.eggs.push({
          x: CANVAS_W + 20,
          y: 50 + Math.random() * (CANVAS_H - 100),
          type: eggTypes[Math.floor(Math.random() * eggTypes.length)],
        });
      }

      // Scroll obstacles and eggs
      for (var oi = 0; oi < state.flight.obstacles.length; oi++) {
        state.flight.obstacles[oi].x -= state.flight.scrollSpeed * dt;
      }
      for (var ei = 0; ei < state.flight.eggs.length; ei++) {
        state.flight.eggs[ei].x -= state.flight.scrollSpeed * dt;
      }

      // Remove off-screen
      state.flight.obstacles = state.flight.obstacles.filter(function(o) { return o.x > -50; });
      state.flight.eggs = state.flight.eggs.filter(function(e) { return e.x > -20; });

      // Decrement shield timers
      for (var si = 0; si < state.flight.players.length; si++) {
        if (state.flight.players[si].shieldTimer > 0) state.flight.players[si].shieldTimer -= dt;
      }

      updateFlightPlayers(dt);
      checkFlightCollisions();
      checkFlightEggs();
    }

    function drawFlightBackground() {
      // Sky gradient
      ctx.fillStyle = '#1a1a3e';
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

      // Far mountains (parallax slow)
      var farOffset = (state.flight.distance * 0.2) % 300;
      ctx.fillStyle = '#2a2a4e';
      for (var i = -1; i < 4; i++) {
        var bx = i * 300 - farOffset;
        ctx.beginPath();
        ctx.moveTo(bx, CANVAS_H);
        ctx.lineTo(bx + 150, CANVAS_H - 200 - Math.sin(i * 2.3) * 50);
        ctx.lineTo(bx + 300, CANVAS_H);
        ctx.fill();
      }

      // Mid clouds
      var midOffset = (state.flight.distance * 0.5) % 200;
      ctx.fillStyle = 'rgba(255,255,255,0.05)';
      for (var j = -1; j < 6; j++) {
        var cx = j * 200 - midOffset;
        var cy = 80 + Math.sin(j * 1.7) * 40;
        ctx.beginPath();
        ctx.arc(cx, cy, 30, 0, Math.PI * 2);
        ctx.arc(cx + 25, cy - 10, 25, 0, Math.PI * 2);
        ctx.arc(cx + 50, cy, 28, 0, Math.PI * 2);
        ctx.fill();
      }

      // Ground
      var nearOffset = state.flight.distance % 60;
      ctx.fillStyle = '#1a3a1e';
      ctx.fillRect(0, CANVAS_H - 20, CANVAS_W, 20);
      // Ground details
      ctx.fillStyle = '#2a4a2e';
      for (var k = -1; k < 15; k++) {
        var gx = k * 60 - nearOffset;
        ctx.fillRect(gx, CANVAS_H - 20, 3, -8 - Math.sin(k * 1.1) * 5);
      }
    }

    function drawFlightObstacles() {
      var colors = { rock: '#666', ice: '#81D4FA', lava: '#FF6F00', tree: '#2d7a1e' };

      for (var i = 0; i < state.flight.obstacles.length; i++) {
        var obs = state.flight.obstacles[i];
        var color = colors[obs.type] || '#666';
        ctx.fillStyle = color;

        // Top block
        ctx.fillRect(obs.x - 20, 0, 40, obs.gapY - obs.gapHeight / 2);
        // Bottom block
        ctx.fillRect(obs.x - 20, obs.gapY + obs.gapHeight / 2, 40, CANVAS_H - obs.gapY - obs.gapHeight / 2);

        // Edge detail
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.fillRect(obs.x - 20, obs.gapY - obs.gapHeight / 2 - 5, 40, 5);
        ctx.fillRect(obs.x - 20, obs.gapY + obs.gapHeight / 2, 40, 5);
      }
    }

    function drawFlightPlayers() {
      var playerX = 100;
      for (var i = 0; i < state.activePlayerCount; i++) {
        var pi = state.activePlayerCount === 1 ? state.activePlayer : i;
        var fp = state.flight.players[pi];
        var dragonKey = state.flight.playerDragons[pi];

        if (fp.stunTimer > 0 && Math.floor(state.time * 10) % 2 === 0) continue; // flash

        // Draw dragon
        if (dragonKey && DRAGON_SPRITES[dragonKey]) {
          drawSprite(DRAGON_SPRITES[dragonKey], playerX - 18, fp.y - 12, 36);
        }

        // Shield effect
        if (fp.shieldTimer > 0) {
          ctx.strokeStyle = 'rgba(105, 240, 174, 0.5)';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(playerX, fp.y, 22, 0, Math.PI * 2);
          ctx.stroke();
        }

        // Stun stars
        if (fp.stunTimer > 0) {
          ctx.fillStyle = '#FFD700';
          ctx.font = '12px monospace';
          for (var s = 0; s < 3; s++) {
            var angle = state.time * 5 + s * 2.1;
            var sx = playerX + Math.cos(angle) * 18;
            var sy = fp.y - 16 + Math.sin(angle) * 8;
            ctx.fillText('\u2605', sx - 4, sy);
          }
        }
      }
    }

    function drawFlightHUD() {
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 16px monospace';
      ctx.textAlign = 'left';
      ctx.fillText('Score: ' + state.flight.score, 10, 25);

      ctx.textAlign = 'right';

    // ============================================================
    // BATTLE LOGIC
    // ============================================================

    function updateBattlePlayers(dt) {
      const bp = state.battle.battlePlayers;

      // Decrement bonus enemy cooldown
      if (state.battle.bonusEnemyCooldown > 0) state.battle.bonusEnemyCooldown -= dt;

      // Check if host should consume guest super press
      if (state.isHost && remoteGuestInput.swapPressed) {
        remoteGuestInput.swapPressed = false;
        swapDragon(1);
      }
      if (state.isHost && remoteGuestInput.superPressed) {
        remoteGuestInput.superPressed = false;
        if (state.activePlayerCount >= 2) {
          activateSuper(1);
        }
      }

      for (let i = 0; i < state.activePlayerCount; i++) {
        const pi = state.activePlayerCount === 1 ? state.activePlayer : i;
        const b = bp[i];

        if (!b.alive) {
          b.respawnTimer -= dt;

          // Allow dragon selection during respawn timer
          b.respawnSelecting = true;
          const p = players[pi];
          const respawnInput = getPlayerInput(p.keys.up, p.keys.down, p.keys.left, p.keys.right);
          if (respawnInput.dx !== 0 && !b.respawnInputCooldown) {
            const dragonKeys = Object.keys(DRAGON_CONFIGS);
            const currentIdx = dragonKeys.indexOf(state.battle.playerDragons[i]);
            const newIdx = ((currentIdx >= 0 ? currentIdx : 0) + respawnInput.dx + dragonKeys.length) % dragonKeys.length;
            state.battle.playerDragons[i] = dragonKeys[newIdx];
            b.respawnInputCooldown = 0.15;
          }
          if (b.respawnInputCooldown > 0) b.respawnInputCooldown -= dt;

          if (b.respawnTimer <= 0) {
            b.alive = true;
            b.hearts = MAX_HEARTS;
            b.invTimer = INVINCIBLE_TIME;
            b.respawnSelecting = false;
            b.x = CANVAS_W / 2 + (i === 0 ? -60 : 60);
          }
          continue;
        }

        if (b.invTimer > 0) b.invTimer -= dt;
        if (b.speedBoost > 0) b.speedBoost -= dt;

        // Decrement new power-up timers
        const powerUpTimers = ['tripleShot', 'giantShot', 'rapidFire', 'magnet', 'timeSlow', 'starShield', 'giantDragon', 'clone', 'rainbowTrail'];
        for (const t of powerUpTimers) {
          if (b[t] > 0) b[t] -= dt;
        }
        if (state.battle.friendBeam > 0) state.battle.friendBeam -= dt;

        // Rainbow trail: add trail points
        if (b.rainbowTrail > 0) {
          b.trailPoints.push({ x: b.x, y: BATTLE_PLAYER_Y, timer: 1.0 });
          if (b.trailPoints.length > 30) b.trailPoints.shift();
        }
        // Decrement trail point timers
        for (let tp = b.trailPoints.length - 1; tp >= 0; tp--) {
          b.trailPoints[tp].timer -= dt;
          if (b.trailPoints[tp].timer <= 0) b.trailPoints.splice(tp, 1);
        }

        let dx = 0;
        const dragSide = (pi === 0) ? 'left' : 'right';

        // For online mode: host uses remote input for player 1 (battle slot 1 = Audrey/guest)
        if (state.isHost && i === 1) {
          // Guest sent their finger X position mapped to canvas coords
          if (remoteGuestInput.battleX >= 0) {
            b.x = Math.max(20, Math.min(CANVAS_W - 20, remoteGuestInput.battleX));
          } else {
            // Fall back to d-pad dx from guest
            dx = remoteGuestInput.dx;
          }
        } else if (touchDrag[dragSide].active) {
          // Touch drag: dragon follows finger X position mapped to canvas coords
          const canvasRect = canvas.getBoundingClientRect();
          const canvasScale = CANVAS_W / (canvasRect.width || CANVAS_W);
          const canvasX = (touchDrag[dragSide].currentX - canvasRect.left) * canvasScale;
          b.x = Math.max(20, Math.min(CANVAS_W - 20, canvasX));
        } else {
          // Fall back to keyboard input
          const p = players[pi];
          const input = getPlayerInput(p.keys.up, p.keys.down, p.keys.left, p.keys.right);
          dx = input.dx;
        }

        if (dx !== 0) {
          const speed = BATTLE_PLAYER_SPEED * (b.speedBoost > 0 ? 1.5 : 1);
          b.x += dx * speed * dt;
          b.x = Math.max(20, Math.min(CANVAS_W - 20, b.x));
        }

        // Auto-shoot (rate scales with wave: +2% per wave, max 2x at wave 50)
        b.shotTimer -= dt;
        const dragonKey = state.battle.playerDragons[i];
        if (dragonKey && b.shotTimer <= 0) {
          const cfg = DRAGON_CONFIGS[dragonKey];
          const waveBonus = 1 + Math.min(state.battle.wave * 0.02, 1.0);
          const rateMultiplier = (b.rapidFire > 0 ? 2 : 1) * waveBonus;
          b.shotTimer = 1 / (cfg.shotRate * rateMultiplier);
          spawnShots(i, b.x, BATTLE_PLAYER_Y, cfg, b.giantShot > 0);

          // Triple shot: spawn two extra offset shots
          if (b.tripleShot > 0) {
            spawnShots(i, b.x - 12, BATTLE_PLAYER_Y, cfg, b.giantShot > 0);
            spawnShots(i, b.x + 12, BATTLE_PLAYER_Y, cfg, b.giantShot > 0);
          }

          // Clone: mirror shots from the other side
          if (b.clone > 0) {
            spawnShots(i, CANVAS_W - b.x, BATTLE_PLAYER_Y, cfg, b.giantShot > 0);
          }
        }
      }
    }

    function spawnShots(playerId, x, y, config, isGiant) {
      if (state.battle.shots.length >= 50) return;
      shotSoundCounter++;
      if (shotSoundCounter % 4 === 0) sfxShoot();
      const shots = state.battle.shots;
      const spd = config.shotSpeed;
      const col = config.color;
      const g = isGiant || false;

      switch (config.shotType) {
        case 'single':
          shots.push({ x: x, y: y, vx: 0, vy: -spd, color: col, owner: playerId, giant: g });
          break;
        case 'spread':
          shots.push({ x: x, y: y, vx: -spd * 0.25, vy: -spd, color: col, owner: playerId, giant: g });
          shots.push({ x: x, y: y, vx: 0, vy: -spd, color: col, owner: playerId, giant: g });
          shots.push({ x: x, y: y, vx: spd * 0.25, vy: -spd, color: col, owner: playerId, giant: g });
          break;
        case 'pierce':
          shots.push({ x: x, y: y, vx: 0, vy: -spd, color: col, owner: playerId, pierce: true, giant: g });
          break;
        case 'wide':
          shots.push({ x: x, y: y, vx: 0, vy: -spd, color: col, owner: playerId, wide: true, giant: g });
          break;
        case 'bounce':
          shots.push({ x: x, y: y, vx: spd * 0.15, vy: -spd, color: col, owner: playerId, bounces: 2, giant: g });
          break;
        case 'beam':
          shots.push({ x: x, y: y, vx: 0, vy: -spd, color: col, owner: playerId, pierce: true, beam: true, giant: g });
          break;
        case 'phase':
          shots.push({ ...{ x, y, vx: 0, vy: -spd, color: col, owner: playerId, giant: g }, pierce: true, phase: true });
          break;
        case 'thorn':
          shots.push({ ...{ x, y, vx: (Math.random() - 0.5) * 20, vy: -spd, color: col, owner: playerId, giant: g }, pierce: false, thorn: true });
          break;
        case 'chain':
          shots.push({ x, y, vx: 0, vy: -spd, color: col, owner: playerId, giant: g, pierce: false, chain: true });
          break;
        case 'shield_shot':
          shots.push({ x, y, vx: 0, vy: -spd, color: col, owner: playerId, giant: g, pierce: false, shieldShot: true });
          break;
        case 'gravity':
          shots.push({ x, y, vx: 0, vy: -spd, color: col, owner: playerId, giant: g, pierce: false, gravity: true });
          break;
      }
    }

    function updateShots(dt) {
      // Check if any player has timeSlow active
      let anyTimeSlow = false;
      for (let p = 0; p < state.activePlayerCount; p++) {
        if (state.battle.battlePlayers[p].timeSlow > 0) { anyTimeSlow = true; break; }
      }

      const shots = state.battle.shots;
      for (let i = shots.length - 1; i >= 0; i--) {
        const s = shots[i];
        const shotDt = (s.isEnemy && anyTimeSlow) ? dt * 0.3 : dt;
        s.x += s.vx * shotDt;
        s.y += s.vy * shotDt;

        // Bounce shots bounce off left/right edges
        if (s.bounces !== undefined && s.bounces > 0) {
          if (s.x < 4 || s.x > CANVAS_W - 4) {
            s.vx = -s.vx;
            s.bounces--;
          }
        }

        // Gravity shots pull nearby enemies toward them
        if (s.gravity && !s.isEnemy) {
          for (const ge of state.battle.enemies) {
            if (ge.curing) continue;
            const gdx = s.x - ge.x;
            const gdy = s.y - ge.y;
            const gdist = Math.sqrt(gdx*gdx + gdy*gdy);
            if (gdist < 60 && gdist > 5) {
              ge.x += (gdx / gdist) * 30 * shotDt;
              ge.y += (gdy / gdist) * 30 * shotDt;
            }
          }
        }

        // Crystal barrier blocks enemy shots crossing y=300
        if (s.isEnemy) {
          const cb = state.battle.superActive.find(sa => sa && sa.type === 'crystalBarrier');
          if (cb) {
            const prevY = s.y - s.vy * shotDt;
            if ((prevY < cb.y && s.y >= cb.y) || (prevY > cb.y && s.y <= cb.y)) {
              shots.splice(i, 1);
              continue;
            }
          }
        }

        // Phase shots wrap around screen edges instead of being removed
        if (s.phase) {
          if (s.y < -20) { s.y = CANVAS_H + 10; }
          if (s.y > CANVAS_H + 20) { s.y = -10; }
          if (s.x < -20) { s.x = CANVAS_W + 10; }
          if (s.x > CANVAS_W + 20) { s.x = -10; }
          // Phase shots expire after 2 full seconds
          if (!s.phaseTime) s.phaseTime = 0;
          s.phaseTime += shotDt;
          if (s.phaseTime > 2) { shots.splice(i, 1); }
          continue;
        }

        // Remove if off-screen
        if (s.y < -20 || s.y > CANVAS_H + 20 || s.x < -20 || s.x > CANVAS_W + 20) {
          shots.splice(i, 1);
        }
      }
    }

    function startNextWave() {
      state.battle.wave++;
      state.battle.waveState = 'active';
      state.battle.waveTimer = 0;
      state.battle.hitStreak = [0, 0];
      state.battle.combo = { count: 0, timer: 0, displayTimer: 0 };

      const waveNum = state.battle.wave;
      let waveDef;

      if (waveNum <= WAVE_DEFS.length) {
        waveDef = WAVE_DEFS[waveNum - 1];
      } else {
        waveDef = generateWave(waveNum);
      }

      const enemiesToSpawn = waveDef.enemies;
      const pattern = waveDef.pattern || 'row';
      const isRush = waveDef.rush || false;

      if (pattern === 'boss') sfxBossAppear();

      for (let i = 0; i < enemiesToSpawn.length; i++) {
        const typeName = enemiesToSpawn[i];
        const typeConfig = ENEMY_TYPES[typeName];

        let startX, startY;
        const spacing = CANVAS_W / (enemiesToSpawn.length + 1);

        switch (pattern) {
          case 'row':
            startX = spacing * (i + 1);
            startY = -typeConfig.size - (i * 15);
            break;
          case 'vshape': {
            startX = spacing * (i + 1);
            const mid = (enemiesToSpawn.length - 1) / 2;
            startY = -typeConfig.size - Math.abs(i - mid) * 30;
            break;
          }
          case 'diagonal':
            startX = 60 + (i / enemiesToSpawn.length) * (CANVAS_W - 120);
            startY = -typeConfig.size - (i * 35);
            break;
          case 'circle': {
            const angle = (i / enemiesToSpawn.length) * Math.PI;
            startX = CANVAS_W / 2 + Math.cos(angle) * 200;
            startY = -typeConfig.size - Math.sin(angle) * 80 - (i * 10);
            break;
          }
          case 'rush':
            startX = 40 + Math.random() * (CANVAS_W - 80);
            startY = -typeConfig.size - Math.random() * 200;
            break;
          case 'boss':
            if (i === 0) {
              // Boss itself goes center
              startX = CANVAS_W / 2;
              startY = -typeConfig.size;
            } else {
              // Escort enemies spread around the boss
              const escortCount = enemiesToSpawn.length - 1;
              const escortIndex = i - 1;
              startX = (CANVAS_W / (escortCount + 1)) * (escortIndex + 1);
              startY = -typeConfig.size - 60 - (escortIndex * 20);
            }
            break;
          default:
            startX = spacing * (i + 1);
            startY = -typeConfig.size - (i * 15);
        }

        // Speed scaling: 5% per wave (up from 3%), rush waves get extra 20%
        const speedMult = (1 + (waveNum - 1) * 0.05) * (isRush ? 1.2 : 1);

        const isBossEnemy = typeConfig.pattern === 'boss';
        const baseHp = typeConfig.hp;
        const bossHp = isBossEnemy ? (baseHp + waveNum * 4) : baseHp;
        const enemy = {
          type: typeName,
          x: startX,
          y: startY,
          hp: bossHp,
          maxHp: bossHp,
          speed: typeConfig.speed * speedMult,
          size: typeConfig.size,
          color: typeConfig.color,
          pattern: typeConfig.pattern,
          timer: Math.random() * Math.PI * 2,
          curing: false,
          cureTimer: 0,
          shoots: typeConfig.shoots || false,
          splits: typeConfig.splits || false,
          shootTimer: isBossEnemy ? 2.5 : (typeConfig.shoots ? (2 + Math.random()) : 0),
          spawnTime: state.time,
          frozen: 0,
          vined: 0,
        };
        // Dive bomber props for corruptedDragon
        if (typeName === 'corruptedDragon') {
          enemy.diveTimer = 5 + Math.random() * 5;
          enemy.diving = false;
          enemy.divePhase = null;
          enemy.diveSpeed = 0;
          enemy.originalY = 0;
          enemy.diveTargetX = 0;
        }
        // Slime Queen hit counter
        if (typeName === 'slimeQueen') {
          enemy.hitCount = 0;
          enemy.hasSplit = false;
        }
        // Mega Dragon phase tracking
        if (typeName === 'megaDragon') {
          enemy.phase2Applied = false;
          enemy.phase3Applied = false;
          enemy.minionTimer = 5;
        }
        state.battle.enemies.push(enemy);
      }
    }

    function generateWave(waveNum) {
      if (waveNum % 5 === 0) {
        let bossType;
        if (waveNum % 20 === 0) {
          bossType = 'megaDragon';
        } else if (waveNum % 10 === 0) {
          bossType = 'stormKing';
        } else {
          bossType = ['elderDragon', 'slimeQueen'][Math.floor(Math.random() * 2)];
        }
        const escorts = Math.min(3 + Math.floor(waveNum / 5), 8);
        const escortPool = waveNum < 20
          ? ['shadowSlime', 'corruptedDragon', 'darkButterfly']
          : ['shadowKnight', 'stormCloud', 'corruptedDragon', 'shadowSlime'];
        const enemies = [bossType];
        for (let i = 0; i < escorts; i++) {
          enemies.push(escortPool[Math.floor(Math.random() * escortPool.length)]);
        }
        return { enemies, pattern: 'boss' };
      }

      const isRush = (waveNum % 3 === 1);
      const count = isRush
        ? Math.min(14 + Math.floor(waveNum / 2), 20)
        : Math.min(8 + Math.floor(waveNum / 1.5), 16);

      const enemies = [];
      const pool = isRush
        ? ['shadowPuff', 'corruptedEgg', 'darkButterfly']
        : ['shadowSlime', 'corruptedDragon', 'darkMushroom', 'shadowKnight', 'stormCloud'];

      for (let i = 0; i < count; i++) {
        enemies.push(pool[Math.floor(Math.random() * pool.length)]);
      }

      const patterns = ['row', 'vshape', 'diagonal', 'circle'];
      const pattern = isRush ? 'rush' : patterns[Math.floor(Math.random() * patterns.length)];

      return { enemies, pattern, rush: isRush };
    }

    function updateEnemies(dt) {
      // Check if any player has timeSlow active
      let anyTimeSlow = false;
      for (let p = 0; p < state.activePlayerCount; p++) {
        if (state.battle.battlePlayers[p].timeSlow > 0) { anyTimeSlow = true; break; }
      }
      const eDt = anyTimeSlow ? dt * 0.3 : dt;

      const enemies = state.battle.enemies;
      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];

        // Curing animation
        if (e.curing) {
          e.cureTimer += dt;
          if (e.cureTimer >= 1) {
            // Combo counter
            state.battle.combo.count++;
            state.battle.combo.timer = 2.0;
            state.battle.combo.displayTimer = 1.5;
            // Spawn drop (bonus enemies never drop power-ups)
            if (!e.bonusEnemy) {
              spawnDrop(e.x, e.y);
            }
            // Add cure effect
            state.battle.effects.push({ x: e.x, y: e.y, type: 'cure', timer: 0.6, maxTimer: 0.6 });
            // Add super meter to all players
            const meterGain = 5;
            for (let p = 0; p < state.activePlayerCount; p++) {
              state.battle.battlePlayers[p].superMeter = Math.min(SUPER_METER_MAX, state.battle.battlePlayers[p].superMeter + meterGain);
            }
            if (ENEMY_TYPES[e.type] && ENEMY_TYPES[e.type].pattern === 'boss') {
              // Power-up rain after boss!
              triggerScreenShake(8, 0.5);
              for (let d = 0; d < 7; d++) {
                const dropTypes = Object.keys(DROP_TYPES);
                const randomType = dropTypes[Math.floor(Math.random() * dropTypes.length)];
                const dropConfig = DROP_TYPES[randomType];
                state.battle.drops.push({
                  type: randomType,
                  x: 80 + Math.random() * (CANVAS_W - 160),
                  y: -20 - Math.random() * 100,
                  vy: 40,
                  color: dropConfig.color,
                  symbol: dropConfig.symbol,
                });
              }
            }
            enemies.splice(i, 1);
          }
          continue;
        }

        // Skip movement if frozen/vined
        if (e.frozen > 0) { e.frozen -= dt; continue; }
        if (e.vined > 0) { e.vined -= dt; continue; }

        const age = state.time - e.spawnTime;

        // Dive bomber logic for corruptedDragon
        if (e.type === 'corruptedDragon' && !e.curing && !e.diving) {
          if (!e.diveTimer) e.diveTimer = 5 + Math.random() * 5;
          e.diveTimer -= eDt;
          if (e.diveTimer <= 0 && e.y > 30 && e.y < CANVAS_H / 2) {
            e.diving = true;
            e.divePhase = 'down';
            e.diveSpeed = e.speed * 4;
            e.originalY = e.y;
            let nearestX = CANVAS_W / 2;
            for (let pi = 0; pi < state.activePlayerCount; pi++) {
              const bp = state.battle.battlePlayers[pi];
              if (bp.alive) nearestX = bp.x;
            }
            e.diveTargetX = nearestX;
          }
        }

        if (e.type === 'corruptedDragon' && e.diving) {
          if (e.divePhase === 'down') {
            e.y += e.diveSpeed * eDt;
            e.x += (e.diveTargetX - e.x) * 3 * eDt;
            if (e.y > BATTLE_PLAYER_Y - 30) {
              e.divePhase = 'up';
            }
          } else if (e.divePhase === 'up') {
            e.y -= e.diveSpeed * 0.7 * eDt;
            if (e.y < e.originalY) {
              e.diving = false;
              e.diveTimer = 8 + Math.random() * 5;
            }
          }
        }

        // Movement patterns (skip if diving)
        if (!e.diving) {
        switch (e.pattern) {
          case 'straight':
            e.y += e.speed * eDt;
            break;
          case 'wobble':
            e.y += e.speed * eDt;
            e.x += Math.sin(age * 3) * 30 * eDt;
            break;
          case 'zigzag':
            e.y += e.speed * eDt;
            e.x += Math.sin(age * 2) * 80 * eDt;
            break;
          case 'bounce':
            e.y += e.speed * eDt;
            e.x += Math.cos(age * 2.5) * 50 * eDt;
            e.x = Math.max(e.size, Math.min(CANVAS_W - e.size, e.x));
            break;
          case 'swoop':
            e.y += e.speed * eDt * Math.max(0.3, 1 - age * 0.1);
            e.x += Math.sin(age * 1.5) * 60 * eDt;
            break;
          case 'formation':
            e.y += e.speed * eDt;
            e.x += Math.sin(age * 2 + i * 0.5) * 40 * eDt;
            break;
          case 'boss':
            if (e.y < 80) {
              e.y += e.speed * eDt;
            } else {
              e.y = 80;
              e.x += Math.sin(age * 0.8) * 100 * eDt;
              e.x = Math.max(e.size, Math.min(CANVAS_W - e.size, e.x));
            }
            break;
        }
        } // end if (!e.diving)

        // shadowSlime and corruptedDragon shooting
        if ((e.type === 'shadowSlime' || e.type === 'corruptedDragon') && e.y > 50 && e.y < CANVAS_H - 100) {
          if (!e.shootTimer) e.shootTimer = 2 + Math.random() * 3;
          e.shootTimer -= eDt;
          if (e.shootTimer <= 0) {
            e.shootTimer = e.type === 'shadowSlime' ? 4 : 3;
            state.battle.shots.push({
              x: e.x, y: e.y + e.size / 2,
              vx: (Math.random() - 0.5) * 20,
              vy: e.type === 'shadowSlime' ? 80 : 120,
              type: 'enemy', color: e.type === 'shadowSlime' ? '#9575CD' : '#7C4DFF',
              playerId: -1, pierce: false, isEnemy: true,
            });
          }
        }

        // Storm clouds shoot
        if (e.type === 'stormCloud' && e.shoots) {
          e.shootTimer -= eDt;
          if (e.shootTimer <= 0) {
            e.shootTimer = 3;
            state.battle.shots.push({
              x: e.x, y: e.y + e.size / 2,
              vx: 0, vy: 120,
              color: '#7E57C2',
              isEnemy: true,
            });
          }
        }

        // Elder Dragon boss shooting and enrage phase
        if (e.type === 'elderDragon') {
          const enraged = e.hp <= e.maxHp / 2;
          if (enraged && !e.enrageApplied) {
            e.speed *= 1.5;
            e.enrageApplied = true;
          }
          const shootInterval = enraged ? 1.5 : 2.5;
          if (!e.shootTimer) e.shootTimer = shootInterval;
          e.shootTimer -= eDt;
          if (e.shootTimer <= 0) {
            e.shootTimer = shootInterval;
            if (enraged) {
              state.battle.shots.push({ x: e.x, y: e.y + e.size / 2, vx: -40, vy: 120, type: 'enemy', color: '#FF5252', playerId: -1, pierce: false, isEnemy: true });
              state.battle.shots.push({ x: e.x, y: e.y + e.size / 2, vx: 0, vy: 130, type: 'enemy', color: '#FF5252', playerId: -1, pierce: false, isEnemy: true });
              state.battle.shots.push({ x: e.x, y: e.y + e.size / 2, vx: 40, vy: 120, type: 'enemy', color: '#FF5252', playerId: -1, pierce: false, isEnemy: true });
            } else {
              state.battle.shots.push({ x: e.x, y: e.y + e.size / 2, vx: 0, vy: 100, type: 'enemy', color: '#7C4DFF', playerId: -1, pierce: false, isEnemy: true });
            }
          }
        }

        // Storm King boss shooting -- 5-way lightning spread
        if (e.type === 'stormKing') {
          if (!e.shootTimer) e.shootTimer = 2;
          e.shootTimer -= eDt;
          const enraged = e.hp <= e.maxHp / 2;
          if (e.shootTimer <= 0) {
            e.shootTimer = enraged ? 1.2 : 2;
            for (let s = -2; s <= 2; s++) {
              state.battle.shots.push({
                x: e.x + s * 15, y: e.y + e.size / 2,
                vx: s * 30, vy: 140,
                type: 'enemy', color: '#FFEB3B', playerId: -1,
                pierce: false, isEnemy: true,
              });
            }
            if (enraged) triggerScreenShake(3, 0.15);
          }
        }

        // Mega Dragon boss -- 3-phase shooting and minion spawning
        if (e.type === 'megaDragon') {
          const hpPct = e.hp / e.maxHp;
          const phase = hpPct > 0.66 ? 1 : hpPct > 0.33 ? 2 : 3;

          if (!e.shootTimer) e.shootTimer = 2.5;
          if (!e.minionTimer) e.minionTimer = 5;
          e.shootTimer -= eDt;

          if (phase === 2 && !e.phase2Applied) { e.speed *= 1.3; e.phase2Applied = true; }
          if (phase === 3 && !e.phase3Applied) { e.speed *= 1.5; e.phase3Applied = true; }

          const shootInterval = phase === 1 ? 2.5 : phase === 2 ? 1.8 : 1.2;
          const spreadCount = phase === 1 ? 3 : phase === 2 ? 5 : 7;

          if (e.shootTimer <= 0) {
            e.shootTimer = shootInterval;
            const halfSpread = Math.floor(spreadCount / 2);
            for (let s = -halfSpread; s <= halfSpread; s++) {
              state.battle.shots.push({
                x: e.x + s * 12, y: e.y + e.size / 2,
                vx: s * 25, vy: 110 + phase * 10,
                type: 'enemy', color: phase === 3 ? '#FF5252' : '#FF8A65', playerId: -1,
                pierce: false, isEnemy: true,
              });
            }
            if (phase >= 2) triggerScreenShake(phase * 2, 0.2);
          }

          // Minion spawning in phases 2-3
          if (phase >= 2) {
            e.minionTimer -= eDt;
            const minionInterval = phase === 2 ? 5 : 3;
            if (e.minionTimer <= 0) {
              e.minionTimer = minionInterval;
              const minionCount = phase === 2 ? 2 : 3;
              for (let m = 0; m < minionCount; m++) {
                const tc = ENEMY_TYPES['darkButterfly'];
                state.battle.enemies.push({
                  type: 'darkButterfly',
                  x: e.x + (Math.random() - 0.5) * 60,
                  y: e.y + e.size / 2,
                  hp: tc.hp, maxHp: tc.hp,
                  speed: tc.speed * 1.3,
                  size: tc.size, color: tc.color, pattern: 'zigzag',
                  timer: Math.random() * Math.PI * 2,
                  curing: false, cureTimer: 0, shoots: false, splits: false, shootTimer: 0,
                  spawnTime: state.time, frozen: 0, vined: 0,
                });
              }
            }
          }
        }

        // Black hole: pull all enemies toward center, damage at center
        const bh = state.battle.superActive.find(sa => sa && sa.type === 'blackHole');
        if (bh && !e.curing) {
          const bhdx = bh.x - e.x;
          const bhdy = bh.y - e.y;
          const bhdist = Math.sqrt(bhdx*bhdx + bhdy*bhdy);
          if (bhdist < 20) {
            e.hp -= 5;
            if (e.hp <= 0) { e.curing = true; e.cureTimer = 0; }
          } else if (bhdist > 0) {
            e.x += (bhdx / bhdist) * 100 * eDt;
            e.y += (bhdy / bhdist) * 100 * eDt;
          }
        }

        // Remove if off bottom
        if (e.y > CANVAS_H + e.size) {
          enemies.splice(i, 1);
        }
      }
    }

    function checkBattleCollisions() {
      const enemies = state.battle.enemies;
      const shots = state.battle.shots;
      const bp = state.battle.battlePlayers;

      // 1. Player shots vs enemies
      for (let si = shots.length - 1; si >= 0; si--) {
        const s = shots[si];
        if (s.isEnemy) continue;
        const giantMult = s.giant ? 3 : 1;
        const sw = (s.wide ? 16 : 6) * giantMult;
        const sh = 4 * giantMult;
        const dmg = s.giant ? 2 : 1;

        for (let ei = enemies.length - 1; ei >= 0; ei--) {
          const e = enemies[ei];
          if (e.curing) continue;
          const es = e.size / 2;

          // Rectangle overlap
          if (s.x - sw / 2 < e.x + es && s.x + sw / 2 > e.x - es &&
              s.y - sh < e.y + es && s.y + sh > e.y - es) {
            e.hp -= dmg;
            sfxEnemyHit();
            state.battle.effects.push({ x: s.x, y: s.y, type: 'hit', timer: 0.3, maxTimer: 0.3 });

            // Slime Queen: spawn mini slime every 3rd hit
            if (e.type === 'slimeQueen' && e.hp > 0) {
              if (!e.hitCount) e.hitCount = 0;
              e.hitCount++;
              if (e.hitCount % 3 === 0) {
                const tc = ENEMY_TYPES['shadowSlime'];
                state.battle.enemies.push({
                  type: 'shadowSlime',
                  x: e.x + (Math.random() - 0.5) * 40,
                  y: e.y + 10,
                  hp: tc.hp, maxHp: tc.hp,
                  speed: tc.speed * 1.2,
                  size: tc.size, color: tc.color, pattern: 'bounce',
                  timer: Math.random() * Math.PI * 2,
                  curing: false, cureTimer: 0, shoots: false, splits: false, shootTimer: 0,
                  spawnTime: state.time, frozen: 0, vined: 0,
                });
              }
            }

            // Slime Queen: split at half HP
            if (e.type === 'slimeQueen' && e.hp > 0 && e.hp <= e.maxHp / 2 && !e.hasSplit) {
              e.hasSplit = true;
              for (let sp = 0; sp < 2; sp++) {
                state.battle.enemies.push({
                  type: 'shadowSlime',
                  x: e.x + (sp === 0 ? -30 : 30), y: e.y,
                  hp: Math.ceil(e.hp / 2), maxHp: Math.ceil(e.hp / 2),
                  speed: e.speed * 1.5, size: 30,
                  color: '#7B1FA2', pattern: 'bounce',
                  timer: Math.random() * Math.PI * 2,
                  curing: false, cureTimer: 0, shoots: false, splits: false, shootTimer: 0,
                  spawnTime: state.time, frozen: 0, vined: 0,
                });
              }
            }

            if (e.hp <= 0) {
              e.curing = true;
              e.cureTimer = 0;
              sfxEnemyCure();

              // Splits
              if (e.splits && e.type !== 'slimeQueen') {
                for (let sp = 0; sp < 2; sp++) {
                  state.battle.enemies.push({
                    type: e.type,
                    x: e.x + (sp === 0 ? -20 : 20),
                    y: e.y,
                    hp: 1,
                    maxHp: 1,
                    speed: e.speed * 1.2,
                    size: e.size * 0.7,
                    pattern: 'wobble',
                    color: e.color,
                    shoots: false,
                    splits: false,
                    shootTimer: 99,
                    spawnTime: state.time,
                    curing: false,
                    cureTimer: 0,
                    frozen: 0,
                    vined: 0,
                  });
                }
              }
            }

            // Thorn mechanic: thorns stick to enemies; 3 thorns = explosion
            if (s.thorn) {
              shots.splice(si, 1);
              if (!e.curing) {
                e.thorns = (e.thorns || 0) + 1;
                if (e.thorns >= 3) {
                  // Explosion: 2 damage to all enemies within 60px
                  for (const ne of state.battle.enemies) {
                    if (!ne.curing) {
                      const dx = ne.x - e.x;
                      const dy = ne.y - e.y;
                      if (Math.sqrt(dx * dx + dy * dy) <= 60) {
                        ne.hp -= 2;
                        if (ne.hp <= 0) { ne.curing = true; ne.cureTimer = 0; }
                      }
                    }
                  }
                  state.battle.effects.push({ type: 'thornExplosion', x: e.x, y: e.y, timer: 0.6, maxTimer: 0.6 });
                  e.thorns = 0;
                }
              }
              break;
            }

            // Chain lightning: chain to nearest other enemy within 80px
            if (s.chain && !e.curing) {
              let nearest = null, nearDist = Infinity;
              for (const e2 of state.battle.enemies) {
                if (e2 === e || e2.curing) continue;
                const cd = Math.sqrt((e2.x - e.x)**2 + (e2.y - e.y)**2);
                if (cd < 80 && cd < nearDist) { nearest = e2; nearDist = cd; }
              }
              if (nearest) {
                nearest.hp--;
                if (nearest.hp <= 0) { nearest.curing = true; nearest.cureTimer = 0; }
                state.battle.effects.push({ type: 'chainLightning', x: e.x, y: e.y, x2: nearest.x, y2: nearest.y, timer: 0.3, maxTimer: 0.3 });
              }
            }

            // Shield shot: create a shield zone at hit location
            if (s.shieldShot) {
              if (!state.battle.shieldZones) state.battle.shieldZones = [];
              if (state.battle.shieldZones.length < 2) {
                state.battle.shieldZones.push({ x: e.x, y: e.y, timer: 3 });
              }
            }

            if (!s.pierce) {
              shots.splice(si, 1);
              break;
            }
          }
        }
      }

      // Shield zones block enemy shots
      if (state.battle.shieldZones && state.battle.shieldZones.length > 0) {
        for (let si = shots.length - 1; si >= 0; si--) {
          const s = shots[si];
          if (!s.isEnemy) continue;
          let blocked = false;
          for (const zone of state.battle.shieldZones) {
            if (Math.sqrt((s.x - zone.x)**2 + (s.y - zone.y)**2) < 40) {
              shots.splice(si, 1);
              blocked = true;
              break;
            }
          }
        }
      }

      // 2. Enemies + enemy shots vs players
      for (let pi = 0; pi < state.activePlayerCount; pi++) {
        const b = bp[pi];
        if (!b.alive || b.invTimer > 0) continue;

        const px = b.x;
        const py = BATTLE_PLAYER_Y;
        const pr = b.giantDragon > 0 ? 28 : 14; // player radius (bigger when giant)

        // Check enemies (skip if any phantom super is active)
        const phantomActive = state.battle.superActive.some(sa => sa && sa.type === 'phantom');
        if (!phantomActive) {
          for (const e of enemies) {
            if (e.curing) continue;
            const es = e.size / 2;
            if (px - pr < e.x + es && px + pr > e.x - es &&
                py - pr < e.y + es && py + pr > e.y - es) {
              hitBattlePlayer(pi);
              break;
            }
          }
        }

        // Check enemy shots
        if (!b.alive || b.invTimer > 0) continue;
        for (let si = shots.length - 1; si >= 0; si--) {
          const s = shots[si];
          if (!s.isEnemy) continue;
          if (Math.abs(s.x - px) < pr + 4 && Math.abs(s.y - py) < pr + 4) {
            hitBattlePlayer(pi);
            shots.splice(si, 1);
            break;
          }
        }
      }

      // 3. Star Shield orbiting stars vs enemies
      for (let pi = 0; pi < state.activePlayerCount; pi++) {
        const b = bp[pi];
        if (!b.alive || b.starShield <= 0) continue;
        for (let s = 0; s < 3; s++) {
          const angle = state.time * 4 + (s * Math.PI * 2 / 3);
          const sx = b.x + Math.cos(angle) * 25;
          const sy = BATTLE_PLAYER_Y + Math.sin(angle) * 25;
          for (const e of enemies) {
            if (e.curing) continue;
            const es = e.size / 2;
            if (Math.abs(sx - e.x) < es + 8 && Math.abs(sy - e.y) < es + 8) {
              e.hp--;
              state.battle.effects.push({ x: sx, y: sy, type: 'hit', timer: 0.3, maxTimer: 0.3 });
              if (e.hp <= 0) { e.curing = true; e.cureTimer = 0; }
            }
          }
        }
      }

      // 4. Rainbow trail vs enemies
      for (let pi = 0; pi < state.activePlayerCount; pi++) {
        const b = bp[pi];
        if (!b.alive) continue;
        for (const tp of b.trailPoints) {
          for (const e of enemies) {
            if (e.curing) continue;
            const es = e.size / 2;
            if (Math.abs(tp.x - e.x) < es + 6 && Math.abs(tp.y - e.y) < es + 6) {
              e.hp--;
              state.battle.effects.push({ x: tp.x, y: tp.y, type: 'hit', timer: 0.3, maxTimer: 0.3 });
              if (e.hp <= 0) { e.curing = true; e.cureTimer = 0; }
              tp.timer = 0; // consume trail point on hit
              break;
            }
          }
        }
      }

      // 5. Friendship Beam vs enemies (2-player only)
      if (state.battle.friendBeam > 0 && state.activePlayerCount === 2 && bp[0].alive && bp[1].alive) {
        const ax = bp[0].x, ay = BATTLE_PLAYER_Y;
        const bx = bp[1].x, by = BATTLE_PLAYER_Y;
        for (const e of enemies) {
          if (e.curing) continue;
          // Point-to-line distance (beam is horizontal since both at same Y)
          const minX = Math.min(ax, bx), maxX = Math.max(ax, bx);
          if (e.x >= minX - 10 && e.x <= maxX + 10 && Math.abs(e.y - ay) < 15 + e.size / 2) {
            if (!e.beamHitTimer || e.beamHitTimer <= 0) {
              e.hp--;
              e.beamHitTimer = 0.2;
              state.battle.effects.push({ x: e.x, y: e.y, type: 'hit', timer: 0.3, maxTimer: 0.3 });
              if (e.hp <= 0) { e.curing = true; e.cureTimer = 0; }
            }
          }
          if (e.beamHitTimer > 0) e.beamHitTimer -= 0.016;
        }
      }
    }

    function hitBattlePlayer(playerIdx) {
      const b = state.battle.battlePlayers[playerIdx];
      if (b.shieldActive) {
        b.shieldActive = false;
        b.invTimer = 0.5;
        state.battle.effects.push({ x: b.x, y: BATTLE_PLAYER_Y, type: 'shieldBreak', timer: 0.5, maxTimer: 0.5 });
        return;
      }
      b.hearts--;
      b.invTimer = 1;
      sfxPlayerHit();
      state.battle.hitStreak[playerIdx]++;
      state.battle.effects.push({ x: b.x, y: BATTLE_PLAYER_Y, type: 'playerHit', timer: 0.4, maxTimer: 0.4 });
      triggerScreenShake(3, 0.15);
      if (b.hearts <= 0) {
        b.alive = false;
        b.respawnTimer = RESPAWN_TIME;
      }
    }

    function updateBattleWaves(dt) {
      const b = state.battle;

      if (b.waveState === 'waiting') {
        b.waveTimer += dt;
        if (b.waveTimer >= 1.5) {
          b.waveTimer = 0;
          startNextWave();
        }
      } else if (b.waveState === 'active') {
        const remaining = b.enemies.filter(e => !e.curing).length;
        if (remaining <= 2) {
          b.waveState = 'clearing';
          b.waveTimer = 0;
          sfxWaveClear();
        }
      } else if (b.waveState === 'clearing') {
        b.waveTimer += dt;
        if (b.waveTimer >= 1.2) {
          b.waveState = 'waiting';
          b.waveTimer = 0;
        }
      }
    }

    // ============================================================
    // BATTLE RENDERING
    // ============================================================

    const battleStars = [];
    for (let i = 0; i < 60; i++) {
      battleStars.push({
        x: Math.random() * CANVAS_W,
        y: Math.random() * CANVAS_H,
        size: Math.random() * 2 + 0.5,
        speed: Math.random() * 20 + 10,
      });
    }

    function drawBattleBackground() {
      ctx.fillStyle = '#0a0a1a';
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

      for (const star of battleStars) {
        const sy = (star.y + state.time * star.speed) % CANVAS_H;
        const twinkle = Math.sin(state.time * 3 + star.x * 0.1) * 0.3 + 0.7;
        ctx.fillStyle = 'rgba(255, 255, 255, ' + twinkle * 0.6 + ')';
        ctx.fillRect(star.x, sy, star.size, star.size);
      }
    }

    function drawBattlePlayers() {
      for (let i = 0; i < state.activePlayerCount; i++) {
        const pi = state.activePlayerCount === 1 ? state.activePlayer : i;
        const b = state.battle.battlePlayers[i];
        const dragonKey = state.battle.playerDragons[i];
        if (!dragonKey) continue;

        if (!b.alive) {
          // Dizzy stars animation
          const cx = b.x;
          const cy = BATTLE_PLAYER_Y;
          for (let s = 0; s < 3; s++) {
            const angle = state.time * 4 + s * (Math.PI * 2 / 3);
            const sx = cx + Math.cos(angle) * 14;
            const sy = cy - 20 + Math.sin(angle) * 6;
            ctx.fillStyle = '#FFD700';
            ctx.font = '10px serif';
            ctx.textAlign = 'center';
            ctx.fillText('\u2605', sx, sy);
          }

          // Dragon selection UI during respawn
          if (b.respawnSelecting && state.battle.playerDragons[i]) {
            const selKey = state.battle.playerDragons[i];
            const selCfg = DRAGON_CONFIGS[selKey];
            ctx.save();
            ctx.textAlign = 'center';
            // "Pick your dragon!" prompt
            ctx.font = 'bold 11px monospace';
            ctx.fillStyle = '#4DD0E1';
            ctx.fillText('Pick your dragon!', cx, cy - 50);
            // Dragon name
            ctx.font = 'bold 12px monospace';
            ctx.fillStyle = selCfg.color;
            ctx.fillText(selCfg.name, cx, cy - 36);
            // Left/right arrows hint
            ctx.font = '10px monospace';
            ctx.fillStyle = '#FFFFFF';
            ctx.globalAlpha = 0.7;
            ctx.fillText('\u25C4 \u25BA', cx, cy - 24);
            ctx.globalAlpha = 1;
            ctx.restore();
          }
          continue;
        }

        // Flash when invincible
        if (b.invTimer > 0 && Math.floor(state.time * 10) % 2 === 0) continue;

        // Shield bubble
        if (b.shieldActive) {
          ctx.strokeStyle = 'rgba(105, 240, 174, 0.6)';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(b.x, BATTLE_PLAYER_Y, 22, 0, Math.PI * 2);
          ctx.stroke();
        }

        // Rainbow trail points
        for (const tp of b.trailPoints) {
          const hue = (tp.timer * 360 + state.time * 200) % 360;
          ctx.globalAlpha = tp.timer * 0.6;
          ctx.fillStyle = 'hsl(' + hue + ', 90%, 60%)';
          ctx.beginPath();
          ctx.arc(tp.x, tp.y, 5 * tp.timer, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
        }

        // Giant dragon: draw larger sprite
        if (b.giantDragon > 0) {
          drawSprite(DRAGON_SPRITES[dragonKey], b.x - 36, BATTLE_PLAYER_Y - 36, 72);
        } else {
          // Dragon sprite (normal)
          drawSprite(DRAGON_SPRITES[dragonKey], b.x - 18, BATTLE_PLAYER_Y - 18, 36);
        }

        // Star Shield orbiting stars
        if (b.starShield > 0) {
          for (let s = 0; s < 3; s++) {
            const angle = state.time * 4 + (s * Math.PI * 2 / 3);
            const sx = b.x + Math.cos(angle) * 25;
            const sy = BATTLE_PLAYER_Y + Math.sin(angle) * 25;
            ctx.fillStyle = '#FFD700';
            ctx.font = '14px serif';
            ctx.textAlign = 'center';
            ctx.fillText('\u2605', sx, sy + 5);
          }
        }

        // Clone: draw ghost dragon on mirrored side
        if (b.clone > 0) {
          ctx.globalAlpha = 0.6;
          const cx = CANVAS_W - b.x;
          if (b.giantDragon > 0) {
            drawSprite(DRAGON_SPRITES[dragonKey], cx - 36, BATTLE_PLAYER_Y - 36, 72);
          } else {
            drawSprite(DRAGON_SPRITES[dragonKey], cx - 18, BATTLE_PLAYER_Y - 18, 36);
          }
          ctx.globalAlpha = 1;
        }
      }

      // Friendship Beam: glowing line between both dragons
      if (state.battle.friendBeam > 0 && state.activePlayerCount === 2) {
        const b0 = state.battle.battlePlayers[0];
        const b1 = state.battle.battlePlayers[1];
        if (b0.alive && b1.alive) {
          const hue = (state.time * 200) % 360;
          ctx.strokeStyle = 'hsl(' + hue + ', 90%, 70%)';
          ctx.lineWidth = 6;
          ctx.globalAlpha = 0.7 + Math.sin(state.time * 8) * 0.2;
          ctx.beginPath();
          ctx.moveTo(b0.x, BATTLE_PLAYER_Y);
          ctx.lineTo(b1.x, BATTLE_PLAYER_Y);
          ctx.stroke();
          // Particles along the beam
          const beamLen = Math.abs(b1.x - b0.x);
          const minX = Math.min(b0.x, b1.x);
          for (let p = 0; p < 8; p++) {
            const px = minX + ((p / 8 + state.time * 0.5) % 1) * beamLen;
            const py = BATTLE_PLAYER_Y + Math.sin(state.time * 10 + p) * 5;
            ctx.fillStyle = 'hsl(' + ((hue + p * 30) % 360) + ', 100%, 80%)';
            ctx.beginPath();
            ctx.arc(px, py, 3, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.globalAlpha = 1;
          ctx.lineWidth = 1;
        }
      }
    }

    function drawBattleShots() {
      for (const s of state.battle.shots) {
        if (s.isEnemy) {
          // Enemy projectile: purple circle
          ctx.fillStyle = s.color;
          ctx.beginPath();
          ctx.arc(s.x, s.y, 4, 0, Math.PI * 2);
          ctx.fill();
          continue;
        }

        const gMult = s.giant ? 3 : 1;
        if (s.phase) {
          // Ghostly phase shot: semi-transparent with trailing wisp
          ctx.globalAlpha = 0.6;
          ctx.fillStyle = '#ECEFF1';
          ctx.beginPath();
          ctx.arc(s.x, s.y + 8 * gMult, 2 * gMult, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#B0BEC5';
          ctx.beginPath();
          ctx.arc(s.x, s.y + 4 * gMult, 2.5 * gMult, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#ECEFF1';
          ctx.beginPath();
          ctx.arc(s.x, s.y, 3.5 * gMult, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
        } else if (s.thorn) {
          // Thorn shot: small green spike/triangle
          ctx.fillStyle = '#558B2F';
          ctx.save();
          ctx.translate(s.x, s.y);
          ctx.rotate(Math.PI); // point upward
          ctx.beginPath();
          const ts = 5 * gMult;
          ctx.moveTo(0, -ts * 1.5);
          ctx.lineTo(ts * 0.6, ts * 0.5);
          ctx.lineTo(-ts * 0.6, ts * 0.5);
          ctx.closePath();
          ctx.fill();
          ctx.fillStyle = '#8BC34A';
          ctx.beginPath();
          ctx.arc(s.x - s.x + 0, s.y - s.y + 0, ts * 0.3, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        } else if (s.chain) {
          // Storm chain shot: yellow/blue crackling bolt
          ctx.save();
          ctx.translate(s.x, s.y);
          const cs = 5 * gMult;
          // Blue outer glow
          ctx.globalAlpha = 0.4;
          ctx.fillStyle = '#1565C0';
          ctx.beginPath();
          ctx.arc(0, 0, cs + 2, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
          // Yellow core
          ctx.fillStyle = '#FFEB3B';
          ctx.beginPath();
          ctx.arc(0, 0, cs * 0.6, 0, Math.PI * 2);
          ctx.fill();
          // Small jagged spark lines
          ctx.strokeStyle = '#FFF';
          ctx.lineWidth = 1;
          for (let sp = 0; sp < 4; sp++) {
            const a = (sp / 4) * Math.PI * 2 + state.time * 10;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(Math.cos(a) * cs * 1.5, Math.sin(a) * cs * 1.5);
            ctx.stroke();
          }
          ctx.restore();
        } else if (s.shieldShot) {
          // Crystal dragon shot: pink/purple diamond
          ctx.save();
          ctx.translate(s.x, s.y);
          const ks = 6 * gMult;
          ctx.fillStyle = '#CE93D8';
          ctx.beginPath();
          ctx.moveTo(0, -ks);
          ctx.lineTo(ks * 0.5, 0);
          ctx.lineTo(0, ks);
          ctx.lineTo(-ks * 0.5, 0);
          ctx.closePath();
          ctx.fill();
          ctx.strokeStyle = '#F3E5F5';
          ctx.lineWidth = 1;
          ctx.stroke();
          ctx.restore();
        } else if (s.gravity) {
          // Cosmic gravity shot: dark purple circle with aura
          ctx.globalAlpha = 0.25;
          ctx.fillStyle = '#7C4DFF';
          ctx.beginPath();
          ctx.arc(s.x, s.y, 10 * gMult, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
          ctx.fillStyle = '#1A237E';
          ctx.beginPath();
          ctx.arc(s.x, s.y, 5 * gMult, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#7C4DFF';
          ctx.beginPath();
          ctx.arc(s.x, s.y, 2 * gMult, 0, Math.PI * 2);
          ctx.fill();
        } else if (s.beam) {
          ctx.fillStyle = s.color;
          ctx.fillRect(s.x - 2 * gMult, s.y - 8 * gMult, 4 * gMult, 16 * gMult);
        } else if (s.wide) {
          ctx.fillStyle = s.color;
          ctx.font = (14 * gMult) + 'px serif';
          ctx.textAlign = 'center';
          ctx.fillText('\u2665', s.x, s.y + 4);
        } else {
          // Trail
          ctx.fillStyle = s.color + '44';
          ctx.beginPath();
          ctx.arc(s.x, s.y + 6, 3 * gMult, 0, Math.PI * 2);
          ctx.fill();
          // Main dot
          ctx.fillStyle = s.color;
          ctx.beginPath();
          ctx.arc(s.x, s.y, 3 * gMult, 0, Math.PI * 2);
          ctx.fill();
          // Giant glow
          if (s.giant) {
            ctx.globalAlpha = 0.3;
            ctx.beginPath();
            ctx.arc(s.x, s.y, 12, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
          }
        }
      }
    }

    function drawBattleEnemies() {
      for (const e of state.battle.enemies) {
        const ex = e.x;
        const ey = e.y;
        const sz = e.size;
        const hsz = sz / 2;

        // Curing animation
        if (e.curing) {
          const t = e.cureTimer;
          const hue = (t * 360) % 360;
          const alpha = Math.max(0, 1 - t);
          ctx.globalAlpha = alpha;
          ctx.fillStyle = 'hsl(' + hue + ', 80%, 70%)';
          ctx.beginPath();
          ctx.arc(ex, ey - t * 20, hsz, 0, Math.PI * 2);
          ctx.fill();
          // Happy face
          ctx.fillStyle = '#fff';
          ctx.font = (sz * 0.5) + 'px monospace';
          ctx.textAlign = 'center';
          ctx.fillText(':)', ex, ey - t * 20 + sz * 0.15);
          ctx.globalAlpha = 1;
          continue;
        }

        // Damage flash
        const damaged = e.hp < e.maxHp;
        if (damaged && Math.floor(state.time * 15) % 3 === 0) {
          ctx.fillStyle = '#fff';
        } else {
          ctx.fillStyle = e.color;
        }

        switch (e.type) {
          case 'shadowPuff': {
            // Cloud shape: 3 circles
            const c = e.color;
            if (damaged && Math.floor(state.time * 15) % 3 === 0) ctx.fillStyle = '#fff';
            else ctx.fillStyle = c;
            ctx.beginPath();
            ctx.arc(ex - hsz * 0.4, ey, hsz * 0.6, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(ex + hsz * 0.4, ey, hsz * 0.6, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(ex, ey - hsz * 0.3, hsz * 0.7, 0, Math.PI * 2);
            ctx.fill();
            break;
          }
          case 'corruptedEgg':
            drawSprite(EGG_SPRITES.shadow, ex - hsz, ey - hsz, sz);
            break;
          case 'darkButterfly': {
            // Body
            ctx.fillRect(ex - 2, ey - hsz * 0.6, 4, hsz * 1.2);
            // Wings (flapping)
            const flap = Math.sin(state.time * 8) * 0.3 + 0.7;
            ctx.beginPath();
            ctx.ellipse(ex - hsz * 0.5, ey, hsz * 0.6, hsz * 0.4 * flap, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(ex + hsz * 0.5, ey, hsz * 0.6, hsz * 0.4 * flap, 0, 0, Math.PI * 2);
            ctx.fill();
            break;
          }
          case 'shadowSlime': {
            // Squishing ellipse
            const squish = Math.sin(state.time * 4) * 0.15 + 1;
            ctx.beginPath();
            ctx.ellipse(ex, ey, hsz * squish, hsz / squish, 0, 0, Math.PI * 2);
            ctx.fill();
            // Eyes
            ctx.fillStyle = '#fff';
            ctx.fillRect(ex - 4, ey - 3, 3, 3);
            ctx.fillRect(ex + 2, ey - 3, 3, 3);
            break;
          }
          case 'corruptedDragon':
            // Speed trail when diving
            if (e.diving) {
              for (let t = 1; t <= 3; t++) {
                ctx.globalAlpha = 0.2 / t;
                drawSprite(DRAGON_SPRITES.shadow, ex - hsz, ey - hsz - t * 12, sz);
              }
              ctx.globalAlpha = 1;
            }
            drawSprite(DRAGON_SPRITES.shadow, ex - hsz, ey - hsz, sz);
            break;
          case 'darkMushroom': {
            // Brown stem
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(ex - 3, ey, 6, hsz * 0.7);
            // Purple cap
            if (damaged && Math.floor(state.time * 15) % 3 === 0) ctx.fillStyle = '#fff';
            else ctx.fillStyle = e.color;
            ctx.beginPath();
            ctx.arc(ex, ey, hsz * 0.7, Math.PI, 0);
            ctx.fill();
            break;
          }
          case 'shadowKnight': {
            // Filled rectangle body
            ctx.fillRect(ex - hsz * 0.5, ey - hsz * 0.7, sz * 0.5, sz * 0.7);
            // Visor
            ctx.fillStyle = '#B39DDB';
            ctx.fillRect(ex - hsz * 0.4, ey - hsz * 0.3, sz * 0.4, 3);
            break;
          }
          case 'stormCloud': {
            // Large cloud (3 overlapping circles)
            const c2 = e.color;
            if (damaged && Math.floor(state.time * 15) % 3 === 0) ctx.fillStyle = '#fff';
            else ctx.fillStyle = c2;
            ctx.beginPath();
            ctx.arc(ex - hsz * 0.4, ey, hsz * 0.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(ex + hsz * 0.4, ey, hsz * 0.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(ex, ey - hsz * 0.25, hsz * 0.6, 0, Math.PI * 2);
            ctx.fill();
            // Lightning bolt hint
            ctx.fillStyle = '#FFD700';
            ctx.font = '10px serif';
            ctx.textAlign = 'center';
            ctx.fillText('\u26A1', ex, ey + hsz + 8);
            break;
          }
          case 'elderDragon': {
            const enraged = e.hp <= e.maxHp / 2;
            // Pulsing red aura when enraged
            if (enraged) {
              const pulse = 0.4 + 0.3 * Math.sin(state.time * 8);
              ctx.save();
              ctx.globalAlpha = pulse;
              ctx.fillStyle = '#FF1744';
              ctx.beginPath();
              ctx.arc(ex, ey, hsz + 10, 0, Math.PI * 2);
              ctx.fill();
              ctx.globalAlpha = 1;
              ctx.restore();
            }
            if (enraged) {
              ctx.save();
              ctx.globalCompositeOperation = 'multiply';
              ctx.fillStyle = '#FF5252';
              ctx.beginPath();
              ctx.arc(ex, ey, hsz, 0, Math.PI * 2);
              ctx.fill();
              ctx.restore();
            }
            drawSprite(DRAGON_SPRITES.shadow, ex - hsz, ey - hsz, sz);
            break;
          }
          case 'stormKing': {
            // Massive storm cloud (5+ overlapping circles)
            const skEnraged = e.hp <= e.maxHp / 2;
            const skColor = skEnraged ? '#0D47A1' : '#1A237E';
            if (damaged && Math.floor(state.time * 15) % 3 === 0) ctx.fillStyle = '#fff';
            else ctx.fillStyle = skColor;
            ctx.beginPath(); ctx.arc(ex - hsz * 0.5, ey, hsz * 0.45, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(ex + hsz * 0.5, ey, hsz * 0.45, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(ex, ey - hsz * 0.3, hsz * 0.55, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(ex - hsz * 0.25, ey + hsz * 0.2, hsz * 0.4, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(ex + hsz * 0.25, ey + hsz * 0.2, hsz * 0.4, 0, Math.PI * 2); ctx.fill();
            // Lightning bolt shapes inside
            ctx.fillStyle = '#FFEB3B';
            ctx.font = (sz * 0.35) + 'px serif';
            ctx.textAlign = 'center';
            ctx.fillText('\u26A1', ex - 8, ey + 6);
            ctx.fillText('\u26A1', ex + 8, ey + 6);
            // Electric sparks at half HP
            if (skEnraged) {
              for (let sp = 0; sp < 4; sp++) {
                const spAngle = state.time * 6 + sp * Math.PI / 2;
                const spX = ex + Math.cos(spAngle) * (hsz + 5);
                const spY = ey + Math.sin(spAngle) * (hsz + 5);
                ctx.fillStyle = '#FFEB3B';
                ctx.globalAlpha = 0.5 + Math.sin(state.time * 12 + sp) * 0.5;
                ctx.beginPath(); ctx.arc(spX, spY, 3, 0, Math.PI * 2); ctx.fill();
              }
              ctx.globalAlpha = 1;
            }
            break;
          }
          case 'slimeQueen': {
            // Big jiggly slime
            const sqSquish = Math.sin(state.time * 3) * 0.2 + 1;
            if (damaged && Math.floor(state.time * 15) % 3 === 0) ctx.fillStyle = '#fff';
            else ctx.fillStyle = '#6A1B9A';
            ctx.beginPath();
            ctx.ellipse(ex, ey, hsz * sqSquish, hsz / sqSquish, 0, 0, Math.PI * 2);
            ctx.fill();
            // Cute angry eyes
            ctx.fillStyle = '#fff';
            ctx.fillRect(ex - hsz * 0.35, ey - hsz * 0.15, hsz * 0.25, hsz * 0.2);
            ctx.fillRect(ex + hsz * 0.1, ey - hsz * 0.15, hsz * 0.25, hsz * 0.2);
            ctx.fillStyle = '#000';
            ctx.fillRect(ex - hsz * 0.28, ey - hsz * 0.1, hsz * 0.12, hsz * 0.12);
            ctx.fillRect(ex + hsz * 0.17, ey - hsz * 0.1, hsz * 0.12, hsz * 0.12);
            // Angry eyebrows
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(ex - hsz * 0.4, ey - hsz * 0.3); ctx.lineTo(ex - hsz * 0.1, ey - hsz * 0.2); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(ex + hsz * 0.4, ey - hsz * 0.3); ctx.lineTo(ex + hsz * 0.1, ey - hsz * 0.2); ctx.stroke();
            // Tiny crown (yellow triangle)
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.moveTo(ex - 8, ey - hsz / sqSquish - 2);
            ctx.lineTo(ex + 8, ey - hsz / sqSquish - 2);
            ctx.lineTo(ex, ey - hsz / sqSquish - 14);
            ctx.fill();
            // Cracks at half HP
            if (e.hp <= e.maxHp / 2) {
              ctx.strokeStyle = '#4A148C';
              ctx.lineWidth = 2;
              ctx.beginPath(); ctx.moveTo(ex - 5, ey - 5); ctx.lineTo(ex - 12, ey + 8); ctx.stroke();
              ctx.beginPath(); ctx.moveTo(ex + 3, ey - 3); ctx.lineTo(ex + 10, ey + 10); ctx.stroke();
            }
            break;
          }
          case 'megaDragon': {
            const mdPhase = (e.hp / e.maxHp) > 0.66 ? 1 : (e.hp / e.maxHp) > 0.33 ? 2 : 3;
            // Glowing aura
            const auraColor = mdPhase === 3 ? '#FF1744' : mdPhase === 2 ? '#FF6D00' : '#FF8A65';
            const auraPulse = 0.3 + 0.3 * Math.sin(state.time * (4 + mdPhase * 2));
            ctx.save();
            ctx.globalAlpha = auraPulse;
            ctx.fillStyle = auraColor;
            ctx.beginPath();
            ctx.arc(ex, ey, hsz + 12, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
            ctx.restore();
            // Wings (triangles on sides that flap)
            const wingFlap = Math.sin(state.time * 5) * 0.3 + 0.7;
            ctx.fillStyle = '#2D0050';
            // Left wing
            ctx.beginPath();
            ctx.moveTo(ex - hsz * 0.6, ey - hsz * 0.2);
            ctx.lineTo(ex - hsz * 1.3, ey - hsz * wingFlap);
            ctx.lineTo(ex - hsz * 0.6, ey + hsz * 0.3);
            ctx.fill();
            // Right wing
            ctx.beginPath();
            ctx.moveTo(ex + hsz * 0.6, ey - hsz * 0.2);
            ctx.lineTo(ex + hsz * 1.3, ey - hsz * wingFlap);
            ctx.lineTo(ex + hsz * 0.6, ey + hsz * 0.3);
            ctx.fill();
            // Main body -- shadow dragon at 80px
            drawSprite(DRAGON_SPRITES.shadow, ex - hsz, ey - hsz, sz);
            // Horns (triangles on top)
            ctx.fillStyle = '#4A0072';
            ctx.beginPath();
            ctx.moveTo(ex - 10, ey - hsz + 4);
            ctx.lineTo(ex - 6, ey - hsz - 12);
            ctx.lineTo(ex - 2, ey - hsz + 4);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(ex + 2, ey - hsz + 4);
            ctx.lineTo(ex + 6, ey - hsz - 12);
            ctx.lineTo(ex + 10, ey - hsz + 4);
            ctx.fill();
            break;
          }
          default: {
            // Fallback: simple circle
            ctx.beginPath();
            ctx.arc(ex, ey, hsz, 0, Math.PI * 2);
            ctx.fill();
            break;
          }
        }

        // Generic boss HP bar for all boss-type enemies
        if (ENEMY_TYPES[e.type] && ENEMY_TYPES[e.type].pattern === 'boss' && !e.curing) {
          const hpPct = e.hp / e.maxHp;
          const bossBarW = 300;
          const bossBarH = 14;
          const bossBarX = (CANVAS_W - bossBarW) / 2;
          const bossBarY = 60;
          const bossEnraged = e.hp <= e.maxHp / 2;
          // Background
          ctx.fillStyle = '#222';
          ctx.fillRect(bossBarX - 2, bossBarY - 2, bossBarW + 4, bossBarH + 4);
          // Fill color
          let barColor;
          if (e.type === 'megaDragon') {
            const mdP = hpPct > 0.66 ? 1 : hpPct > 0.33 ? 2 : 3;
            barColor = mdP === 3 ? '#FF1744' : mdP === 2 ? '#FF6D00' : '#FF8A65';
          } else {
            barColor = bossEnraged ? '#FF5252' : (hpPct > 0.5 ? '#4CAF50' : '#FF9800');
          }
          ctx.fillStyle = barColor;
          ctx.fillRect(bossBarX, bossBarY, bossBarW * hpPct, bossBarH);
          // Border
          ctx.strokeStyle = bossEnraged ? '#FF5252' : '#666';
          ctx.lineWidth = 1;
          ctx.strokeRect(bossBarX - 2, bossBarY - 2, bossBarW + 4, bossBarH + 4);
          // Label
          const bossName = ENEMY_TYPES[e.type].name.toUpperCase();
          const labelSuffix = bossEnraged ? ' - ENRAGED!' : '';
          ctx.fillStyle = e.type === 'megaDragon' ? '#FF5252' : '#fff';
          ctx.font = 'bold 11px monospace';
          ctx.textAlign = 'center';
          ctx.fillText(bossName + labelSuffix, CANVAS_W / 2, bossBarY - 6);
        }
      }
    }

    // ============================================================
    // DROPS, EFFECTS & HUD
    // ============================================================

    function spawnDrop(x, y) {
      if (state.battle.drops.length >= 10) return;
      const roll = Math.random();
      let cumulative = 0;
      // If any player has hitStreak >= 3, boost heart chance (secret easy mode)
      let heartBoost = 0;
      for (let p = 0; p < state.activePlayerCount; p++) {
        if (state.battle.hitStreak[p] >= 3) { heartBoost = 0.2; break; }
      }
      for (const dKey of Object.keys(DROP_TYPES)) {
        let chance = DROP_TYPES[dKey].chance;
        if (dKey === 'heart') chance += heartBoost;
        cumulative += chance;
        if (roll < cumulative) {
          // friendBeam only works in 2-player mode; reroll to heart otherwise
          const finalKey = (dKey === 'friendBeam' && state.activePlayerCount !== 2) ? 'heart' : dKey;
          state.battle.drops.push({
            type: finalKey, x: x, y: y, vy: 40,
            color: DROP_TYPES[finalKey].color,
            symbol: DROP_TYPES[finalKey].symbol,
          });
          return;
        }
      }
    }

    function updateDrops(dt) {
      const drops = state.battle.drops;
      for (let i = drops.length - 1; i >= 0; i--) {
        const d = drops[i];

        // Magnet: pull drops toward player with magnet active
        for (let pi = 0; pi < state.activePlayerCount; pi++) {
          const bp = state.battle.battlePlayers[pi];
          if (bp.alive && bp.magnet > 0) {
            const dx = bp.x - d.x;
            const dy = BATTLE_PLAYER_Y - d.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist > 5) {
              d.x += (dx / dist) * 200 * dt;
              d.y += (dy / dist) * 200 * dt;
            }
          }
        }

        d.y += d.vy * dt;

        // Check collision with active players
        for (let pi = 0; pi < state.activePlayerCount; pi++) {
          const b = state.battle.battlePlayers[pi];
          if (!b.alive) continue;
          if (Math.abs(d.x - b.x) < 20 && Math.abs(d.y - BATTLE_PLAYER_Y) < 20) {
            applyDrop(d.type, pi);
            drops.splice(i, 1);
            i = Math.min(i, drops.length - 1);
            break;
          }
        }

        // Remove off-screen drops
        if (i >= 0 && i < drops.length && drops[i].y > CANVAS_H + 20) {
          drops.splice(i, 1);
        }
      }
    }

    const POWER_UP_NAMES = {
      heart: 'HEAL', superBoost: 'SUPER BOOST', speedStar: 'SPEED STAR', shield: 'SHIELD',
      tripleShot: 'TRIPLE SHOT', giantShot: 'GIANT SHOT', rapidFire: 'RAPID FIRE',
      magnet: 'MAGNET', timeSlow: 'TIME SLOW', starShield: 'STAR SHIELD',
      giantDragon: 'GIANT DRAGON', clone: 'CLONE', rainbowTrail: 'RAINBOW TRAIL',
      friendBeam: 'FRIENDSHIP BEAM', dragonEgg: 'DRAGON EGG!',
    };

    const POWER_TYPES = ['tripleShot', 'giantShot', 'rapidFire', 'clone', 'timeSlow', 'friendBeam'];

    function spawnBonusEnemies(count) {
      if (state.battle.enemies.length >= 20) return; // cap
      count = Math.min(count, 20 - state.battle.enemies.length);
      const types = ['shadowPuff', 'darkButterfly', 'corruptedEgg'];
      const speedMult = 1 + state.battle.wave * 0.05;
      for (let i = 0; i < count; i++) {
        const typeName = types[Math.floor(Math.random() * types.length)];
        const tc = ENEMY_TYPES[typeName];
        state.battle.enemies.push({
          type: typeName,
          x: 40 + Math.random() * (CANVAS_W - 80),
          y: -tc.size - Math.random() * 60,
          hp: tc.hp, maxHp: tc.hp,
          speed: tc.speed * speedMult * 1.2,
          size: tc.size, color: tc.color, pattern: tc.pattern,
          timer: Math.random() * Math.PI * 2,
          curing: false, cureTimer: 0,
          shoots: false, splits: false, shootTimer: 0,
          spawnTime: state.time,
