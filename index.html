          frozen: 0, vined: 0,
          bonusEnemy: true,
        });
      }
    }

    function applyDrop(type, playerIdx) {
      const b = state.battle.battlePlayers[playerIdx];
      if (type === 'heart') {
        sfxCollect();
      } else {
        sfxPowerUp();
      }
      switch (type) {
        case 'heart':
          b.hearts = Math.min(MAX_HEARTS, b.hearts + 1);
          break;
        case 'superBoost':
          b.superMeter = Math.min(SUPER_METER_MAX, b.superMeter + 25);
          break;
        case 'speedStar':
          b.speedBoost = 5;
          break;
        case 'shield':
          b.shieldActive = true;
          break;
        case 'tripleShot':   b.tripleShot = 10; break;
        case 'giantShot':    b.giantShot = 10; break;
        case 'rapidFire':    b.rapidFire = 8; break;
        case 'magnet':       b.magnet = 8; break;
        case 'timeSlow':     b.timeSlow = 6; break;
        case 'starShield':   b.starShield = 10; break;
        case 'giantDragon':  b.giantDragon = 8; break;
        case 'clone':        b.clone = 10; break;
        case 'rainbowTrail': b.rainbowTrail = 10; b.trailPoints = []; break;
        case 'friendBeam':   state.battle.friendBeam = 10; break;
        case 'dragonEgg': {
          const dragonKeys = Object.keys(DRAGON_CONFIGS);
          const currentKey = state.battle.playerDragons[playerIdx];
          const otherKeys = dragonKeys.filter(k => k !== currentKey);
          const newKey = otherKeys[Math.floor(Math.random() * otherKeys.length)];
          state.battle.playerDragons[playerIdx] = newKey;
          b.superMeter = Math.min(SUPER_METER_MAX, b.superMeter + 15);
          state.battle.effects.push({
            type: 'powerUpText',
            x: b.x, y: BATTLE_PLAYER_Y - 30,
            timer: 2.0, maxTimer: 2.0,
            text: DRAGON_CONFIGS[newKey].name + '!',
            color: DRAGON_CONFIGS[newKey].color,
          });
          break;
        }
      }

      // Dynamic enemy compensation for power types (gated by cooldown)
      if (POWER_TYPES.includes(type) && state.battle.bonusEnemyCooldown <= 0) {
        spawnBonusEnemies(3);
        state.battle.bonusEnemyCooldown = 5;
      }

      // Collect effect
      state.battle.effects.push({
        x: b.x, y: BATTLE_PLAYER_Y - 20,
        type: 'collect',
        timer: 0, maxTimer: 0.8,
        text: '+' + DROP_TYPES[type].symbol,
        color: DROP_TYPES[type].color,
      });

      // Power-up name text floating up
      state.battle.effects.push({
        type: 'powerUpText',
        x: b.x, y: BATTLE_PLAYER_Y - 30,
        timer: 1.5, maxTimer: 1.5,
        text: POWER_UP_NAMES[type] || type.toUpperCase(),
        color: DROP_TYPES[type].color,
      });

      // Screen edge flash
      state.battle.effects.push({
        type: 'edgeFlash',
        timer: 0.3, maxTimer: 0.3,
        color: DROP_TYPES[type].color,
      });
    }

    function drawDrops() {
      for (const d of state.battle.drops) {
        const bob = Math.sin(state.time * 4 + d.x * 0.1) * 3;
        ctx.font = 'bold 18px serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = d.color;
        ctx.fillText(d.symbol, d.x, d.y + bob);
      }
      ctx.textBaseline = 'alphabetic';
    }

    function updateBattleEffects(dt) {
      const effects = state.battle.effects;
      for (let i = effects.length - 1; i >= 0; i--) {
        const e = effects[i];
        e.timer -= dt;
        if (e.timer <= 0) {
          effects.splice(i, 1);
        }
      }
    }

    function drawBattleEffects() {
      for (const e of state.battle.effects) {
        const progress = 1 - (e.timer / (e.maxTimer || 0.6));
        const alpha = Math.max(0, e.timer / (e.maxTimer || 0.6));

        switch (e.type) {
          case 'cure': {
            // 8 sparkles bursting outward in rainbow colors
            for (let s = 0; s < 8; s++) {
              const angle = (s / 8) * Math.PI * 2;
              const dist = progress * 30;
              const sx = e.x + Math.cos(angle) * dist;
              const sy = e.y + Math.sin(angle) * dist;
              const hue = (s * 45 + state.time * 200) % 360;
              ctx.fillStyle = 'hsla(' + hue + ', 90%, 70%, ' + alpha + ')';
              ctx.beginPath();
              ctx.arc(sx, sy, 3 * alpha, 0, Math.PI * 2);
              ctx.fill();
            }
            break;
          }
          case 'hit': {
            // Expanding white circle, fading
            ctx.strokeStyle = 'rgba(255, 255, 255, ' + alpha + ')';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(e.x, e.y, progress * 15, 0, Math.PI * 2);
            ctx.stroke();
            break;
          }
          case 'playerHit': {
            // Expanding red ring
            ctx.strokeStyle = 'rgba(255, 50, 50, ' + alpha + ')';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(e.x, e.y, progress * 25, 0, Math.PI * 2);
            ctx.stroke();
            break;
          }
          case 'collect': {
            // Floating "+" text upward, fading
            ctx.globalAlpha = alpha;
            ctx.fillStyle = e.color || '#fff';
            ctx.font = 'bold 16px monospace';
            ctx.textAlign = 'center';
            ctx.fillText(e.text || '+', e.x, e.y - progress * 30);
            ctx.globalAlpha = 1;
            break;
          }
          case 'shieldBreak': {
            // Expanding green ring
            ctx.strokeStyle = 'rgba(105, 240, 174, ' + alpha + ')';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(e.x, e.y, progress * 30, 0, Math.PI * 2);
            ctx.stroke();
            break;
          }
          case 'powerUpText': {
            const t = progress;
            ctx.globalAlpha = 1 - t;
            ctx.fillStyle = e.color;
            ctx.font = 'bold 16px monospace';
            ctx.textAlign = 'center';
            ctx.fillText(e.text, e.x, e.y - t * 40);
            ctx.globalAlpha = 1;
            break;
          }
          case 'edgeFlash': {
            ctx.globalAlpha = alpha * 0.4;
            ctx.fillStyle = e.color;
            const edgeW = 12;
            ctx.fillRect(0, 0, edgeW, CANVAS_H);
            ctx.fillRect(CANVAS_W - edgeW, 0, edgeW, CANVAS_H);
            ctx.fillRect(0, 0, CANVAS_W, edgeW);
            ctx.fillRect(0, CANVAS_H - edgeW, CANVAS_W, edgeW);
            ctx.globalAlpha = 1;
            break;
          }

          // ── SPECTACULAR SUPER EFFECTS ──────────────────────────────

          case 'flameWave': {
            // FIRE: wall of flame sweeping bottom-to-top with particles
            // Warm orange vignette border
            const fvAlpha = alpha * 0.5;
            ctx.globalAlpha = fvAlpha;
            const fvGrad = ctx.createLinearGradient(0, 0, 0, CANVAS_H);
            fvGrad.addColorStop(0, 'rgba(255,80,0,0.0)');
            fvGrad.addColorStop(0.7, 'rgba(255,80,0,0.0)');
            fvGrad.addColorStop(1, 'rgba(255,120,0,0.6)');
            ctx.fillStyle = fvGrad;
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
            ctx.globalAlpha = 1;

            // Three layered flame walls sweeping upward
            const wallY = CANVAS_H * (1 - progress * 1.15);
            const layers = [
              { color: 'rgba(255,60,0,', width: 90, offset: 0 },
              { color: 'rgba(255,130,0,', width: 60, offset: 15 },
              { color: 'rgba(255,210,0,', width: 30, offset: 30 },
            ];
            for (const layer of layers) {
              ctx.globalAlpha = alpha * 0.85;
              // Wavy flame top using bezier segments
              ctx.beginPath();
              ctx.moveTo(0, wallY + layer.offset);
              for (let fx = 0; fx <= CANVAS_W; fx += 40) {
                const waveMag = 18 + layer.width * 0.2;
                const wx1 = fx + 10;
                const wy1 = wallY + layer.offset - Math.abs(Math.sin((fx / CANVAS_W) * Math.PI * 6 + state.time * 8)) * waveMag;
                const wx2 = fx + 30;
                const wy2 = wallY + layer.offset + 8;
                ctx.bezierCurveTo(wx1, wy1, wx2, wy2, fx + 40, wallY + layer.offset);
              }
              ctx.lineTo(CANVAS_W, CANVAS_H);
              ctx.lineTo(0, CANVAS_H);
              ctx.closePath();
              ctx.fillStyle = layer.color + '0.9)';
              ctx.fill();
              ctx.globalAlpha = 1;
            }

            // Fire particles shooting upward
            for (let fp = 0; fp < 30; fp++) {
              const seed = fp * 137.5;
              const px = ((seed * 73.1) % CANVAS_W);
              const baseY = wallY + (fp % 5) * 12;
              const riseAmt = progress * 180 * (0.5 + (fp % 3) * 0.4);
              const py = baseY - riseAmt * ((fp % 7) / 7);
              if (py > CANVAS_H) continue;
              const particleAlpha = alpha * (1 - (py < wallY ? (wallY - py) / 120 : 0));
              if (particleAlpha <= 0) continue;
              ctx.globalAlpha = Math.min(1, particleAlpha);
              const hue = 20 + (fp % 3) * 20; // orange to yellow
              ctx.fillStyle = 'hsl(' + hue + ', 100%, 60%)';
              ctx.beginPath();
              ctx.arc(px, py, 3 + (fp % 4), 0, Math.PI * 2);
              ctx.fill();
            }
            ctx.globalAlpha = 1;

            // Colored vignette border (warm orange edges)
            ctx.globalAlpha = alpha * 0.35;
            const fEdge = 60;
            ctx.fillStyle = 'rgba(255,80,0,1)';
            ctx.fillRect(0, 0, fEdge, CANVAS_H);
            ctx.fillRect(CANVAS_W - fEdge, 0, fEdge, CANVAS_H);
            ctx.fillRect(0, 0, CANVAS_W, fEdge);
            ctx.fillRect(0, CANVAS_H - fEdge, CANVAS_W, fEdge);
            ctx.globalAlpha = 1;
            break;
          }

          case 'freezeBlast': {
            // ICE: crystals explode outward, frosty overlay, frozen tint
            // Frosty full-screen overlay
            ctx.globalAlpha = alpha * 0.35;
            ctx.fillStyle = 'rgba(180,230,255,1)';
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
            ctx.globalAlpha = 1;

            // Blue-white vignette border
            ctx.globalAlpha = alpha * 0.45;
            const iEdge = 55;
            ctx.fillStyle = 'rgba(100,200,255,1)';
            ctx.fillRect(0, 0, iEdge, CANVAS_H);
            ctx.fillRect(CANVAS_W - iEdge, 0, iEdge, CANVAS_H);
            ctx.fillRect(0, 0, CANVAS_W, iEdge);
            ctx.fillRect(0, CANVAS_H - iEdge, CANVAS_W, iEdge);
            ctx.globalAlpha = 1;

            // Ice crystals exploding outward in starburst from dragon position
            const icx = e.x, icy = e.y;
            for (let ic = 0; ic < 36; ic++) {
              const angle = (ic / 36) * Math.PI * 2;
              const speed = 80 + (ic % 4) * 50;
              const dist = progress * speed;
              const cx = icx + Math.cos(angle) * dist;
              const cy = icy + Math.sin(angle) * dist;
              if (cx < 0 || cx > CANVAS_W || cy < 0 || cy > CANVAS_H) continue;
              const sz = 4 + (ic % 3) * 3;
              ctx.globalAlpha = alpha * 0.9;
              ctx.save();
              ctx.translate(cx, cy);
              ctx.rotate(angle + progress * Math.PI);
              // Diamond / crystal shape
              ctx.beginPath();
              ctx.moveTo(0, -sz);
              ctx.lineTo(sz * 0.4, 0);
              ctx.lineTo(0, sz);
              ctx.lineTo(-sz * 0.4, 0);
              ctx.closePath();
              ctx.fillStyle = ic % 2 === 0 ? 'rgba(200,240,255,0.95)' : 'rgba(120,200,255,0.95)';
              ctx.fill();
              ctx.strokeStyle = 'rgba(255,255,255,0.7)';
              ctx.lineWidth = 1;
              ctx.stroke();
              ctx.restore();
            }

            // Snowflake scatter across screen (static positions, fade in)
            ctx.font = '18px serif';
            ctx.textAlign = 'center';
            for (let sf = 0; sf < 20; sf++) {
              const sfx = ((sf * 157.3) % CANVAS_W);
              const sfy = ((sf * 89.7) % CANVAS_H);
              ctx.globalAlpha = progress * alpha * 0.8;
              ctx.fillStyle = '#ffffff';
              ctx.fillText('\u2745', sfx, sfy);
            }
            ctx.globalAlpha = 1;
            break;
          }

          case 'vineBurst': {
            // NATURE: thick vines from bottom, leaves, green energy rings
            // Green screen overlay
            ctx.globalAlpha = alpha * 0.22;
            ctx.fillStyle = 'rgba(30,120,30,1)';
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
            ctx.globalAlpha = 1;

            // Green vignette border
            ctx.globalAlpha = alpha * 0.4;
            const vEdge = 50;
            ctx.fillStyle = 'rgba(34,139,34,1)';
            ctx.fillRect(0, 0, vEdge, CANVAS_H);
            ctx.fillRect(CANVAS_W - vEdge, 0, vEdge, CANVAS_H);
            ctx.fillRect(0, 0, CANVAS_W, vEdge);
            ctx.fillRect(0, CANVAS_H - vEdge, CANVAS_W, vEdge);
            ctx.globalAlpha = 1;

            // Thick vines shooting upward from bottom
            for (let v = 0; v < 8; v++) {
              const vx = (v / 8) * CANVAS_W + (v % 2 === 0 ? 20 : -20) + 30;
              const vineHeight = progress * CANVAS_H * 1.1;
              const sway = Math.sin(v * 1.7 + state.time * 3) * 30 * progress;
              ctx.globalAlpha = alpha * 0.9;
              ctx.strokeStyle = v % 2 === 0 ? 'rgba(50,160,50,1)' : 'rgba(80,200,80,1)';
              ctx.lineWidth = 6 + (v % 3) * 3;
              ctx.lineCap = 'round';
              ctx.beginPath();
              ctx.moveTo(vx, CANVAS_H);
              // S-curve vine
              ctx.bezierCurveTo(
                vx + sway, CANVAS_H - vineHeight * 0.33,
                vx - sway * 1.5, CANVAS_H - vineHeight * 0.66,
                vx + sway * 0.5, CANVAS_H - vineHeight
              );
              ctx.stroke();
              // Branch off main vine
              if (progress > 0.4) {
                const branchY = CANVAS_H - vineHeight * 0.5;
                const branchLen = 40 * (progress - 0.4) / 0.6;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(vx + sway * 0.3, branchY);
                ctx.quadraticCurveTo(vx + sway + 30, branchY - 20, vx + sway + branchLen, branchY - branchLen * 0.7);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(vx + sway * 0.3, branchY);
                ctx.quadraticCurveTo(vx + sway - 30, branchY - 20, vx + sway - branchLen, branchY - branchLen * 0.7);
                ctx.stroke();
              }
            }
            ctx.lineCap = 'butt';
            ctx.globalAlpha = 1;

            // Leaf scatter
            ctx.font = '14px serif';
            ctx.textAlign = 'center';
            for (let lf = 0; lf < 25; lf++) {
              const lfx = ((lf * 113.9) % CANVAS_W);
              const lfy = CANVAS_H - progress * ((lf * 77.3) % CANVAS_H) - 20;
              if (lfy < 0) continue;
              ctx.globalAlpha = alpha * 0.85;
              ctx.fillStyle = lf % 3 === 0 ? '#55cc55' : lf % 3 === 1 ? '#33aa33' : '#88dd44';
              ctx.save();
              ctx.translate(lfx, lfy);
              ctx.rotate(state.time * 2 + lf);
              ctx.fillText('\u2764', 0, 0); // use heart shape rotated for leaf look
              ctx.restore();
            }

            // Green energy rings pulsing from center
            for (let ring = 0; ring < 3; ring++) {
              const ringProgress = (progress + ring * 0.33) % 1;
              const ringR = ringProgress * Math.max(CANVAS_W, CANVAS_H) * 0.7;
              ctx.globalAlpha = (1 - ringProgress) * alpha * 0.6;
              ctx.strokeStyle = ring % 2 === 0 ? 'rgba(80,200,80,1)' : 'rgba(150,255,100,1)';
              ctx.lineWidth = 4;
              ctx.beginPath();
              ctx.arc(CANVAS_W / 2, CANVAS_H / 2, ringR, 0, Math.PI * 2);
              ctx.stroke();
            }
            ctx.globalAlpha = 1;
            break;
          }

          case 'healWave': {
            // LOVE: massive heart explosion, spiral hearts, pink sparkle rain
            // Warm pink screen glow
            const glowA = Math.sin(progress * Math.PI) * alpha * 0.3;
            ctx.globalAlpha = glowA;
            ctx.fillStyle = 'rgba(255,100,180,1)';
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
            ctx.globalAlpha = 1;

            // Pink vignette border
            ctx.globalAlpha = alpha * 0.4;
            const hEdge = 55;
            ctx.fillStyle = 'rgba(255,20,120,1)';
            ctx.fillRect(0, 0, hEdge, CANVAS_H);
            ctx.fillRect(CANVAS_W - hEdge, 0, hEdge, CANVAS_H);
            ctx.fillRect(0, 0, CANVAS_W, hEdge);
            ctx.fillRect(0, CANVAS_H - hEdge, CANVAS_W, hEdge);
            ctx.globalAlpha = 1;

            // Big pulsing heart in center
            const bigHeartSize = 48 + Math.sin(progress * Math.PI * 4) * 12;
            ctx.globalAlpha = alpha * 0.9;
            ctx.font = bigHeartSize + 'px serif';
            ctx.textAlign = 'center';
            ctx.fillStyle = '#FF1493';
            ctx.fillText('\u2665', CANVAS_W / 2, CANVAS_H / 2 + bigHeartSize * 0.35);
            // Glowing ring around big heart
            ctx.globalAlpha = alpha * 0.5;
            ctx.strokeStyle = 'rgba(255,100,180,1)';
            ctx.lineWidth = 6;
            ctx.beginPath();
            ctx.arc(CANVAS_W / 2, CANVAS_H / 2, bigHeartSize * 0.8 + Math.sin(progress * Math.PI * 4) * 8, 0, Math.PI * 2);
            ctx.stroke();
            ctx.globalAlpha = 1;

            // Dozens of hearts spiraling outward
            for (let h = 0; h < 40; h++) {
              const spiralAngle = (h / 40) * Math.PI * 6 + progress * Math.PI * 2;
              const spiralR = progress * (60 + h * 7);
              const hx = CANVAS_W / 2 + Math.cos(spiralAngle) * spiralR;
              const hy = CANVAS_H / 2 + Math.sin(spiralAngle) * spiralR;
              if (hx < -30 || hx > CANVAS_W + 30 || hy < -30 || hy > CANVAS_H + 30) continue;
              const sz = 10 + (h % 4) * 6;
              const pinkHue = 320 + (h % 3) * 15;
              ctx.globalAlpha = alpha * (0.6 + (h % 3) * 0.13);
              ctx.font = sz + 'px serif';
              ctx.fillStyle = 'hsl(' + pinkHue + ', 100%, 65%)';
              ctx.fillText('\u2665', hx, hy);
            }

            // Pink sparkle rain falling from top
            for (let sp = 0; sp < 30; sp++) {
              const spx = ((sp * 157.3 + 50) % CANVAS_W);
              const spDropFrac = (progress + sp * 0.033) % 1;
              const spy = spDropFrac * (CANVAS_H + 20) - 10;
              ctx.globalAlpha = alpha * 0.75 * (1 - spDropFrac * 0.4);
              ctx.fillStyle = sp % 2 === 0 ? '#FF69B4' : '#FFB6C1';
              ctx.font = '10px serif';
              ctx.fillText('\u2605', spx, spy);
            }
            ctx.globalAlpha = 1;
            break;
          }

          case 'shadowCloak': {
            // SHADOW: dark energy swirls, tendrils, particle vortex, dark aura
            // Dark purple vignette border
            ctx.globalAlpha = alpha * 0.5;
            const sEdge = 70;
            ctx.fillStyle = 'rgba(30,0,60,1)';
            ctx.fillRect(0, 0, sEdge, CANVAS_H);
            ctx.fillRect(CANVAS_W - sEdge, 0, sEdge, CANVAS_H);
            ctx.fillRect(0, 0, CANVAS_W, sEdge);
            ctx.fillRect(0, CANVAS_H - sEdge, CANVAS_W, sEdge);
            ctx.globalAlpha = 1;

            // Dark aura glow around dragon
            const auraR = 50 + Math.sin(progress * Math.PI * 6) * 15;
            ctx.globalAlpha = alpha * 0.6;
            const auraGrad = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, auraR + 30);
            auraGrad.addColorStop(0, 'rgba(120,0,200,0.8)');
            auraGrad.addColorStop(0.5, 'rgba(60,0,120,0.5)');
            auraGrad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = auraGrad;
            ctx.beginPath();
            ctx.arc(e.x, e.y, auraR + 30, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;

            // Shadow tendrils reaching outward
            for (let td = 0; td < 12; td++) {
              const tdAngle = (td / 12) * Math.PI * 2 + state.time * 1.5;
              const tdLen = (60 + (td % 3) * 40) * progress;
              const tdX = e.x + Math.cos(tdAngle) * tdLen;
              const tdY = e.y + Math.sin(tdAngle) * tdLen;
              ctx.globalAlpha = alpha * 0.7;
              ctx.strokeStyle = td % 2 === 0 ? 'rgba(100,0,200,0.8)' : 'rgba(50,0,100,0.8)';
              ctx.lineWidth = 3 + (td % 3);
              ctx.lineCap = 'round';
              ctx.beginPath();
              ctx.moveTo(e.x, e.y);
              const cpx = e.x + Math.cos(tdAngle + 0.4) * tdLen * 0.6;
              const cpy = e.y + Math.sin(tdAngle + 0.4) * tdLen * 0.6;
              ctx.quadraticCurveTo(cpx, cpy, tdX, tdY);
              ctx.stroke();
            }
            ctx.lineCap = 'butt';

            // Dark particle vortex spinning around dragon
            for (let dp = 0; dp < 25; dp++) {
              const dpAngle = (dp / 25) * Math.PI * 2 + state.time * 4 + progress * Math.PI * 3;
              const dpR = 35 + (dp % 4) * 18;
              const dpx = e.x + Math.cos(dpAngle) * dpR;
              const dpy = e.y + Math.sin(dpAngle) * dpR;
              ctx.globalAlpha = alpha * 0.8;
              ctx.fillStyle = dp % 3 === 0 ? 'rgba(150,50,255,0.9)' : dp % 3 === 1 ? 'rgba(80,0,160,0.9)' : 'rgba(200,150,255,0.7)';
              ctx.beginPath();
              ctx.arc(dpx, dpy, 2 + dp % 3, 0, Math.PI * 2);
              ctx.fill();
            }
            ctx.globalAlpha = 1;
            break;
          }

          case 'supernova': {
            // STAR: massive starburst, white flash, golden rays, star rain
            const cx = CANVAS_W / 2, cy = CANVAS_H / 2;

            // White flash at start, fades quickly
            if (progress < 0.25) {
              ctx.globalAlpha = (1 - progress / 0.25) * 0.85;
              ctx.fillStyle = '#ffffff';
              ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
              ctx.globalAlpha = 1;
            }

            // Golden vignette border
            ctx.globalAlpha = alpha * 0.45;
            const snEdge = 65;
            ctx.fillStyle = 'rgba(255,200,0,1)';
            ctx.fillRect(0, 0, snEdge, CANVAS_H);
            ctx.fillRect(CANVAS_W - snEdge, 0, snEdge, CANVAS_H);
            ctx.fillRect(0, 0, CANVAS_W, snEdge);
            ctx.fillRect(0, CANVAS_H - snEdge, CANVAS_W, snEdge);
            ctx.globalAlpha = 1;

            // Multiple expanding rings of light
            for (let ring = 0; ring < 4; ring++) {
              const rp = (progress + ring * 0.25) % 1;
              const rR = rp * Math.max(CANVAS_W, CANVAS_H) * 0.75;
              ctx.globalAlpha = (1 - rp) * alpha * 0.7;
              ctx.strokeStyle = ring % 2 === 0 ? 'rgba(255,220,0,1)' : 'rgba(255,255,150,1)';
              ctx.lineWidth = 5 - ring;
              ctx.beginPath();
              ctx.arc(cx, cy, rR, 0, Math.PI * 2);
              ctx.stroke();
            }
            ctx.globalAlpha = 1;

            // Golden rays shooting in all directions
            const numRays = 16;
            for (let ray = 0; ray < numRays; ray++) {
              const rayAngle = (ray / numRays) * Math.PI * 2 + progress * 0.5;
              const rayLen = progress * Math.max(CANVAS_W, CANVAS_H) * 0.8;
              const rayEndX = cx + Math.cos(rayAngle) * rayLen;
              const rayEndY = cy + Math.sin(rayAngle) * rayLen;
              ctx.globalAlpha = alpha * 0.55;
              ctx.strokeStyle = ray % 2 === 0 ? 'rgba(255,220,0,1)' : 'rgba(255,255,100,1)';
              ctx.lineWidth = 4 - (ray % 2);
              ctx.lineCap = 'round';
              ctx.beginPath();
              ctx.moveTo(cx, cy);
              ctx.lineTo(rayEndX, rayEndY);
              ctx.stroke();
            }
            ctx.lineCap = 'butt';

            // Central golden glow
            ctx.globalAlpha = alpha * 0.5;
            const snGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 80 + progress * 60);
            snGrad.addColorStop(0, 'rgba(255,255,200,0.9)');
            snGrad.addColorStop(0.4, 'rgba(255,220,0,0.6)');
            snGrad.addColorStop(1, 'rgba(255,150,0,0)');
            ctx.fillStyle = snGrad;
            ctx.beginPath();
            ctx.arc(cx, cy, 80 + progress * 60, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;

            // Star shapes scattering + golden particle rain
            ctx.font = '16px serif';
            ctx.textAlign = 'center';
            for (let st = 0; st < 30; st++) {
              const stAngle = (st / 30) * Math.PI * 2 + progress * 1.5;
              const stDist = progress * (50 + (st % 5) * 70);
              const stx = cx + Math.cos(stAngle) * stDist;
              const sty = cy + Math.sin(stAngle) * stDist;
              if (stx < -20 || stx > CANVAS_W + 20 || sty < -20 || sty > CANVAS_H + 20) continue;
              ctx.globalAlpha = alpha * (0.7 + (st % 3) * 0.1);
              ctx.fillStyle = st % 3 === 0 ? '#FFD700' : st % 3 === 1 ? '#FFF176' : '#FFB300';
              ctx.fillText('\u2605', stx, sty);
            }
            // Golden particle rain from top
            for (let gp = 0; gp < 20; gp++) {
              const gpx = ((gp * 193.7) % CANVAS_W);
              const gpDrop = (progress + gp * 0.05) % 1;
              const gpy = gpDrop * (CANVAS_H + 10) - 5;
              ctx.globalAlpha = alpha * 0.7 * (1 - gpDrop * 0.3);
              ctx.fillStyle = gp % 2 === 0 ? '#FFD700' : '#FFEE58';
              ctx.beginPath();
              ctx.arc(gpx, gpy, 3, 0, Math.PI * 2);
              ctx.fill();
            }
            ctx.globalAlpha = 1;
            break;
          }

          case 'rainbowWave': {
            // RAINBOW: arc sweep, shockwave rings, prismatic beams, confetti
            const rcx = CANVAS_W / 2, rcy = CANVAS_H / 2;

            // Cycling rainbow screen tint
            const rainbowHue = (progress * 360 + state.time * 60) % 360;
            ctx.globalAlpha = alpha * 0.18;
            ctx.fillStyle = 'hsl(' + rainbowHue + ', 90%, 60%)';
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
            ctx.globalAlpha = 1;

            // Rainbow arc sweeping across the screen
            const arcY = CANVAS_H * 0.4;
            const arcR = CANVAS_W * 0.7;
            for (let band = 0; band < 7; band++) {
              const bandHue = (band / 7) * 300;
              const bandR = arcR + band * 8;
              const arcStart = -Math.PI * 0.8 + progress * Math.PI * 0.1;
              const arcEnd = Math.PI * -0.2 + progress * Math.PI * 0.7;
              ctx.globalAlpha = alpha * 0.7;
              ctx.strokeStyle = 'hsl(' + bandHue + ', 100%, 55%)';
              ctx.lineWidth = 9;
              ctx.lineCap = 'round';
              ctx.beginPath();
              ctx.arc(rcx, arcY + arcR, bandR, arcStart, arcEnd);
              ctx.stroke();
            }
            ctx.lineCap = 'butt';
            ctx.globalAlpha = 1;

            // Multiple expanding shockwave rings, each a different color
            for (let rw = 0; rw < 5; rw++) {
              const rwP = (progress + rw * 0.2) % 1;
              const rwR = rwP * Math.max(CANVAS_W, CANVAS_H) * 0.75;
              const rwHue = (rw * 60) % 360;
              ctx.globalAlpha = (1 - rwP) * alpha * 0.65;
              ctx.strokeStyle = 'hsl(' + rwHue + ', 100%, 60%)';
              ctx.lineWidth = 5;
              ctx.beginPath();
              ctx.arc(rcx, rcy, rwR, 0, Math.PI * 2);
              ctx.stroke();
            }
            ctx.globalAlpha = 1;

            // Prismatic beams in 8 directions
            for (let beam = 0; beam < 8; beam++) {
              const beamAngle = (beam / 8) * Math.PI * 2 + state.time;
              const beamLen = progress * Math.max(CANVAS_W, CANVAS_H) * 0.9;
              const bHue = (beam * 45 + state.time * 80) % 360;
              ctx.globalAlpha = alpha * 0.45;
              ctx.strokeStyle = 'hsl(' + bHue + ', 100%, 65%)';
              ctx.lineWidth = 5;
              ctx.lineCap = 'round';
              ctx.beginPath();
              ctx.moveTo(rcx, rcy);
              ctx.lineTo(rcx + Math.cos(beamAngle) * beamLen, rcy + Math.sin(beamAngle) * beamLen);
              ctx.stroke();
            }
            ctx.lineCap = 'butt';

            // Rainbow confetti everywhere
            ctx.textAlign = 'center';
            for (let cf = 0; cf < 50; cf++) {
              const cfx = ((cf * 127.4 + 20) % CANVAS_W);
              const cfDrop = (progress * 1.2 + cf * 0.02) % 1;
              const cfy = cfDrop * (CANVAS_H + 20) - 10;
              if (cfy < 0) continue;
              const cfHue = (cf * 7.2) % 360;
              ctx.globalAlpha = alpha * 0.8 * (1 - cfDrop * 0.3);
              ctx.fillStyle = 'hsl(' + cfHue + ', 100%, 65%)';
              ctx.font = (8 + cf % 5) + 'px serif';
              const shapes = ['\u25A0', '\u25CF', '\u2605', '\u2666'];
              ctx.fillText(shapes[cf % 4], cfx, cfy);
            }
            ctx.globalAlpha = 1;
            break;
          }

          case 'phantomBlast': {
            // GHOST: ghostly white ripples expanding outward, transparent overlay
            ctx.globalAlpha = alpha * 0.18;
            ctx.fillStyle = 'rgba(176, 190, 197, 1)';
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
            ctx.globalAlpha = 1;

            // Ghost ripples expanding outward
            const pcx = CANVAS_W / 2, pcy = CANVAS_H / 2;
            for (let rp = 0; rp < 4; rp++) {
              const rpP = (progress + rp * 0.25) % 1;
              const rpR = rpP * Math.max(CANVAS_W, CANVAS_H) * 0.75;
              ctx.globalAlpha = (1 - rpP) * alpha * 0.55;
              ctx.strokeStyle = rp % 2 === 0 ? 'rgba(236,239,241,1)' : 'rgba(176,190,197,1)';
              ctx.lineWidth = 4;
              ctx.beginPath();
              ctx.arc(pcx, pcy, rpR, 0, Math.PI * 2);
              ctx.stroke();
            }
            ctx.globalAlpha = 1;

            // Floating ghost wisps
            for (let gw = 0; gw < 12; gw++) {
              const gwx = ((gw * 113.7 + 30) % CANVAS_W);
              const gwRise = progress * 80 * (0.5 + (gw % 3) * 0.25);
              const gwy = CANVAS_H * 0.5 + ((gw * 57.3) % (CANVAS_H * 0.4)) - gwRise;
              if (gwy < 0) continue;
              ctx.globalAlpha = alpha * 0.7 * (1 - progress * 0.5);
              ctx.fillStyle = '#ECEFF1';
              ctx.font = (14 + gw % 8) + 'px serif';
              ctx.textAlign = 'center';
              ctx.fillText('\u25CB', gwx, gwy); // open circle for wisp
            }

            // Pale vignette
            ctx.globalAlpha = alpha * 0.3;
            const pEdge = 45;
            ctx.fillStyle = 'rgba(176,190,197,1)';
            ctx.fillRect(0, 0, pEdge, CANVAS_H);
            ctx.fillRect(CANVAS_W - pEdge, 0, pEdge, CANVAS_H);
            ctx.fillRect(0, 0, CANVAS_W, pEdge);
            ctx.fillRect(0, CANVAS_H - pEdge, CANVAS_W, pEdge);
            ctx.globalAlpha = 1;
            break;
          }

          case 'thornStorm': {
            // THORN: green thorn shapes raining from top, green flash
            ctx.globalAlpha = alpha * 0.22;
            ctx.fillStyle = 'rgba(51, 105, 30, 1)';
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
            ctx.globalAlpha = 1;

            // Green flash border
            ctx.globalAlpha = alpha * 0.4;
            const tEdge = 50;
            ctx.fillStyle = 'rgba(85,139,47,1)';
            ctx.fillRect(0, 0, tEdge, CANVAS_H);
            ctx.fillRect(CANVAS_W - tEdge, 0, tEdge, CANVAS_H);
            ctx.fillRect(0, 0, CANVAS_W, tEdge);
            ctx.fillRect(0, CANVAS_H - tEdge, CANVAS_W, tEdge);
            ctx.globalAlpha = 1;

            // Thorns raining down
            for (let th = 0; th < 35; th++) {
              const thx = ((th * 97.3 + 15) % CANVAS_W);
              const thDrop = (progress * 1.2 + th * 0.03) % 1;
              const thy = thDrop * (CANVAS_H + 20) - 10;
              if (thy < 0) continue;
              ctx.globalAlpha = alpha * 0.85;
              ctx.fillStyle = th % 3 === 0 ? '#558B2F' : th % 3 === 1 ? '#33691E' : '#8BC34A';
              ctx.save();
              ctx.translate(thx, thy);
              ctx.rotate(Math.PI + (th % 5) * 0.3);
              const ths = 6 + th % 5;
              ctx.beginPath();
              ctx.moveTo(0, -ths * 1.8);
              ctx.lineTo(ths * 0.5, ths * 0.6);
              ctx.lineTo(-ths * 0.5, ths * 0.6);
              ctx.closePath();
              ctx.fill();
              ctx.restore();
            }
            ctx.globalAlpha = 1;
            break;
          }

          case 'thornExplosion': {
            // Small thorn burst when 3 thorns explode on an enemy
            for (let te = 0; te < 8; te++) {
              const angle = (te / 8) * Math.PI * 2;
              const dist = progress * 45;
              const tex = e.x + Math.cos(angle) * dist;
              const tey = e.y + Math.sin(angle) * dist;
              ctx.globalAlpha = alpha * 0.9;
              ctx.fillStyle = te % 2 === 0 ? '#558B2F' : '#8BC34A';
              ctx.save();
              ctx.translate(tex, tey);
              ctx.rotate(angle);
              ctx.beginPath();
              ctx.moveTo(0, -6 * alpha);
              ctx.lineTo(3 * alpha, 3 * alpha);
              ctx.lineTo(-3 * alpha, 3 * alpha);
              ctx.closePath();
              ctx.fill();
              ctx.restore();
            }
            ctx.globalAlpha = 1;
            break;
          }

          case 'chainLightning': {
            // Jagged lightning arc between two points
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.strokeStyle = '#FFEB3B';
            ctx.lineWidth = 2;
            ctx.beginPath();
            const clSegs = 8;
            ctx.moveTo(e.x, e.y);
            for (let cl = 1; cl < clSegs; cl++) {
              const t = cl / clSegs;
              const mx = e.x + (e.x2 - e.x) * t + (Math.random() - 0.5) * 20;
              const my = e.y + (e.y2 - e.y) * t + (Math.random() - 0.5) * 20;
              ctx.lineTo(mx, my);
            }
            ctx.lineTo(e.x2, e.y2);
            ctx.stroke();
            ctx.strokeStyle = '#FFF';
            ctx.lineWidth = 1;
            ctx.globalAlpha = alpha * 0.7;
            ctx.stroke();
            ctx.restore();
            break;
          }

          case 'lightningStrike': {
            // Vertical bolt from top of screen down to strike point
            ctx.save();
            ctx.globalAlpha = alpha;
            const lsSegs = 10;
            ctx.strokeStyle = '#FFEB3B';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(e.x, 0);
            for (let ls = 1; ls < lsSegs; ls++) {
              const t = ls / lsSegs;
              const lx = e.x + (Math.random() - 0.5) * 25;
              const ly = e.y * t;
              ctx.lineTo(lx, ly);
            }
            ctx.lineTo(e.x, e.y);
            ctx.stroke();
            ctx.strokeStyle = '#FFF';
            ctx.lineWidth = 1;
            ctx.stroke();
            // Impact flash
            ctx.globalAlpha = alpha * 0.8;
            ctx.fillStyle = '#FFEB3B';
            ctx.beginPath();
            ctx.arc(e.x, e.y, 12 * alpha, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
            break;
          }

          case 'thunderFlash': {
            // White screen flash
            ctx.globalAlpha = alpha * 0.6;
            ctx.fillStyle = '#FFF';
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
            ctx.globalAlpha = 1;
            break;
          }

          case 'crystalBarrierForm': {
            // Crystal diamonds forming along horizontal line
            for (let cd = 0; cd < 16; cd++) {
              const cx = (cd / 16) * CANVAS_W + (CANVAS_W / 32);
              const cdProgress = Math.max(0, progress * 2 - (cd / 16));
              if (cdProgress <= 0) continue;
              ctx.save();
              ctx.translate(cx, e.y);
              ctx.globalAlpha = Math.min(1, cdProgress) * alpha;
              const ds = 8 * Math.min(1, cdProgress);
              ctx.fillStyle = '#CE93D8';
              ctx.beginPath();
              ctx.moveTo(0, -ds);
              ctx.lineTo(ds * 0.5, 0);
              ctx.lineTo(0, ds);
              ctx.lineTo(-ds * 0.5, 0);
              ctx.closePath();
              ctx.fill();
              ctx.strokeStyle = '#F3E5F5';
              ctx.lineWidth = 1;
              ctx.stroke();
              ctx.restore();
            }
            break;
          }

          case 'blackHoleForm': {
            // Growing spinning dark vortex
            const bhRadius = 20 + progress * 30;
            ctx.save();
            ctx.globalAlpha = alpha;
            // Dark center
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(e.x, e.y, bhRadius * 0.5, 0, Math.PI * 2);
            ctx.fill();
            // Purple spiral arcs
            for (let br = 0; br < 5; br++) {
              const bAngle = state.time * (3 + br) + br * 1.2;
              const bRadius = bhRadius * 0.6 + br * bhRadius * 0.15;
              ctx.strokeStyle = `rgba(124, 77, 255, ${(0.5 - br * 0.08) * alpha})`;
              ctx.lineWidth = 2;
              ctx.beginPath();
              ctx.arc(e.x, e.y, bRadius, bAngle, bAngle + Math.PI * 1.2);
              ctx.stroke();
            }
            // Particle sucking in effect
            for (let bp2 = 0; bp2 < 12; bp2++) {
              const seed = bp2 * 137.5;
              const angle = seed + state.time * 2;
              const dist = bhRadius * 1.5 * (1 - (progress * 0.5 + (bp2 % 3) * 0.15));
              const px2 = e.x + Math.cos(angle) * dist;
              const py2 = e.y + Math.sin(angle) * dist;
              ctx.globalAlpha = alpha * 0.7;
              ctx.fillStyle = bp2 % 2 === 0 ? '#7C4DFF' : '#E8EAF6';
              ctx.beginPath();
              ctx.arc(px2, py2, 2, 0, Math.PI * 2);
              ctx.fill();
            }
            ctx.restore();
            break;
          }
        }
      }

      // Draw active shield zones
      if (state.battle.shieldZones) {
        for (const zone of state.battle.shieldZones) {
          const zAlpha = Math.min(1, zone.timer);
          ctx.globalAlpha = zAlpha * 0.35;
          ctx.fillStyle = '#CE93D8';
          ctx.beginPath();
          ctx.arc(zone.x, zone.y, 40, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = zAlpha * 0.7;
          ctx.strokeStyle = '#F3E5F5';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(zone.x, zone.y, 40, 0, Math.PI * 2);
          ctx.stroke();
          ctx.globalAlpha = 1;
        }
      }

      // Draw active crystal barrier
      const cbActive = state.battle.superActive.find(sa => sa && sa.type === 'crystalBarrier');
      if (cbActive) {
        ctx.fillStyle = 'rgba(206, 147, 216, 0.3)';
        ctx.fillRect(0, cbActive.y - 3, CANVAS_W, 6);
        for (let sci = 0; sci < 10; sci++) {
          const sx = (sci / 10) * CANVAS_W + Math.sin(state.time * 3 + sci) * 10;
          ctx.fillStyle = 'rgba(243, 229, 245, 0.6)';
          ctx.fillRect(sx - 2, cbActive.y - 2, 4, 4);
        }
      }

      // Draw active black hole
      const bhActive = state.battle.superActive.find(sa => sa && sa.type === 'blackHole');
      if (bhActive) {
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(bhActive.x, bhActive.y, 20, 0, Math.PI * 2);
        ctx.fill();
        for (let br = 0; br < 5; br++) {
          const bAngle = state.time * (3 + br) + br * 1.2;
          const bRadius = 25 + br * 12;
          ctx.strokeStyle = `rgba(124, 77, 255, ${0.5 - br * 0.08})`;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(bhActive.x, bhActive.y, bRadius, bAngle, bAngle + Math.PI * 1.2);
          ctx.stroke();
        }
      }

      // Combo counter display
      const combo = state.battle.combo;
      if (combo.count >= 2 && combo.displayTimer > 0) {
        const comboAlpha = Math.min(1, combo.displayTimer * 2);
        const scale = 1 + Math.min(combo.count * 0.08, 0.6);
        const comboY = CANVAS_H / 2 - 60;
        ctx.save();
        ctx.globalAlpha = comboAlpha;
        ctx.textAlign = 'center';
        // Shadow/outline
        ctx.font = 'bold ' + Math.floor(28 * scale) + 'px monospace';
        ctx.fillStyle = '#000';
        const comboDisplay = Math.min(combo.count, 99);
        ctx.fillText('x' + comboDisplay + ' COMBO!', CANVAS_W / 2 + 2, comboY + 2);
        // Main text color cycles with combo size
        const comboHue = (combo.count * 25) % 360;
        ctx.fillStyle = 'hsl(' + comboHue + ', 100%, 65%)';
        ctx.fillText('x' + comboDisplay + ' COMBO!', CANVAS_W / 2, comboY);
        // Extra sparkles around combo text for big combos
        if (combo.count >= 5) {
          ctx.font = '14px serif';
          for (let cs = 0; cs < 6; cs++) {
            const csA = (cs / 6) * Math.PI * 2 + state.time * 3;
            const csr = 38 + combo.count * 2;
            ctx.fillStyle = 'hsl(' + ((comboHue + cs * 60) % 360) + ', 100%, 70%)';
            ctx.fillText('\u2605', CANVAS_W / 2 + Math.cos(csA) * csr, comboY + Math.sin(csA) * 14);
          }
        }
        ctx.restore();
      }
    }

    function drawBattleHUD() {
      // Wave text - top center
      ctx.font = 'bold 18px monospace';
      ctx.textAlign = 'center';
      ctx.fillStyle = '#FFD700';
      ctx.fillText('Wave ' + state.battle.wave, CANVAS_W / 2, 28);

      // Wave state messages
      if (state.battle.waveState === 'clearing') {
        ctx.font = 'bold 22px monospace';
        ctx.fillStyle = '#4CAF50';
        ctx.fillText('Wave Cleared!', CANVAS_W / 2, CANVAS_H / 2 - 20);
        // Sparkles
        for (let s = 0; s < 6; s++) {
          const angle = (s / 6) * Math.PI * 2 + state.time * 2;
          const sx = CANVAS_W / 2 + Math.cos(angle) * 60;
          const sy = CANVAS_H / 2 - 20 + Math.sin(angle) * 20;
          const hue = (s * 60 + state.time * 120) % 360;
          ctx.fillStyle = 'hsl(' + hue + ', 80%, 70%)';
          ctx.font = '12px serif';
          ctx.fillText('\u2728', sx, sy);
        }
      } else if (state.battle.waveState === 'waiting' && state.battle.wave > 0) {
        const nextWave = state.battle.wave + 1;
        const isBoss = nextWave % 5 === 0;
        const isRush = nextWave <= WAVE_DEFS.length ? (WAVE_DEFS[nextWave-1] && WAVE_DEFS[nextWave-1].rush) : (nextWave % 3 === 1);

        ctx.textAlign = 'center';
        if (isBoss) {
          ctx.fillStyle = '#FF5252';
          ctx.font = 'bold 20px monospace';
          ctx.fillText('BOSS INCOMING!', CANVAS_W / 2, CANVAS_H / 2);
        } else if (isRush) {
          ctx.fillStyle = '#FFD700';
          ctx.font = 'bold 18px monospace';
          ctx.fillText('RUSH WAVE!', CANVAS_W / 2, CANVAS_H / 2);
        } else {
          ctx.fillStyle = '#aaa';
          ctx.font = '14px monospace';
          ctx.fillText('Next wave...', CANVAS_W / 2, CANVAS_H / 2);
        }
      }

      // Per-player HUD
      for (let i = 0; i < state.activePlayerCount; i++) {
        const pi = state.activePlayerCount === 1 ? state.activePlayer : i;
        const b = state.battle.battlePlayers[i];
        const dragonKey = state.battle.playerDragons[i];
        if (!dragonKey) continue;
        const cfg = DRAGON_CONFIGS[dragonKey];
        const pName = players[pi].name;

        const isLeft = (i === 0);
        const baseX = isLeft ? 10 : CANVAS_W - 10;
        const align = isLeft ? 'left' : 'right';
        const hudY = 10;

        // Player name + dragon name
        ctx.textAlign = align;
        ctx.font = 'bold 13px monospace';
        ctx.fillStyle = cfg.color;
        ctx.fillText(pName + ' - ' + cfg.name, baseX, hudY + 12);

        // Hearts
        const heartY = hudY + 28;
        ctx.font = '14px serif';
        for (let h = 0; h < MAX_HEARTS; h++) {
          const hx = isLeft ? baseX + h * 18 : baseX - h * 18;
          if (h < b.hearts) {
            // Filled heart - red flash when low
            if (b.hearts <= 2 && Math.floor(state.time * 4) % 2 === 0) {
              ctx.fillStyle = '#FF1744';
            } else {
              ctx.fillStyle = '#FF5252';
            }
            ctx.fillText('\u2665', hx, heartY);
          } else {
            ctx.fillStyle = '#555';
            ctx.fillText('\u2661', hx, heartY);
          }
        }

        // Super meter bar
        const barY = heartY + 14;
        const barW = 100;
        const barH = 10;
        const barX = isLeft ? baseX : baseX - barW;
        const meterFrac = b.superMeter / SUPER_METER_MAX;

        // Bar background
        ctx.fillStyle = '#222';
        ctx.fillRect(barX, barY, barW, barH);

        // Bar fill
        if (meterFrac >= 1) {
          // Rainbow cycling when full
          const hue = (state.time * 120) % 360;
          ctx.fillStyle = 'hsl(' + hue + ', 80%, 60%)';
        } else {
          ctx.fillStyle = cfg.color;
        }
        ctx.fillRect(barX, barY, barW * meterFrac, barH);

        // Bar border
        ctx.strokeStyle = '#666';
        ctx.lineWidth = 1;
        ctx.strokeRect(barX, barY, barW, barH);

        // SUPER READY text
        if (meterFrac >= 1) {
          ctx.font = 'bold 10px monospace';
          ctx.fillStyle = '#FFD700';
          ctx.textAlign = isLeft ? 'left' : 'right';
          ctx.fillText('SUPER READY!', isLeft ? barX : barX + barW, barY + barH + 12);
        }

        // Active power-up indicators
        const activePowerUps = ['tripleShot', 'giantShot', 'rapidFire', 'magnet', 'timeSlow', 'starShield', 'giantDragon', 'clone', 'rainbowTrail'];
        let iconIdx = 0;
        const iconY = barY + barH + 22;
        for (const pKey of activePowerUps) {
          if (b[pKey] > 0) {
            const pCfg = DROP_TYPES[pKey];
            const ix = isLeft ? baseX + iconIdx * 18 : baseX - iconIdx * 18;
            // Symbol
            ctx.font = '12px serif';
            ctx.textAlign = 'center';
            ctx.fillStyle = pCfg.color;
            ctx.fillText(pCfg.symbol, ix + 6, iconY + 4);
            // Timer bar
            const frac = Math.max(0, b[pKey] / 10);
            ctx.fillStyle = pCfg.color + '88';
            ctx.fillRect(ix, iconY + 7, 14 * frac, 3);
            iconIdx++;
          }
        }
        // Friendship beam indicator
        if (state.battle.friendBeam > 0) {
          const fbCfg = DROP_TYPES.friendBeam;
          const ix = isLeft ? baseX + iconIdx * 18 : baseX - iconIdx * 18;
          ctx.font = '12px serif';
          ctx.textAlign = 'center';
          ctx.fillStyle = fbCfg.color;
          ctx.fillText(fbCfg.symbol, ix + 6, iconY + 4);
          const frac = Math.max(0, state.battle.friendBeam / 10);
          ctx.fillStyle = fbCfg.color + '88';
          ctx.fillRect(ix, iconY + 7, 14 * frac, 3);
        }
      }
    }

    // ============================================================
    // SUPER MOVES
    // ============================================================

    function swapDragon(playerIdx) {
      if (state.screen !== 'battle') return;
      sfxSwap();
      const dragonKeys = Object.keys(DRAGON_CONFIGS);
      const currentKey = state.battle.playerDragons[playerIdx];
      if (!currentKey) return;
      const currentIndex = dragonKeys.indexOf(currentKey);
      const nextIndex = (currentIndex + 1) % dragonKeys.length;
      state.battle.playerDragons[playerIdx] = dragonKeys[nextIndex];

      // Cost: reduce super meter to 75% of current
      const bp = state.battle.battlePlayers[playerIdx];
      bp.superMeter = Math.floor(bp.superMeter * 0.75);

      // Visual effect
      state.battle.effects.push({
        type: 'powerUpText',
        x: bp.x, y: BATTLE_PLAYER_Y - 30,
        timer: 1.5, maxTimer: 1.5,
        text: DRAGON_CONFIGS[dragonKeys[nextIndex]].name + '!',
        color: DRAGON_CONFIGS[dragonKeys[nextIndex]].color,
      });

      // Brief invincibility during swap
      bp.invTimer = Math.max(bp.invTimer, 0.5);
    }

    function activateSuper(playerIdx) {
      const b = state.battle.battlePlayers[playerIdx];
      if (!b || !b.alive || b.superMeter < SUPER_METER_MAX) return;
      const dragonKey = state.battle.playerDragons[playerIdx];
      if (!dragonKey) return;

      sfxSuper();
      b.superMeter = 0;
      triggerScreenShake(5, 0.3);
      const enemies = state.battle.enemies;

      switch (dragonKey) {
        case 'fire': {
          // Flame Wave: deal 3 damage to all enemies, cure those at 0hp
          for (const e of enemies) {
            if (e.curing) continue;
            e.hp -= 3;
            if (e.hp <= 0) { e.curing = true; e.cureTimer = 0; }
          }
          triggerScreenShake(8, 0.5);
          state.battle.effects.push({ x: 0, y: 0, type: 'flameWave', timer: 2.0, maxTimer: 2.0, playerX: b.x });
          break;
        }
        case 'ice': {
          // Freeze Blast: freeze all enemies for 3 seconds
          state.battle.superActive[playerIdx] = { type: 'freeze', timer: 3 };
          for (const e of enemies) { if (!e.curing) e.frozen = 3; }
          triggerScreenShake(6, 0.4);
          state.battle.effects.push({ x: b.x, y: BATTLE_PLAYER_Y, type: 'freezeBlast', timer: 2.0, maxTimer: 2.0 });
          break;
        }
        case 'nature': {
          // Vine Burst: deal 2 damage to all, vine enemies
          for (const e of enemies) {
            if (e.curing) continue;
            e.hp -= 2;
            e.vined = 2;
            if (e.hp <= 0) { e.curing = true; e.cureTimer = 0; }
          }
          state.battle.superActive[playerIdx] = { type: 'vines', timer: 2 };
          triggerScreenShake(6, 0.4);
          state.battle.effects.push({ x: 0, y: 0, type: 'vineBurst', timer: 2.0, maxTimer: 2.0 });
          break;
        }
        case 'love': {
          // Heal Wave: full hearts for ALL players, cure all enemies
          for (let p = 0; p < state.activePlayerCount; p++) {
            state.battle.battlePlayers[p].hearts = MAX_HEARTS;
          }
          for (const e of enemies) {
            if (!e.curing) { e.curing = true; e.cureTimer = 0; }
          }
          triggerScreenShake(5, 0.3);
          state.battle.effects.push({ x: 0, y: 0, type: 'healWave', timer: 2.0, maxTimer: 2.0 });
          break;
        }
        case 'shadow': {
          // Shadow Cloak: invincible for 5 seconds
          b.invTimer = 5;
          triggerScreenShake(7, 0.4);
          state.battle.effects.push({ x: b.x, y: BATTLE_PLAYER_Y, type: 'shadowCloak', timer: 2.0, maxTimer: 2.0 });
          break;
        }
        case 'star': {
          // Supernova: cure all enemies instantly
          for (const e of enemies) {
            if (!e.curing) { e.curing = true; e.cureTimer = 0; }
          }
          triggerScreenShake(12, 0.6);
          state.battle.effects.push({ x: 0, y: 0, type: 'supernova', timer: 2.0, maxTimer: 2.0 });
          break;
        }
        case 'rainbow': {
          // Rainbow Wave: double-drop from all enemies, cure all
          for (const e of enemies) {
            if (!e.curing) {
              spawnDrop(e.x, e.y);
              spawnDrop(e.x, e.y);
              e.curing = true;
              e.cureTimer = 0;
            }
          }
          triggerScreenShake(8, 0.5);
          state.battle.effects.push({ x: 0, y: 0, type: 'rainbowWave', timer: 2.0, maxTimer: 2.0 });
          break;
        }
        case 'ghost': {
          // Phantom Blast: all enemies become phased for 3 seconds (can't hurt players)
          state.battle.superActive[playerIdx] = { type: 'phantom', timer: 3 };
          state.battle.effects.push({ type: 'phantomBlast', x: CANVAS_W / 2, y: CANVAS_H / 2, timer: 2.0, maxTimer: 2.0 });
          break;
        }
        case 'thorn': {
          // Thorn Storm: thorns rain from sky, 2 damage to all
          for (const e of enemies) {
            if (!e.curing) { e.hp -= 2; if (e.hp <= 0) { e.curing = true; e.cureTimer = 0; } }
          }
          state.battle.effects.push({ type: 'thornStorm', x: CANVAS_W / 2, y: CANVAS_H / 2, timer: 2.0, maxTimer: 2.0 });
          triggerScreenShake(6, 0.4);
          break;
        }
        case 'storm': {
          // Thunder Storm: 8 random lightning strikes
          for (let si = 0; si < 8; si++) {
            const tx = 50 + Math.random() * (CANVAS_W - 100);
            const ty = 50 + Math.random() * (CANVAS_H - 150);
            for (const e of enemies) {
              if (e.curing) continue;
              if (Math.abs(e.x - tx) < 40 && Math.abs(e.y - ty) < 40) {
                e.hp -= 3;
                if (e.hp <= 0) { e.curing = true; e.cureTimer = 0; }
                break;
              }
            }
            state.battle.effects.push({ type: 'lightningStrike', x: tx, y: ty, timer: 0.4, maxTimer: 0.4 });
          }
          triggerScreenShake(8, 0.5);
          state.battle.effects.push({ type: 'thunderFlash', x: 0, y: 0, timer: 0.3, maxTimer: 0.3 });
          break;
        }
        case 'crystal_dragon': {
          // Crystal Barrier: horizontal wall blocking enemy shots
          state.battle.superActive[playerIdx] = { type: 'crystalBarrier', timer: 5, y: 300 };
          state.battle.effects.push({ type: 'crystalBarrierForm', x: CANVAS_W / 2, y: 300, timer: 1.5, maxTimer: 1.5 });
          break;
        }
        case 'cosmic': {
          // Black Hole: pulls all enemies to center for 4 seconds
          state.battle.superActive[playerIdx] = { type: 'blackHole', timer: 4, x: CANVAS_W / 2, y: CANVAS_H / 2 };
          state.battle.effects.push({ type: 'blackHoleForm', x: CANVAS_W / 2, y: CANVAS_H / 2, timer: 4.0, maxTimer: 4.0 });
          break;
        }
      }
    }

    function updateSuperActive(dt) {
      for (let i = 0; i < 2; i++) {
        const sa = state.battle.superActive[i];
        if (sa) {
          sa.timer -= dt;
          if (sa.timer <= 0) {
            state.battle.superActive[i] = null;
          }
        }
      }
      // Shield zones timer
      if (state.battle.shieldZones) {
        for (let i = state.battle.shieldZones.length - 1; i >= 0; i--) {
          state.battle.shieldZones[i].timer -= dt;
          if (state.battle.shieldZones[i].timer <= 0) {
            state.battle.shieldZones.splice(i, 1);
          }
        }
      }
      // Combo counter decay
      const combo = state.battle.combo;
      if (combo.count > 0) {
        combo.timer -= dt;
        if (combo.timer <= 0) {
          combo.count = 0;
          combo.timer = 0;
        }
      }
      if (combo.displayTimer > 0) {
        combo.displayTimer -= dt;
      }
    }

    function updateSuperButtons() {
      const btnL = document.getElementById('super-btn-left');
      const btnR = document.getElementById('super-btn-right');
      if (state.screen === 'battle' && isTouchDevice) {
        // For online mode: host sees left button only, guest sees right button only
        const showLeft = state.isGuest ? false : (state.activePlayerCount >= 1);
        const showRight = state.isHost ? false : (state.activePlayerCount >= 2 || state.isGuest);

        if (showLeft) {
          btnL.style.display = 'block';
          if (state.battle.battlePlayers[0].superMeter >= SUPER_METER_MAX && state.battle.battlePlayers[0].alive) {
            btnL.classList.add('ready');
          } else {
            btnL.classList.remove('ready');
          }
        } else {
          btnL.style.display = 'none';
        }
        if (showRight) {
          btnR.style.display = 'block';
          if (state.battle.battlePlayers[1] && state.battle.battlePlayers[1].superMeter >= SUPER_METER_MAX && state.battle.battlePlayers[1].alive) {
            btnR.classList.add('ready');
          } else {
            btnR.classList.remove('ready');
          }
        } else {
          btnR.style.display = 'none';
        }
      } else {
        btnL.style.display = 'none';
        btnR.style.display = 'none';
      }
    }

    document.getElementById('super-btn-right').addEventListener('touchstart', function(e) {

    function updateSwapButtons() {

    document.getElementById('swap-btn-right').addEventListener('touchstart', function(e) {

      }

    // Keyboard super: spacebar for player 0 battle slot (or solo player in 1P), 'e'/'E' for player 1 battle slot
    document.addEventListener('keydown', function(e) {
      if (state.screen !== 'battle') return;
      if (e.key === ' ' || e.key === 'Spacebar') {
        e.preventDefault();
        // In 1P mode, activateSuper for the active player (battle slot 0)
        activateSuper(0);
      } else if (e.key === 'e' || e.key === 'E') {
        if (state.activePlayerCount >= 2) {
          activateSuper(1);
        }
      } else if (e.key === 'Tab') {
        e.preventDefault();
        // Tab: P1 swap dragon
        swapDragon(0);
      } else if (e.key === 'q' || e.key === 'Q') {
        // Q: P2 swap dragon
        if (state.activePlayerCount >= 2) {
          swapDragon(1);
        }
      } else if (e.key === 'Escape') {
        // Return to title from battle
        const btnL = document.getElementById('super-btn-left');
        const btnR = document.getElementById('super-btn-right');
        btnL.style.display = 'none';
        btnR.style.display = 'none';
        document.getElementById('swap-btn-left').style.display = 'none';
        document.getElementById('swap-btn-right').style.display = 'none';
        document.getElementById('dragon-select-touch').style.display = 'none';
        returnToTitle();
        updateTitleTouchUI();
      }

      if (e.key === 'Escape') {

    // ============================================================
    // DRAGON SNAKE MODE
    // ============================================================

    function startSnake() {
      state.screen = 'snake';
      state.snake.time = 0;
      state.snake.moveInterval = 0.18;
      state.snake.eggs = [];
      state.snake.powerUps = [];

      state.snake.players[0] = {
        segments: [{x: 5, y: 8}, {x: 4, y: 8}, {x: 3, y: 8}],
        dir: {dx: 1, dy: 0}, nextDir: {dx: 1, dy: 0},
        moveTimer: 0, stunTimer: 0, score: 0,
        shieldTimer: 0, ghostTimer: 0, magnetTimer: 0,
      };
      state.snake.players[1] = {
        segments: [{x: 19, y: 8}, {x: 20, y: 8}, {x: 21, y: 8}],
        dir: {dx: -1, dy: 0}, nextDir: {dx: -1, dy: 0},
        moveTimer: 0, stunTimer: 0, score: 0,
        shieldTimer: 0, ghostTimer: 0, magnetTimer: 0,
      };

      for (var i = 0; i < 3; i++) spawnSnakeEgg();
      updateTitleTouchUI();
    }

    function spawnSnakeEgg() {
      var types = ['fire','nature','love','ice','star','shadow','ghost','thorn','rainbow'];
      var x, y, valid;
      for (var attempt = 0; attempt < 50; attempt++) {
        x = Math.floor(Math.random() * state.snake.gridW);
        y = Math.floor(Math.random() * state.snake.gridH);
        valid = true;
        for (var si = 0; si < state.snake.players.length; si++) {
          var sp = state.snake.players[si];
          for (var sj = 0; sj < sp.segments.length; sj++) {
            if (sp.segments[sj].x === x && sp.segments[sj].y === y) { valid = false; break; }
          }
          if (!valid) break;
        }
        // Also avoid existing eggs
        if (valid) {
          for (var ei = 0; ei < state.snake.eggs.length; ei++) {
            if (state.snake.eggs[ei].x === x && state.snake.eggs[ei].y === y) { valid = false; break; }
          }
        }
        if (valid) break;
      }
      if (valid) {
        state.snake.eggs.push({ x: x, y: y, type: types[Math.floor(Math.random() * types.length)] });
      }
    }

    function spawnSnakePowerUp() {
      var types = ['speed', 'shield', 'ghost', 'magnet'];
      var x, y, valid;
      for (var attempt = 0; attempt < 50; attempt++) {
        x = Math.floor(Math.random() * state.snake.gridW);
        y = Math.floor(Math.random() * state.snake.gridH);
        valid = true;
        for (var si = 0; si < state.snake.players.length; si++) {
          var sp = state.snake.players[si];
          for (var sj = 0; sj < sp.segments.length; sj++) {
            if (sp.segments[sj].x === x && sp.segments[sj].y === y) { valid = false; break; }
          }
          if (!valid) break;
        }
        if (valid) break;
      }
      if (valid) {
        state.snake.powerUps.push({ x: x, y: y, type: types[Math.floor(Math.random() * types.length)] });
      }
    }

    function updateSnakePlayers(dt) {
      var activePlayers = getActivePlayers();

      for (var i = 0; i < activePlayers.length; i++) {
        var p = activePlayers[i];
        var pi = state.activePlayerCount === 1 ? state.activePlayer : i;
        var sp = state.snake.players[pi];

        if (sp.stunTimer > 0) {
          sp.stunTimer -= dt;
          continue;
        }

        // Read input for direction change
        var input = getPlayerInput(p.keys.up, p.keys.down, p.keys.left, p.keys.right);
        if (input.dx !== 0 || input.dy !== 0) {
          // Prevent 180 reversal
          if (!(input.dx === -sp.dir.dx && input.dy === -sp.dir.dy)) {
            sp.nextDir = { dx: input.dx, dy: input.dy };
          }
        }

        // Decrement power-up timers
        if (sp.shieldTimer > 0) sp.shieldTimer -= dt;
        if (sp.ghostTimer > 0) sp.ghostTimer -= dt;
        if (sp.magnetTimer > 0) sp.magnetTimer -= dt;

        // Magnet effect: move nearest egg closer
        if (sp.magnetTimer > 0 && state.snake.eggs.length > 0) {
          var head = sp.segments[0];
          var nearest = null, nearDist = Infinity;
          for (var me = 0; me < state.snake.eggs.length; me++) {
            var egg = state.snake.eggs[me];
            var d = Math.abs(egg.x - head.x) + Math.abs(egg.y - head.y);
            if (d < nearDist) { nearDist = d; nearest = egg; }
          }
          if (nearest && nearDist > 0) {
            if (nearest.x < head.x) nearest.x++;
            else if (nearest.x > head.x) nearest.x--;
            else if (nearest.y < head.y) nearest.y++;
            else if (nearest.y > head.y) nearest.y--;
          }
        }

        // Move on timer
        sp.moveTimer -= dt;
        if (sp.moveTimer <= 0) {
          sp.moveTimer = state.snake.moveInterval;
          sp.dir = { dx: sp.nextDir.dx, dy: sp.nextDir.dy };

          var mHead = sp.segments[0];
          var newHead = { x: mHead.x + sp.dir.dx, y: mHead.y + sp.dir.dy };

          // Wall collision
          if (newHead.x < 0 || newHead.x >= state.snake.gridW || newHead.y < 0 || newHead.y >= state.snake.gridH) {
            if (sp.shieldTimer > 0) {
              sp.shieldTimer = 0;
              sp.dir.dx = -sp.dir.dx;
              sp.dir.dy = -sp.dir.dy;
              sp.nextDir = { dx: sp.dir.dx, dy: sp.dir.dy };
            } else {
              sp.segments = sp.segments.slice(0, Math.max(1, sp.segments.length - 2));
              sp.stunTimer = 0.5;
              sfxPlayerHit();
              sp.dir.dx = -sp.dir.dx;
              sp.dir.dy = -sp.dir.dy;
              sp.nextDir = { dx: sp.dir.dx, dy: sp.dir.dy };
            }
            continue;
          }

          // Self collision
          var hitSelf = false;
          if (sp.ghostTimer <= 0) {
            for (var si = 1; si < sp.segments.length; si++) {
              if (sp.segments[si].x === newHead.x && sp.segments[si].y === newHead.y) {
                hitSelf = true;
                break;
              }
            }
          }
          if (hitSelf) {
            sp.segments = sp.segments.slice(0, Math.max(1, sp.segments.length - 1));
            sp.stunTimer = 0.3;
            sfxPlayerHit();
            continue;
          }

          // Other player collision (2P)
          if (state.activePlayerCount === 2) {
            var otherPi = pi === 0 ? 1 : 0;
            var otherSp = state.snake.players[otherPi];
            var hitOther = false;
            for (var oi = 0; oi < otherSp.segments.length; oi++) {
              if (otherSp.segments[oi].x === newHead.x && otherSp.segments[oi].y === newHead.y) {
                hitOther = true;
                break;
              }
            }
            if (hitOther) {
              otherSp.segments = otherSp.segments.slice(0, Math.max(1, otherSp.segments.length - 1));
              sfxEnemyHit();
            }
          }

          // Move: add new head, remove tail (unless eating)
          sp.segments.unshift(newHead);

          // Check egg eating
          var ate = false;
          for (var ei = state.snake.eggs.length - 1; ei >= 0; ei--) {
            var sEgg = state.snake.eggs[ei];
            if (sEgg.x === newHead.x && sEgg.y === newHead.y) {
              ate = true;
              sp.score += 10;
              sfxCollect();

              var bonus = sEgg.type === 'rainbow' ? 3 : sEgg.type === 'star' ? 2 : 1;
              for (var b = 1; b < bonus; b++) {
                sp.segments.push({ x: sp.segments[sp.segments.length - 1].x, y: sp.segments[sp.segments.length - 1].y });
              }

              state.snake.eggs.splice(ei, 1);
              break;
            }
          }

          // Check power-up eating
          for (var pui = state.snake.powerUps.length - 1; pui >= 0; pui--) {
            var pu = state.snake.powerUps[pui];
            if (pu.x === newHead.x && pu.y === newHead.y) {
              if (pu.type === 'speed') state.snake.moveInterval = Math.max(0.08, state.snake.moveInterval - 0.02);
              if (pu.type === 'shield') sp.shieldTimer = 10;
              if (pu.type === 'ghost') sp.ghostTimer = 8;
              if (pu.type === 'magnet') sp.magnetTimer = 8;
              sfxPowerUp();
              sp.score += 5;
              state.snake.powerUps.splice(pui, 1);
              break;
            }
          }

          if (!ate) {
            sp.segments.pop();
          }
        }
      }
    }

    function updateSnake(dt) {
      state.snake.time += dt;

      // Gradually speed up
      state.snake.moveInterval = Math.max(0.08, 0.18 - state.snake.time * 0.0005);

      updateSnakePlayers(dt);

      // Keep 3-5 eggs on screen
      if (state.snake.eggs.length < 3) spawnSnakeEgg();

      // Spawn power-up occasionally
      if (state.snake.powerUps.length < 1 && Math.random() < 0.005) {
        spawnSnakePowerUp();
      }
    }

    function drawSnakeBackground() {
      ctx.fillStyle = '#0a1a0a';
      ctx.fillRect(0, UI_ROWS * TILE, CANVAS_W, state.snake.gridH * TILE);

      ctx.strokeStyle = 'rgba(255,255,255,0.03)';
      ctx.lineWidth = 1;
      for (var c = 0; c <= state.snake.gridW; c++) {
        ctx.beginPath();
        ctx.moveTo(c * TILE, UI_ROWS * TILE);
        ctx.lineTo(c * TILE, (UI_ROWS + state.snake.gridH) * TILE);
        ctx.stroke();
      }
      for (var r = 0; r <= state.snake.gridH; r++) {
        ctx.beginPath();
        ctx.moveTo(0, (r + UI_ROWS) * TILE);
        ctx.lineTo(state.snake.gridW * TILE, (r + UI_ROWS) * TILE);
        ctx.stroke();
      }
    }

    function drawSnakePlayers() {
      for (var i = 0; i < state.activePlayerCount; i++) {
        var pi = state.activePlayerCount === 1 ? state.activePlayer : i;
        var sp = state.snake.players[pi];
        var dragonKey = state.snake.playerDragons[pi];
        var config = DRAGON_CONFIGS[dragonKey];

        for (var s = sp.segments.length - 1; s >= 0; s--) {
          var seg = sp.segments[s];
          var px = seg.x * TILE;
          var py = (seg.y + UI_ROWS) * TILE;

          if (s === 0) {
            // Head: draw dragon sprite
            if (sp.stunTimer > 0 && Math.floor(state.time * 10) % 2 === 0) continue;

            if (sp.ghostTimer > 0) ctx.globalAlpha = 0.5;
            drawSprite(DRAGON_SPRITES[dragonKey], px, py, TILE);
            ctx.globalAlpha = 1;

            // Shield indicator
            if (sp.shieldTimer > 0) {
              ctx.strokeStyle = 'rgba(105, 240, 174, 0.5)';
              ctx.lineWidth = 2;
              ctx.beginPath();
              ctx.arc(px + TILE/2, py + TILE/2, TILE/2 + 4, 0, Math.PI * 2);
              ctx.stroke();
            }
          } else {
            // Body: colored circles that fade toward tail
            var alpha = 0.3 + 0.5 * (1 - s / sp.segments.length);
            ctx.globalAlpha = sp.ghostTimer > 0 ? alpha * 0.4 : alpha;
            ctx.fillStyle = config ? config.color : '#888';
            ctx.beginPath();
            ctx.arc(px + TILE/2, py + TILE/2, TILE/2 - 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
          }
        }
      }
    }

    function drawSnakeEggs() {
      for (var ei = 0; ei < state.snake.eggs.length; ei++) {
        var egg = state.snake.eggs[ei];
        var px = egg.x * TILE + 4;
        var py = (egg.y + UI_ROWS) * TILE;
        var bob = Math.sin(state.time * 3 + egg.x + egg.y) * 2;

        ctx.fillStyle = 'rgba(255,255,200,0.15)';
        ctx.beginPath();
        ctx.arc(egg.x * TILE + TILE/2, (egg.y + UI_ROWS) * TILE + TILE/2 + bob, TILE/2, 0, Math.PI * 2);
        ctx.fill();

        drawSprite(EGG_SPRITES[egg.type] || EGG_SPRITES.fire, px, py + bob, TILE * 0.75);
      }
    }

    function drawSnakePowerUps() {
      var symbols = { speed: '\u26A1', shield: '\u25C7', ghost: '\uD83D\uDC7B', magnet: '\u2295' };
      var colors = { speed: '#00E676', shield: '#69F0AE', ghost: '#B0BEC5', magnet: '#FFEB3B' };

      for (var pi = 0; pi < state.snake.powerUps.length; pi++) {
        var pu = state.snake.powerUps[pi];
        var px = pu.x * TILE + TILE/2;
        var py = (pu.y + UI_ROWS) * TILE + TILE/2;
        var pulse = Math.sin(state.time * 4) * 3;

        ctx.fillStyle = colors[pu.type] || '#fff';
        ctx.font = (14 + pulse) + 'px serif';
        ctx.textAlign = 'center';
        ctx.fillText(symbols[pu.type] || '?', px, py + 5);
      }
    }

    function drawSnakeHUD() {
      ctx.fillStyle = '#0a1a0a';
      ctx.fillRect(0, 0, CANVAS_W, UI_ROWS * TILE);

      for (var i = 0; i < state.activePlayerCount; i++) {
        var pi = state.activePlayerCount === 1 ? state.activePlayer : i;
        var sp = state.snake.players[pi];
        var dragonKey = state.snake.playerDragons[pi];
        var config = DRAGON_CONFIGS[dragonKey];
        var isLeft = i === 0;

        ctx.fillStyle = config ? config.color : '#aaa';
        ctx.font = 'bold 12px monospace';
        ctx.textAlign = isLeft ? 'left' : 'right';
        var x = isLeft ? 10 : CANVAS_W - 10;
        ctx.fillText(players[pi].name + ' - ' + (config ? config.name.split(' ')[0] : '???'), x, 18);

        ctx.fillStyle = '#aaa';
        ctx.font = '11px monospace';
        ctx.fillText('Score: ' + sp.score + ' | Length: ' + sp.segments.length, x, 34);

        // Power-up indicators
        var statusParts = [];
        if (sp.shieldTimer > 0) statusParts.push('Shield:' + Math.ceil(sp.shieldTimer));
        if (sp.ghostTimer > 0) statusParts.push('Ghost:' + Math.ceil(sp.ghostTimer));
        if (sp.magnetTimer > 0) statusParts.push('Magnet:' + Math.ceil(sp.magnetTimer));
        if (statusParts.length > 0) {
          ctx.fillStyle = '#6a6';
          ctx.font = '9px monospace';
          ctx.fillText(statusParts.join('  '), x, 48);
        }
      }

      // Center: speed
      ctx.fillStyle = '#666';
      ctx.font = '10px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('Speed: ' + Math.floor((0.18 - state.snake.moveInterval) / 0.10 * 100) + '%', CANVAS_W / 2, 18);

      // Divider
      ctx.strokeStyle = '#333';
      ctx.beginPath();
      ctx.moveTo(0, UI_ROWS * TILE);
      ctx.lineTo(CANVAS_W, UI_ROWS * TILE);
      ctx.stroke();
    }

    // ============================================================
    // GAME LOOP
    // ============================================================
    let lastTime = 0;

    function loop(timestamp) {
      const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
      lastTime = timestamp;
      state.time += dt;

      if (state.screen === 'title') {
        updateTitleScreen();
        drawTitleScreen();
      } else if (state.screen === 'playing') {
        // Guest: send input to Firebase, skip game logic
        if (state.isGuest) {
          // Send guest d-pad input
          const guestInput = getPlayerInput(
            players[1].keys.up, players[1].keys.down,
            players[1].keys.left, players[1].keys.right
          );
          // Also check left d-pad (arrows) for convenience on guest
          const altInput = getPlayerInput('ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight');
          const dx = guestInput.dx || altInput.dx;
          const dy = guestInput.dy || altInput.dy;
          sendGuestInput(dx, dy);

          // Guest only updates particles locally for visual effect
          updateParticles(dt);
        } else {
          // Host or local: run all game logic
          updatePlayers(dt);
          checkZoneTransition();
          checkSecretTiles();
          checkSecretRoomExit();
          checkEggCollection();
          updateHatching(dt);
          updateDragons(dt);
          updateUnlockEffect(dt);
          updateParticles(dt);

          // Update secret path timers
          for (const zk in state.secretPathTimer) {
            if (state.secretPathActive[zk]) state.secretPathTimer[zk] += dt;
          }
        }

        updateRideButtons();

        // Draw (both host and guest)
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
        drawZone(ZONES[state.currentZone]);
        drawParticles();
        drawDragons();
        drawPlayers();
        drawEggs();
        drawHatching();
        drawUI();
        drawQuests();
        drawUnlockEffect();
        drawJoysticks();

        // Online connection status overlay
        if (state.playerMode === '2p-online' && state.onlineStatus === 'disconnected') {
          ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
          ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
          ctx.fillStyle = '#FFC107';
          ctx.font = 'bold 20px monospace';
          ctx.textAlign = 'center';
          if (state.isHost) {
            ctx.fillText('Waiting for friend to reconnect...', CANVAS_W / 2, CANVAS_H / 2);
          } else {
            ctx.fillText('Host disconnected', CANVAS_W / 2, CANVAS_H / 2);
            ctx.font = '14px monospace';
            ctx.fillStyle = '#aaa';
            ctx.fillText('Returning to title...', CANVAS_W / 2, CANVAS_H / 2 + 30);
          }
        }
      } else if (state.screen === 'dragonSelect') {
        if (!state.isGuest) {
          updateDragonSelect();
        }
        drawDragonSelect();
      } else if (state.screen === 'battle') {
        if (state.isGuest) {
          // Guest: send touch/keyboard input to host
          let battleX = -1;
          let dx = 0;
          const guestDragSide = 'right'; // guest is always player 1 (right side)
          if (touchDrag[guestDragSide].active || touchDrag['left'].active) {
            const activeSide = touchDrag[guestDragSide].active ? guestDragSide : 'left';
            const canvasRect = canvas.getBoundingClientRect();
            const canvasScale = CANVAS_W / (canvasRect.width || CANVAS_W);
            battleX = Math.round((touchDrag[activeSide].currentX - canvasRect.left) * canvasScale);
            battleX = Math.max(20, Math.min(CANVAS_W - 20, battleX));
          } else {
            // Keyboard fallback
            const guestInput = getPlayerInput(
              players[1].keys.up, players[1].keys.down,
              players[1].keys.left, players[1].keys.right
            );
            const altInput = getPlayerInput('ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight');
            dx = guestInput.dx || altInput.dx;
          }
          sendGuestInput(dx, 0, battleX, guestSuperPressed);
          guestSuperPressed = false;
        } else {
          updateBattlePlayers(dt);
          updateShots(dt);
          updateEnemies(dt);
          checkBattleCollisions();
          updateBattleWaves(dt);
          updateBattleEffects(dt);
          updateDrops(dt);
          updateSuperActive(dt);
        }
        updateScreenShake(dt);
        updateSuperButtons();
        updateSwapButtons();

        drawBattleBackground();
        ctx.save();
        ctx.translate(screenShake.x, screenShake.y);
        drawBattleEnemies();
        drawBattleShots();
        drawBattlePlayers();
        drawDrops();
        drawBattleEffects();
        ctx.restore();
        drawBattleHUD();

        // Show drag hint on first wave
        if (isTouchDevice && state.battle.wave <= 1 && battleDragHintTimer > 0) {
          battleDragHintTimer -= dt;
          const alpha = Math.min(1, battleDragHintTimer / 0.5);
          ctx.fillStyle = 'rgba(255, 215, 0, ' + alpha + ')';
          ctx.font = 'bold 20px monospace';
          ctx.textAlign = 'center';
          ctx.fillText('Drag to move!', CANVAS_W / 2, CANVAS_H - 30);
        }
      } else if (state.screen === 'flight') {
        if (!state.isGuest) {
          updateFlight(dt);
        }
        drawFlightBackground();
        drawFlightObstacles();
        // Draw eggs
        for (var fe = 0; fe < state.flight.eggs.length; fe++) {
          var egg = state.flight.eggs[fe];
          var bob = Math.sin(state.time * 3 + egg.x * 0.01) * 3;
          drawSprite(EGG_SPRITES[egg.type] || EGG_SPRITES.fire, egg.x - 10, egg.y - 10 + bob, 20);
        }
        drawFlightPlayers();
        drawFlightHUD();
      } else if (state.screen === 'snake') {
        if (!state.isGuest) {
          updateSnake(dt);
        }
        drawSnakeBackground();
        drawSnakeEggs();
        drawSnakePowerUps();
        drawSnakePlayers();
        drawSnakeHUD();
      }

      requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);
  </script>
</body>
</html>
