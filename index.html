<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Dragon Egg Island</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      touch-action: manipulation;
    }

    * {
      touch-action: manipulation;
    }

    #canvas-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 3px solid #444;
      transform-origin: center center;
    }

    /* D-pad container */
    .dpad {
      position: fixed;
      display: none; /* hidden by default; shown via JS when touch detected */
      width: 180px;
      height: 180px;
      grid-template-columns: 60px 60px 60px;
      grid-template-rows: 60px 60px 60px;
      z-index: 100;
      touch-action: none;
    }

    .dpad.visible {
      display: grid;
    }

    #dpad-left {
      bottom: 20px;
      left: 20px;
    }

    #dpad-right {
      bottom: 20px;
      right: 20px;
    }

    .dpad-btn {
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 22px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      transition: opacity 0.08s;
      opacity: 0.75;
    }

    .dpad-btn:active, .dpad-btn.pressed {
      opacity: 1;
    }

    #dpad-left .dpad-btn {
      background: rgba(135, 206, 235, 0.55);
      color: #fff;
    }

    #dpad-right .dpad-btn {
      background: rgba(155, 89, 182, 0.55);
      color: #fff;
    }

    .dpad-up    { grid-column: 2; grid-row: 1; }
    .dpad-left  { grid-column: 1; grid-row: 2; }
    .dpad-center { grid-column: 2; grid-row: 2; display: flex; justify-content: center; align-items: center; font-size: 10px; font-weight: bold; font-family: monospace; }
    .dpad-right { grid-column: 3; grid-row: 2; }
    .dpad-down  { grid-column: 2; grid-row: 3; }

    #dpad-left .dpad-center {
      color: #87CEEB;
    }

    #dpad-right .dpad-center {
      color: #9B59B6;
    }

    /* Ride buttons */
    .ride-btn {
      position: fixed;
      width: 65px;
      height: 65px;
      border-radius: 50%;
      border: 2px solid #4CAF50;
      background: rgba(76, 175, 80, 0.15);
      color: #4CAF50;
      font-family: monospace;
      font-size: 11px;
      font-weight: bold;
      z-index: 20;
      touch-action: manipulation;
      display: none;
    }
    .ride-btn-left { bottom: 100px; left: 160px; }
    .ride-btn-right { bottom: 100px; right: 160px; }

    /* Title screen touch buttons */
    #title-touch-btns {
      position: fixed;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      z-index: 100;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      touch-action: none;
    }

    #title-touch-btns.visible {
      display: flex;
    }

    .title-touch-btn {
      padding: 14px 40px;
      font-size: 18px;
      font-family: monospace;
      font-weight: bold;
      border: 2px solid #FFD700;
      border-radius: 10px;
      background: rgba(26, 26, 46, 0.85);
      color: #FFD700;
      cursor: pointer;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      min-width: 200px;
      text-align: center;
    }

    .title-touch-btn:active {
      background: rgba(255, 215, 0, 0.25);
    }

    /* Online room UI */
    #room-code-overlay {
      position: fixed;
      display: none;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 200;
      justify-content: center;
      align-items: center;
      background: rgba(26, 26, 46, 0.95);
      flex-direction: column;
      gap: 20px;
    }

    #room-code-overlay.visible {
      display: flex;
    }

    #room-code-overlay .room-label {
      color: #FFD700;
      font-family: monospace;
      font-size: 22px;
      font-weight: bold;
      text-align: center;
    }

    #room-code-overlay .room-sublabel {
      color: #aaa;
      font-family: monospace;
      font-size: 14px;
      text-align: center;
    }

    #room-code-input {
      width: 200px;
      padding: 16px;
      font-size: 36px;
      font-family: monospace;
      font-weight: bold;
      text-align: center;
      background: #2a2a4e;
      color: #FFD700;
      border: 3px solid #FFD700;
      border-radius: 12px;
      outline: none;
      letter-spacing: 12px;
      -webkit-appearance: none;
    }

    #room-code-input::placeholder {
      color: #555;
      letter-spacing: 4px;
      font-size: 20px;
    }

    .room-btn {
      padding: 14px 40px;
      font-size: 18px;
      font-family: monospace;
      font-weight: bold;
      border: 2px solid #FFD700;
      border-radius: 10px;
      background: rgba(26, 26, 46, 0.85);
      color: #FFD700;
      cursor: pointer;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      min-width: 200px;
      text-align: center;
    }

    .room-btn:active {
      background: rgba(255, 215, 0, 0.25);
    }

    .room-btn.back-btn {
      border-color: #888;
      color: #888;
      font-size: 14px;
      min-width: 120px;
      padding: 10px 24px;
      margin-top: 10px;
    }

    .room-status {
      color: #4CAF50;
      font-family: monospace;
      font-size: 16px;
      text-align: center;
    }

    .room-status.waiting {
      color: #aaa;
    }

    .room-status.error {
      color: #e74c3c;
    }

    .room-code-display {
      color: #FFD700;
      font-family: monospace;
      font-size: 64px;
      font-weight: bold;
      letter-spacing: 16px;
      text-align: center;
    }

    .connection-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }

    .connection-dot.green { background: #4CAF50; }
    .connection-dot.yellow { background: #FFC107; }
    .connection-dot.red { background: #e74c3c; }

    .super-btn {
      position: fixed;
      bottom: 200px;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      z-index: 20;
      border: 3px solid #FFD700;
      background: rgba(255, 215, 0, 0.2);
      color: #FFD700;
      font-family: monospace;
      font-weight: bold;
      font-size: 13px;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      opacity: 0.5;
    }

    #super-btn-left { left: 30px; }
    #super-btn-right { right: 30px; }

    .super-btn.ready {
      opacity: 1;
      background: rgba(255, 215, 0, 0.4);
      animation: superPulse 1s ease-in-out infinite;
    }

    @keyframes superPulse {
      0%   { transform: scale(1);   box-shadow: 0 0 10px rgba(255, 215, 0, 0.3); }
      50%  { transform: scale(1.1); box-shadow: 0 0 25px rgba(255, 215, 0, 0.6); }
      100% { transform: scale(1);   box-shadow: 0 0 10px rgba(255, 215, 0, 0.3); }
    }

    .swap-btn {
      position: fixed;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 2px solid #4DD0E1;
      background: rgba(77, 208, 225, 0.15);
      color: #4DD0E1;
      font-family: monospace;
      font-size: 11px;
      font-weight: bold;
      z-index: 20;
      touch-action: manipulation;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      display: none;
    }
    #swap-btn-left  { bottom: 290px; left: 40px; }
    #swap-btn-right { bottom: 290px; right: 40px; }
  </style>
</head>
<body>
  <div id="canvas-wrapper">
    <canvas id="game" width="800" height="600"></canvas>
  </div>

  <!-- Left d-pad: Harper (Arrow keys) -->
  <div id="dpad-left" class="dpad">
    <button class="dpad-btn dpad-up"    data-key="ArrowUp">▲</button>
    <button class="dpad-btn dpad-left"  data-key="ArrowLeft">◄</button>
    <div class="dpad-center">Harper</div>
    <button class="dpad-btn dpad-right" data-key="ArrowRight">►</button>
    <button class="dpad-btn dpad-down"  data-key="ArrowDown">▼</button>
  </div>

  <!-- Right d-pad: Audrey (WASD keys) -->
  <div id="dpad-right" class="dpad">
    <button class="dpad-btn dpad-up"    data-key="w">▲</button>
    <button class="dpad-btn dpad-left"  data-key="a">◄</button>
    <div class="dpad-center">Audrey</div>
    <button class="dpad-btn dpad-right" data-key="d">►</button>
    <button class="dpad-btn dpad-down"  data-key="s">▼</button>
  </div>

  <!-- Ride buttons -->
  <button id="ride-btn-left" class="ride-btn ride-btn-left" style="display:none;">RIDE</button>
  <button id="ride-btn-right" class="ride-btn ride-btn-right" style="display:none;">RIDE</button>

  <!-- Title screen touch buttons (only visible on title screen + touch) -->
  <div id="title-touch-btns">
    <!-- Step: mode -->
    <button class="title-touch-btn" id="btn-1p">1 Player</button>
    <button class="title-touch-btn" id="btn-2p-local">2 Players - Same iPad</button>
    <button class="title-touch-btn" id="btn-2p-online">2 Players - 2 iPads</button>
    <!-- Step: character -->
    <button class="title-touch-btn" id="btn-harper" style="display:none;">Harper</button>
    <button class="title-touch-btn" id="btn-audrey" style="display:none;">Audrey</button>
    <!-- Step: gametype -->
    <button class="title-touch-btn" id="btn-adventure" style="display:none;">Adventure</button>
    <button class="title-touch-btn" id="btn-freeplay" style="display:none;">Free Play</button>
    <button class="title-touch-btn" id="btn-battle" style="display:none;">Dragon Battle</button>
    <button class="title-touch-btn" id="btn-flight" style="display:none;">Dragon Flight</button>
    <button class="title-touch-btn" id="btn-snake" style="display:none;">Dragon Snake</button>
    <!-- Step: online -->
    <button class="title-touch-btn" id="btn-create-room" style="display:none;">Create Room</button>
    <button class="title-touch-btn" id="btn-join-room" style="display:none;">Join Room</button>
  </div>

  <!-- Room code overlay (for hosting/joining) -->
  <div id="room-code-overlay">
    <!-- Content is set dynamically by JS -->
  </div>

  <!-- Super buttons -->
  <button id="super-btn-left" class="super-btn" style="display:none;">SUPER!</button>
  <button id="super-btn-right" class="super-btn" style="display:none;">SUPER!</button>

  <!-- Swap buttons -->
  <button id="swap-btn-left" class="swap-btn">SWAP</button>
  <button id="swap-btn-right" class="swap-btn">SWAP</button>

  <!-- Dragon select touch controls -->
  <div id="dragon-select-touch" style="display:none; position: fixed; bottom: 30px; left: 0; right: 0; z-index: 20; text-align: center;">
    <button id="dragon-prev" style="padding: 14px 28px; font-size: 22px; font-family: monospace; font-weight: bold; border: 2px solid #FFD700; border-radius: 10px; background: rgba(26,26,46,0.85); color: #FFD700; cursor: pointer; margin: 0 10px; touch-action: none; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none;">&#9664;</button>
    <button id="dragon-confirm" style="padding: 14px 36px; font-size: 18px; font-family: monospace; font-weight: bold; border: 2px solid #FFD700; border-radius: 10px; background: rgba(26,26,46,0.85); color: #FFD700; cursor: pointer; margin: 0 10px; touch-action: none; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none;">Select!</button>
    <button id="dragon-next" style="padding: 14px 28px; font-size: 22px; font-family: monospace; font-weight: bold; border: 2px solid #FFD700; border-radius: 10px; background: rgba(26,26,46,0.85); color: #FFD700; cursor: pointer; margin: 0 10px; touch-action: none; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none;">&#9654;</button>
  </div>

  <script>
    // ============================================================
    // SOUND SYSTEM
    // ============================================================
    let audioCtx = null;

    function initAudio() {
      if (audioCtx) return;
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      } catch(e) {}
    }

    document.addEventListener('touchstart', initAudio, { once: true });
    document.addEventListener('click', initAudio, { once: true });
    document.addEventListener('keydown', initAudio, { once: true });

    function playSound(freq, duration, type, volume) {
      if (!audioCtx) return;
      try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = type || 'sine';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(volume || 0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + duration);
      } catch(e) {}
    }

    function sfxCollect() {
      playSound(523, 0.1, 'sine', 0.12);
      setTimeout(() => playSound(659, 0.1, 'sine', 0.12), 60);
      setTimeout(() => playSound(784, 0.15, 'sine', 0.10), 120);
    }

    function sfxHatch() {
      playSound(800, 0.08, 'sine', 0.08);
      setTimeout(() => playSound(1000, 0.08, 'sine', 0.08), 50);
      setTimeout(() => playSound(1200, 0.08, 'sine', 0.08), 100);
      setTimeout(() => playSound(1400, 0.12, 'sine', 0.06), 150);
      setTimeout(() => playSound(1600, 0.15, 'sine', 0.05), 200);
    }

    function sfxShoot() {
      playSound(440, 0.05, 'square', 0.03);
    }

    function sfxEnemyHit() {
      playSound(200, 0.08, 'triangle', 0.06);
    }

    function sfxEnemyCure() {
      playSound(600, 0.1, 'sine', 0.08);
      setTimeout(() => playSound(800, 0.15, 'sine', 0.06), 80);
    }

    function sfxPlayerHit() {
      playSound(150, 0.2, 'sawtooth', 0.08);
    }

    function sfxPowerUp() {
      playSound(400, 0.05, 'sine', 0.08);
      setTimeout(() => playSound(500, 0.05, 'sine', 0.08), 40);
      setTimeout(() => playSound(600, 0.05, 'sine', 0.08), 80);
      setTimeout(() => playSound(800, 0.1, 'sine', 0.08), 120);
    }

    function sfxSuper() {
      playSound(262, 0.3, 'sine', 0.10);
      playSound(330, 0.3, 'sine', 0.10);
      playSound(392, 0.3, 'sine', 0.10);
      playSound(523, 0.4, 'sine', 0.08);
    }

    function sfxUnlock() {
      playSound(523, 0.15, 'sine', 0.10);
      setTimeout(() => playSound(659, 0.15, 'sine', 0.10), 150);
      setTimeout(() => playSound(784, 0.15, 'sine', 0.10), 300);
      setTimeout(() => playSound(1047, 0.3, 'sine', 0.10), 450);
    }

    function sfxWaveClear() {
      playSound(523, 0.1, 'sine', 0.08);
      setTimeout(() => playSound(659, 0.1, 'sine', 0.08), 100);
      setTimeout(() => playSound(784, 0.1, 'sine', 0.08), 200);
      setTimeout(() => playSound(1047, 0.2, 'sine', 0.08), 300);
    }

    function sfxBossAppear() {
      playSound(100, 0.3, 'sawtooth', 0.08);
      setTimeout(() => playSound(80, 0.4, 'sawtooth', 0.06), 200);
    }

    function sfxSecret() {
      playSound(400, 0.15, 'sine', 0.08);
      setTimeout(() => playSound(600, 0.15, 'sine', 0.08), 100);
      setTimeout(() => playSound(500, 0.15, 'sine', 0.08), 200);
      setTimeout(() => playSound(700, 0.2, 'sine', 0.08), 300);
    }

    function sfxQuestComplete() {
      playSound(784, 0.1, 'sine', 0.10);
      setTimeout(() => playSound(988, 0.1, 'sine', 0.10), 100);
      setTimeout(() => playSound(1175, 0.2, 'sine', 0.10), 200);
    }

    function sfxSwap() {
      playSound(300, 0.08, 'triangle', 0.06);
      setTimeout(() => playSound(500, 0.1, 'triangle', 0.06), 50);
    }

    function sfxRide() {
      playSound(400, 0.1, 'sine', 0.08);
      setTimeout(() => playSound(600, 0.12, 'sine', 0.08), 80);
    }

    function sfxMenuSelect() {
      playSound(500, 0.05, 'sine', 0.06);
    }

    function sfxMenuConfirm() {
      playSound(600, 0.08, 'sine', 0.08);
      setTimeout(() => playSound(800, 0.1, 'sine', 0.08), 60);
    }

    let shotSoundCounter = 0;

    // ============================================================
    // CONSTANTS
    // ============================================================
    const CANVAS_W = 800;
    const CANVAS_H = 600;
    const TILE = 32;
    const COLS = 25;
    const ROWS = 18;

    const TILE_COLORS = {
      grass:      '#4a8f3f',
      grass2:     '#3d7a34',
      flower_r:   '#e74c3c',
      flower_y:   '#f1c40f',

      rainbow_rock:   '#B0BEC5',
      rainbow_flower: '#FF80AB',
      sparkle_tile:   '#FFF176',
    };

    const UI_ROWS = 2;
    const MAP_ROWS = ROWS - UI_ROWS; // 16 playable rows

    const SOLID_TILES = ['tree_trunk', 'tree_top', 'heart_tree', 'heart_leaf', 'water', 'rock', 'dark_tree_top', 'dark_tree_trunk', 'mushroom', 'cave_wall', 'crystal', 'cave_water', 'pine_top', 'pine_trunk', 'snow_rock', 'frozen_water', 'volcanic_rock', 'lava', 'lava2', 'magma_rock', 'rainbow_rock', 'rainbow_water'];

    // ZONE_FLOWER_MEADOW: 16 rows x 25 cols
    const ZONE_FLOWER_MEADOW = [
      // row 0
      ['tree_top','tree_top','grass','grass','grass','grass','flower_r','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','flower_y','grass','grass','grass','grass','tree_top','tree_top'],
      // row 1
      ['tree_trunk','tree_trunk','grass','grass','flower_p','grass','grass','grass','grass','grass2','grass2','grass2','grass2','grass2','grass2','grass2','grass','grass','grass','grass','flower_r','grass','grass','tree_trunk','tree_trunk'],
      // row 2
      ['grass','grass','grass','flower_y','grass','grass','grass','grass','grass2','grass2','grass2','grass2','grass2','grass2','grass2','grass2','grass2','grass','grass','grass','grass','grass','flower_p','grass','grass'],
      // row 3
      ['grass','grass','grass','grass','grass','flower_r','grass','grass','grass2','grass2','grass2','grass2','grass2','grass2','grass2','grass2','grass2','grass','grass','flower_y','grass','grass','grass','grass','grass'],
      // row 4
      ['grass','flower_p','grass','grass','grass','grass','grass','grass','grass2','grass2','grass2','grass2','grass2','grass2','grass2','grass2','grass2','grass','grass','grass','grass','grass','grass','flower_r','grass'],
      // row 5
      ['grass','grass','grass','bush','grass','grass','flower_y','grass','grass','grass2','grass2','grass2','grass2','grass2','grass2','grass2','grass','grass','grass','bush','grass','grass','grass','grass','grass'],
      // row 6
      ['grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass2','grass2','grass2','grass2','grass2','grass','grass','grass','grass','grass','flower_p','grass','grass','grass','grass'],
      // row 7
      ['grass','grass','flower_r','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass2','grass2','grass','grass','grass','grass','grass','grass','grass','grass','grass','flower_y','grass'],
      // row 8
      ['grass','grass','grass','grass','grass','flower_p','grass','grass','grass','rock','grass','grass','grass','grass','grass','grass','rock','grass','grass','grass','grass','flower_r','grass','grass','grass'],
      // row 9
      ['grass','flower_y','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','flower_p'],
      // row 10

    function generateSecretRoom(zoneKey) {
      const secret = SECRETS[zoneKey];
      if (!secret) return null;

      const w = secret.room.width;
      const h = secret.room.height;
      const map = [];

      const wallTile = {
        meadow: 'bush', heart: 'heart_leaf', enchanted: 'dark_tree_top',
        crystal: 'cave_wall', snowy: 'snow_rock', volcano: 'volcanic_rock', rainbow: 'rainbow_rock'
      }[zoneKey];

      const floorTile = {
        meadow: 'grass', heart: 'grass', enchanted: 'moss',
        crystal: 'cave_floor', snowy: 'snow', volcano: 'ash', rainbow: 'rainbow_grass'
      }[zoneKey];

      const decorTile = {
        meadow: 'flower_y', heart: 'flower_p', enchanted: 'mushroom',
        crystal: 'gem_blue', snowy: 'snow2', volcano: 'ember', rainbow: 'sparkle_tile'
      }[zoneKey];

      for (let r = 0; r < h; r++) {
        const row = [];
        for (let c = 0; c < w; c++) {
          if (r === 0 || r === h - 1 || c === 0 || c === w - 1) {
            if (r === h - 1 && c >= 4 && c <= 5) {
              row.push('path');
            } else {
              row.push(wallTile);
            }
          } else if ((r + c) % 5 === 0) {
            row.push(decorTile);
          } else {
            row.push(floorTile);
          }
        }
        map.push(row);
      }

      return map;
    }

      { type: 'hatch', text: 'Hatch 5 dragons', target: 5 },

    ];

    function generateQuest() {
      const template = QUEST_TEMPLATES[Math.floor(Math.random() * QUEST_TEMPLATES.length)];
      const quest = { ...template, progress: 0, completed: false };

      if (quest.type === 'collect') {
        const types = ['fire', 'nature', 'love', 'shadow', 'star', 'ice', 'ghost', 'thorn'];
        quest.dragonType = types[Math.floor(Math.random() * types.length)];
        quest.text = quest.text.replace('{type}', quest.dragonType);
      } else if (quest.type === 'visit' || quest.type === 'collect_any') {
        const zones = state.unlockedZones.filter(function(z) { return z !== state.currentZone; });
        if (zones.length === 0) return generateQuest();
        const zone = zones[Math.floor(Math.random() * zones.length)];
        quest.targetZone = zone;
        quest.text = quest.text.replace('{zone}', ZONES[zone].name);
      }

      if (quest.type === 'collect_any') {
        quest.startTotal = Object.values(state.collection).reduce(function(a, b) { return a + b; }, 0);
      }

      return quest;
    }

    function initQuests() {
      state.quests = [];
      for (let i = 0; i < 3; i++) {

      }
    }

    function checkQuests() {
      for (let i = 0; i < state.quests.length; i++) {
        const q = state.quests[i];
        if (q.completed) continue;

        let done = false;
        switch (q.type) {
          case 'collect':
            done = (state.collection[q.dragonType] || 0) >= q.target;
            break;
          case 'visit':
            done = state.currentZone === q.targetZone;
            break;
          case 'secret':
            done = Object.values(state.secretRoomFound).some(function(v) { return v; });
            break;
          case 'hatch':
            done = Object.values(state.collection).reduce(function(a, b) { return a + b; }, 0) >= q.target;
            break;
          case 'types':
            done = Object.keys(state.collection).length >= q.target;
            break;
          case 'collect_any':
            done = state.currentZone === q.targetZone && state.collection && Object.values(state.collection).reduce(function(a, b) { return a + b; }, 0) > (q.startTotal || 0);
            break;
          case 'parade':
            done = state.dragons.length >= q.target;
            break;
        }

        if (done) {
          q.completed = true;
          state.stars++;
          sfxQuestComplete();
          try { localStorage.setItem('dragonIslandStars', state.stars.toString()); } catch(e) {}
          state.questComplete = { text: q.text + ' \u2605', timer: 2 };

          const questIndex = i;
          setTimeout(function() {
            state.quests[questIndex] = generateQuest();
          }, 2000);
        }
      }
    }

    function drawTile(type, col, row) {
      const x = col * TILE;
      const y = (row + UI_ROWS) * TILE;
      const color = TILE_COLORS[type];

      if (type === 'flower_r' || type === 'flower_y' || type === 'flower_p') {
        // grass background
        ctx.fillStyle = TILE_COLORS['grass'];
        ctx.fillRect(x, y, TILE, TILE);
        // small colored circle
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(x + TILE / 2, y + TILE / 2, TILE * 0.28, 0, Math.PI * 2);
        ctx.fill();
        // white center
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(x + TILE / 2, y + TILE / 2, TILE * 0.1, 0, Math.PI * 2);
        ctx.fill();
      } else if (type === 'bush') {
        // grass background
        ctx.fillStyle = TILE_COLORS['grass'];
        ctx.fillRect(x, y, TILE, TILE);
        // green circle
        ctx.fillStyle = TILE_COLORS['bush'];
        ctx.beginPath();
        ctx.arc(x + TILE / 2, y + TILE * 0.6, TILE * 0.32, 0, Math.PI * 2);
        ctx.fill();
      } else if (type === 'mushroom') {
        // grass bg
        ctx.fillStyle = TILE_COLORS['grass'];
        ctx.fillRect(x, y, TILE, TILE);
        // brown stem
        ctx.fillStyle = '#8B4513';
        ctx.fillRect(x + TILE * 0.4, y + TILE * 0.55, TILE * 0.2, TILE * 0.35);
        // purple semicircle cap
        ctx.fillStyle = TILE_COLORS['mushroom'];
        ctx.beginPath();
        ctx.arc(x + TILE / 2, y + TILE * 0.55, TILE * 0.3, Math.PI, 0);
        ctx.fill();
        // white dot
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(x + TILE / 2, y + TILE * 0.42, TILE * 0.07, 0, Math.PI * 2);
        ctx.fill();
      } else if (type === 'moss') {
        ctx.fillStyle = TILE_COLORS['moss'];
        ctx.fillRect(x, y, TILE, TILE);
      } else if (type === 'crystal') {
        // cave_floor bg
        ctx.fillStyle = TILE_COLORS['cave_floor'];
        ctx.fillRect(x, y, TILE, TILE);
        // diamond shape
        ctx.fillStyle = TILE_COLORS['crystal'];
        ctx.beginPath();
        ctx.moveTo(x + TILE / 2, y + TILE * 0.15);
        ctx.lineTo(x + TILE * 0.75, y + TILE / 2);
        ctx.lineTo(x + TILE / 2, y + TILE * 0.85);
        ctx.lineTo(x + TILE * 0.25, y + TILE / 2);
        ctx.closePath();
        ctx.fill();
        // white shine dot
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(x + TILE * 0.4, y + TILE * 0.35, TILE * 0.06, 0, Math.PI * 2);
        ctx.fill();
      } else if (type === 'gem_blue' || type === 'gem_pink') {
        // cave_floor bg
        ctx.fillStyle = TILE_COLORS['cave_floor'];
        ctx.fillRect(x, y, TILE, TILE);
        // small colored circle
        ctx.fillStyle = TILE_COLORS[type];
        ctx.beginPath();
        ctx.arc(x + TILE / 2, y + TILE / 2, TILE * 0.2, 0, Math.PI * 2);
        ctx.fill();
        // white shine
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(x + TILE * 0.45, y + TILE * 0.4, TILE * 0.06, 0, Math.PI * 2);
        ctx.fill();
      } else if (type === 'lava' || type === 'lava2') {
        // Animated lava pulse - varies green channel for flickering glow
        const pulse = Math.sin(state.time * 3 + col * 0.5 + row * 0.3) * 0.15;
        const baseColor = type === 'lava' ? [255, 111, 0] : [230, 81, 0];
        const g = Math.max(0, Math.min(255, baseColor[1] + Math.floor(pulse * 255)));
        ctx.fillStyle = 'rgb(' + baseColor[0] + ',' + g + ',' + baseColor[2] + ')';
        ctx.fillRect(x, y, TILE, TILE);
      } else if (type === 'ember') {
        // ash bg
        ctx.fillStyle = TILE_COLORS['ash'];
        ctx.fillRect(x, y, TILE, TILE);
        // small orange-red dot
        ctx.fillStyle = TILE_COLORS['ember'];
        ctx.beginPath();
        ctx.arc(x + TILE / 2, y + TILE / 2, TILE * 0.12, 0, Math.PI * 2);
        ctx.fill();
      } else if (type === 'rainbow_water') {
        // Animated rainbow shimmer - cycles hue based on time and position
        const hue = ((state.time * 50) + col * 20 + row * 20) % 360;
        ctx.fillStyle = 'hsl(' + hue + ', 70%, 60%)';
        ctx.fillRect(x, y, TILE, TILE);
      } else if (type === 'rainbow_flower') {
        // rainbow_grass bg
        ctx.fillStyle = TILE_COLORS['rainbow_grass'];
        ctx.fillRect(x, y, TILE, TILE);
        // color-cycling flower
        const flowerHue = ((state.time * 80) + col * 30 + row * 30) % 360;
        ctx.fillStyle = 'hsl(' + flowerHue + ', 80%, 65%)';
        ctx.beginPath();
        ctx.arc(x + TILE / 2, y + TILE / 2, TILE * 0.28, 0, Math.PI * 2);
        ctx.fill();
        // white center
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(x + TILE / 2, y + TILE / 2, TILE * 0.1, 0, Math.PI * 2);
        ctx.fill();
      } else if (type === 'sparkle_tile') {
        // rainbow_grass bg
        ctx.fillStyle = TILE_COLORS['rainbow_grass'];
        ctx.fillRect(x, y, TILE, TILE);
        // pulsing white dot
        const sparkleAlpha = Math.sin(state.time * 4 + col + row) * 0.4 + 0.6;
        ctx.fillStyle = 'rgba(255, 255, 255, ' + sparkleAlpha + ')';
        ctx.beginPath();
        ctx.arc(x + TILE / 2, y + TILE / 2, TILE * 0.15, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.fillStyle = color || '#000';
        ctx.fillRect(x, y, TILE, TILE);
      }
    }

    function drawZone(zone) {
      if (state.inSecretRoom && state.secretRoomMap) {
        const map = state.secretRoomMap;
        const offsetCol = Math.floor((COLS - map[0].length) / 2);
        const offsetRow = Math.floor((MAP_ROWS - map.length) / 2);

        // Draw dark background
        ctx.fillStyle = SECRETS[state.secretRoomZone].room.bg;
        ctx.fillRect(0, UI_ROWS * TILE, CANVAS_W, MAP_ROWS * TILE);

        // Draw room tiles centered
        for (let row = 0; row < map.length; row++) {
          for (let col = 0; col < map[row].length; col++) {
            drawTile(map[row][col], col + offsetCol, row + offsetRow);
          }
        }

        // "Secret Room!" label
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 14px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(SECRETS[state.secretRoomZone].room.name, CANVAS_W / 2, UI_ROWS * TILE + 20);

        return;
      }

      for (let row = 0; row < MAP_ROWS; row++) {
        for (let col = 0; col < COLS; col++) {
          drawTile(zone.map[row][col], col, row);
        }
      }

      // Secret path rendering (earned by collecting all eggs)
      if (state.secretPathActive[state.currentZone] && !state.inSecretRoom) {
        const pathX = 12 * TILE;
        const pathY = (8 + UI_ROWS) * TILE;
        const timer = state.secretPathTimer[state.currentZone] || 0;
        const bright = timer > 30;

        const pulse = bright
          ? 0.5 + Math.sin(state.time * 4) * 0.5
          : 0.2 + Math.sin(state.time * 2) * 0.1;

        ctx.fillStyle = 'rgba(255, 215, 0, ' + pulse + ')';
        ctx.fillRect(pathX, pathY, TILE, TILE);

        if (bright) {
          for (let i = 0; i < 4; i++) {
            const sx = pathX + Math.sin(state.time * 3 + i * 1.5) * 8 + TILE / 2;
            const sy = pathY + Math.cos(state.time * 2 + i) * 8 + TILE / 2;
            ctx.fillStyle = 'rgba(255, 255, 100, ' + pulse + ')';
            ctx.fillRect(sx - 1, sy - 1, 3, 3);
          }
        }
      }

      // Secret tile visual hints (subtle sparkle on undiscovered secret tiles)
      if (SECRETS[state.currentZone] && !state.inSecretRoom) {
        for (const st of SECRETS[state.currentZone].secretTiles) {
          if (!state.secretRoomFound[state.currentZone]) {
            const sparkle = Math.sin(state.time * 1.5 + st.col + st.row) > 0.85;
            if (sparkle) {
              const sx = st.col * TILE + TILE / 2;
              const sy = (st.row + UI_ROWS) * TILE + TILE / 2;
              ctx.fillStyle = 'rgba(255, 255, 200, 0.4)';
              ctx.fillRect(sx - 1, sy - 1, 3, 3);
            }
          }
        }
      }
    }

    function drawPlayers() {
      const active = getActivePlayers();
      for (let i = 0; i < active.length; i++) {
        const p = active[i];
        const pi = state.activePlayerCount === 1 ? state.activePlayer : i;
        let px = p.x * TILE;
        let py = (p.y + UI_ROWS) * TILE;

        if (state.inSecretRoom && state.secretRoomMap) {
          const offsetCol = Math.floor((COLS - state.secretRoomMap[0].length) / 2);
          const offsetRow = Math.floor((MAP_ROWS - state.secretRoomMap.length) / 2);
          px = (p.x + offsetCol) * TILE;
          py = (p.y + offsetRow + UI_ROWS) * TILE;
        }

        if (state.riding[pi] && state.ridingDragon[pi]) {
          // Draw riding dragon (larger)
          const dragonKey = state.ridingDragon[pi];
          drawSprite(DRAGON_SPRITES[dragonKey], px - 4, py - 4, 40);
          // Draw character on top (smaller)
          drawSprite(p.sprite, px + 8, py - 8, 18);
        } else {
          // Normal drawing
          drawSprite(p.sprite, px, py, TILE);

          if (p.name === 'Harper') {
            const sx = px + TILE - 6;
            const sy = py + 2;
            const twinkle = Math.sin(state.time * 3) * 0.3 + 0.7;
            ctx.fillStyle = `rgba(255, 255, 255, ${twinkle})`;
            ctx.font = '8px serif';
            ctx.textAlign = 'left';
            ctx.fillText('\u2744', sx, sy + 8);
          }

          if (p.name === 'Audrey') {
            const sx = px + TILE - 6;
            const sy = py + 2;
            const twinkle = Math.sin(state.time * 4) * 0.3 + 0.7;
            ctx.fillStyle = `rgba(200, 150, 255, ${twinkle})`;
            ctx.font = '8px serif';
            ctx.textAlign = 'left';
            ctx.fillText('\u2726', sx, sy + 8);
          }
        }
      }
    }

    function drawEggs() {
      for (const egg of state.eggs) {
        const bob = Math.sin(state.time * 2 + egg.bobOffset) * 3;
        let oC = 0, oR = 0;
        if (state.inSecretRoom && state.secretRoomMap) {
          oC = Math.floor((COLS - state.secretRoomMap[0].length) / 2);
          oR = Math.floor((MAP_ROWS - state.secretRoomMap.length) / 2);
        }
        const px = (egg.x + oC) * TILE + 4;
        const py = (egg.y + oR + UI_ROWS) * TILE + bob;

        // Glow effect
        const glowAlpha = 0.3 + Math.sin(state.time * 3 + egg.bobOffset) * 0.15;
        ctx.fillStyle = `rgba(255, 255, 200, ${glowAlpha})`;
        ctx.beginPath();
        ctx.arc((egg.x + oC) * TILE + TILE / 2, (egg.y + oR + UI_ROWS) * TILE + TILE / 2 + bob, TILE / 2, 0, Math.PI * 2);
        ctx.fill();

        drawSprite(EGG_SPRITES[egg.type], px, py, TILE * 0.75);
      }
    }

    function drawDragons() {
      let oC = 0, oR = 0;
      if (state.inSecretRoom && state.secretRoomMap) {
        oC = Math.floor((COLS - state.secretRoomMap[0].length) / 2);
        oR = Math.floor((MAP_ROWS - state.secretRoomMap.length) / 2);
      }
      for (let i = 0; i < state.dragons.length; i++) {
        const d = state.dragons[i];
        const bounce = Math.sin(state.time * 4 + i * 0.8) * 2;
        drawSprite(
          DRAGON_SPRITES[d.type],
          (d.x + oC) * TILE + 6,
          (d.y + oR + UI_ROWS) * TILE + bounce + 4,
          TILE * 0.6
        );
      }
    }

    function drawUI() {
      // Background bar
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, CANVAS_W, UI_ROWS * TILE);

      // Zone name
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 14px monospace';
      ctx.textAlign = 'left';
      if (state.inSecretRoom && state.secretRoomZone) {
        ctx.fillText(SECRETS[state.secretRoomZone].room.name, 10, 20);
      } else {
        ctx.fillText(ZONES[state.currentZone].name, 10, 20);
      }

      // Dragon collection icons (12 types in 2 rows)
      const allTypes = ['fire', 'nature', 'love', 'shadow', 'star', 'ice', 'ghost', 'thorn', 'rainbow', 'storm', 'crystal_dragon', 'cosmic'];
      const startX = 10;
      const iconSpacing = 55; // tighter spacing to fit 12 types in 2 rows of 6

      for (let i = 0; i < allTypes.length; i++) {
        const type = allTypes[i];
        const count = state.collection[type] || 0;
        const col = i % 6;
        const row = Math.floor(i / 6);
        const x = startX + col * iconSpacing;
        const y = 24 + row * 22;

        if (count > 0) {
          drawSprite(DRAGON_SPRITES[type], x, y - 6, 20);
          ctx.fillStyle = '#fff';
          ctx.font = '10px monospace';
          ctx.textAlign = 'left';
          ctx.fillText('x' + count, x + 22, y + 6);
        } else {
          ctx.fillStyle = '#444';
          ctx.fillRect(x, y - 4, 14, 14);
          ctx.fillStyle = '#555';
          ctx.font = '10px monospace';
          ctx.textAlign = 'left';
          ctx.fillText('?', x + 3, y + 6);
        }
      }

      // Player labels
      ctx.textAlign = 'right';
      ctx.font = '11px monospace';
      if (state.playerMode === '2p-online') {
        ctx.fillStyle = players[0].color;
        const p1Label = state.isHost ? 'You' : 'Online';
        ctx.fillText(players[0].name + ' (' + p1Label + ')', CANVAS_W - 10, 18);
        ctx.fillStyle = players[1].color;
        const p2Label = state.isGuest ? 'You' : 'Online';
        ctx.fillText(players[1].name + ' (' + p2Label + ')', CANVAS_W - 10, 34);
      } else if (state.activePlayerCount === 1) {
        const ap = players[state.activePlayer];
        const ctrlHint = state.activePlayer === 0 ? 'Arrows' : 'WASD';
        ctx.fillStyle = ap.color;
        ctx.fillText(ap.name + ': ' + ctrlHint, CANVAS_W - 10, 18);
      } else {
        ctx.fillStyle = players[0].color;
        ctx.fillText(players[0].name + ': Arrows', CANVAS_W - 10, 18);
        ctx.fillStyle = players[1].color;
        ctx.fillText(players[1].name + ': WASD', CANVAS_W - 10, 34);
      }

      // Adventure mode unlock progress
      if (state.mode === 'adventure') {
        const totalCollected = Object.values(state.collection).reduce((a, b) => a + b, 0);
        const unlockOrder = [
          { zone: 'heart', count: 5 },
          { zone: 'enchanted', count: 8 },
          { zone: 'crystal', count: 12 },
          { zone: 'snowy', count: 16 },
          { zone: 'volcano', count: 20 },
          { zone: 'rainbow', count: 25 },
        ];
        ctx.textAlign = 'center';
        ctx.fillStyle = '#aaa';
        ctx.font = '11px monospace';
        let nextUnlock = null;
        for (const u of unlockOrder) {
          if (!state.unlockedZones.includes(u.zone)) {
            nextUnlock = u;
            break;
          }
        }
        if (nextUnlock) {
          ctx.fillText('Collect ' + totalCollected + '/' + nextUnlock.count + ' eggs to unlock ' + ZONES[nextUnlock.zone].name, CANVAS_W / 2, CANVAS_H - 8);
        } else {
          ctx.fillText('All zones unlocked! Explore everywhere!', CANVAS_W / 2, CANVAS_H - 8);
        }
      }

      // Divider line
      ctx.strokeStyle = '#444';
      ctx.beginPath();
      ctx.moveTo(0, UI_ROWS * TILE);
      ctx.lineTo(CANVAS_W, UI_ROWS * TILE);
      ctx.stroke();
    }

    function drawQuests() {
      if (!state.quests || state.quests.length === 0) return;

      const x = CANVAS_W - 10;
      let y = 50;

      // Semi-transparent background panel for readability
      ctx.fillStyle = 'rgba(0, 0, 0, 0.35)';
      ctx.fillRect(CANVAS_W - 210, y - 12, 210, 14 + state.quests.length * 12 + 4);

      ctx.textAlign = 'right';
      ctx.font = '9px monospace';
      ctx.fillStyle = '#FFD700';
      ctx.fillText('Quests (' + state.stars + ' \u2605)', x, y);
      y += 14;

      for (const q of state.quests) {
        if (q.completed) {
          ctx.fillStyle = '#FFD700';
          ctx.fillText('\u2605 ' + q.text, x, y);
        } else {
          ctx.fillStyle = '#ccc';
          ctx.fillText('\u25CB ' + q.text, x, y);
        }
        y += 12;
      }

      // Quest complete animation
      if (state.questComplete) {
        state.questComplete.timer -= 1 / 60;
        const t = state.questComplete.timer;
        if (t > 0) {
          ctx.globalAlpha = Math.min(1, t);

          // Animated background flash
          const flashAlpha = Math.min(0.3, t * 0.15);
          ctx.fillStyle = 'rgba(255, 215, 0, ' + flashAlpha + ')';
          ctx.fillRect(0, CANVAS_H / 2 - 55, CANVAS_W, 50);

          ctx.fillStyle = '#FFD700';
          ctx.font = 'bold 16px monospace';
          ctx.textAlign = 'center';
          ctx.fillText('Quest Complete!', CANVAS_W / 2, CANVAS_H / 2 - 40);
          ctx.font = '12px monospace';
          ctx.fillStyle = '#fff';
          ctx.fillText(state.questComplete.text, CANVAS_W / 2, CANVAS_H / 2 - 20);

          // Sparkle particles around the text
          for (let i = 0; i < 6; i++) {
            const angle = (i / 6) * Math.PI * 2 + state.time * 3;
            const radius = 60 + Math.sin(state.time * 5 + i) * 10;
            const sx = CANVAS_W / 2 + Math.cos(angle) * radius;
            const sy = CANVAS_H / 2 - 30 + Math.sin(angle) * 15;
            ctx.fillStyle = 'rgba(255, 255, 100, ' + Math.min(1, t) + ')';
            ctx.fillRect(sx - 2, sy - 2, 4, 4);
          }

          ctx.globalAlpha = 1;
        } else {
          state.questComplete = null;
        }
      }
    }

    function drawUnlockEffect() {
      if (!state.unlockEffect) return;
      const t = state.unlockEffect.timer;
      const alpha = Math.max(0, 1 - t / 2);

      for (let i = 0; i < 15; i++) {
        const x = (8 + i) * TILE + Math.sin(t * 5 + i) * 5;
        const y = (MAP_ROWS - 1 + UI_ROWS) * TILE + Math.cos(t * 4 + i * 0.5) * 10;
        ctx.fillStyle = `rgba(255, 255, 100, ${alpha * (0.5 + Math.sin(t * 8 + i) * 0.5)})`;
        ctx.fillRect(x - 2, y - 2, 4, 4);
      }

      if (t < 1.5) {
        ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
        ctx.font = 'bold 18px monospace';
        ctx.textAlign = 'center';
        const unlockedName = ZONES[state.unlockEffect.zone] ? ZONES[state.unlockEffect.zone].name : 'New Zone';
        ctx.fillText(unlockedName + ' unlocked!', CANVAS_W / 2, CANVAS_H / 2 - 20);
        ctx.font = '13px monospace';
        ctx.fillText('Walk to the path at the bottom!', CANVAS_W / 2, CANVAS_H / 2 + 5);
      }
    }

    function drawJoysticks() {
      if (state.screen !== 'playing' || !isTouchDevice) return;

      for (const side of ['left', 'right']) {
        const j = joystick[side];
        if (!j.active) continue;

        // Convert screen coords to canvas coords
        const canvasRect = canvas.getBoundingClientRect();
        const scaleX = CANVAS_W / canvasRect.width;
        const scaleY = CANVAS_H / canvasRect.height;

        const baseX = (j.baseX - canvasRect.left) * scaleX;
        const baseY = (j.baseY - canvasRect.top) * scaleY;
        const knobX = (j.knobX - canvasRect.left) * scaleX;
        const knobY = (j.knobY - canvasRect.top) * scaleY;

        // Clamp knob distance to maxDist
        const dx = knobX - baseX;
        const dy = knobY - baseY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const maxDist = 40;
        const clampedX = dist > maxDist ? baseX + (dx / dist) * maxDist : knobX;
        const clampedY = dist > maxDist ? baseY + (dy / dist) * maxDist : knobY;

        // Base circle
        ctx.globalAlpha = 0.2;
        ctx.fillStyle = side === 'left' ? '#87CEEB' : '#9B59B6';
        ctx.beginPath();
        ctx.arc(baseX, baseY, 40, 0, Math.PI * 2);
        ctx.fill();

        // Knob
        ctx.globalAlpha = 0.5;
        ctx.fillStyle = side === 'left' ? '#87CEEB' : '#9B59B6';
        ctx.beginPath();
        ctx.arc(clampedX, clampedY, 18, 0, Math.PI * 2);
        ctx.fill();

        ctx.globalAlpha = 1;
      }
    }

      apiKey: "AIzaSyADY6POzJ3UG9kPm1hi89Dn6dscRXgPAnI",
      authDomain: "dragon-egg-island.firebaseapp.com",

    };

    let firebaseApp = null;
    let firebaseDb = null;
    let roomRef = null;
    let syncInterval = null;
    let keepaliveInterval = null;
    let guestInputListener = null;
    let gameStateListener = null;
    let hostConnectionListener = null;
    let guestConnectionListener = null;

    function initFirebase() {
      if (firebaseApp) return;
      firebaseApp = firebase.initializeApp(FIREBASE_CONFIG);
      firebaseDb = firebase.database();

      // Monitor connection state for reconnection awareness
      const connectedRef = firebaseDb.ref('.info/connected');
      connectedRef.on('value', function(snap) {
        if (snap.val() === true) {
          console.log('Firebase connected');
        } else {
          console.log('Firebase disconnected');
        }
      });
    }

    function generateRoomCode() {
      return Math.floor(1000 + Math.random() * 9000).toString();
    }

    function cleanupFirebase() {
      if (syncInterval) {
        clearInterval(syncInterval);
        syncInterval = null;
      }
      if (keepaliveInterval) {
        clearInterval(keepaliveInterval);
        keepaliveInterval = null;
      }
      if (guestInputListener && roomRef) {
        roomRef.child('input/guest').off('value', guestInputListener);
        guestInputListener = null;
      }
      if (gameStateListener && roomRef) {
        roomRef.child('gameState').off('value', gameStateListener);
        gameStateListener = null;
      }
      if (hostConnectionListener && roomRef) {
        roomRef.child('host/connected').off('value', hostConnectionListener);
        hostConnectionListener = null;
      }
      if (guestConnectionListener && roomRef) {
        roomRef.child('guest/connected').off('value', guestConnectionListener);
        guestConnectionListener = null;
      }
      if (roomRef && state.isHost) {
        roomRef.remove();
      } else if (roomRef && state.isGuest) {
        roomRef.child('guest').remove();
      }
      roomRef = null;
      state.isHost = false;
      state.isGuest = false;
      state.roomCode = null;
      state.onlineStatus = null;
      state.guestConnected = false;
      state.hostConnected = false;
    }

    // Guest input received by host
    let remoteGuestInput = { dx: 0, dy: 0, battleX: -1, superPressed: false, swapPressed: false };

    function createRoom() {
      initFirebase();
      state.roomCode = generateRoomCode();
      state.isHost = true;
      state.onlineStatus = 'waiting';

      roomRef = firebaseDb.ref('rooms/' + state.roomCode);

      // Write host entry
      roomRef.child('host').set({ connected: true });
      roomRef.child('host').child('connected').onDisconnect().set(false);
      roomRef.child('input/guest').set({ dx: 0, dy: 0 });

      // Listen for guest connection
      guestConnectionListener = roomRef.child('guest/connected').on('value', function(snap) {
        if (snap.val() === true) {
          state.guestConnected = true;
          if (state.onlineStatus === 'waiting') {
            state.onlineStatus = 'connected';
            // Move to gametype selection
            hideRoomOverlay();
            state.titleStep = 'gametype';
            state.titleSelection = 0;
            updateTitleTouchUI();
          }
        } else {
          if (state.guestConnected && state.screen === 'playing') {
            state.guestConnected = false;
            state.onlineStatus = 'disconnected';
          }
        }
      });

      // Listen for guest input
      guestInputListener = roomRef.child('input/guest').on('value', function(snap) {
        const val = snap.val();
        if (val) {
          remoteGuestInput.dx = val.dx || 0;
          remoteGuestInput.dy = val.dy || 0;
          remoteGuestInput.battleX = (val.bx != null) ? val.bx : -1;
          if (val.sp) {
            remoteGuestInput.superPressed = true;
          }
          if (val.sw) {
            remoteGuestInput.swapPressed = true;
          }
        }
      });

      showRoomOverlayHost();
    }

    function joinRoom(code) {
      initFirebase();
      state.roomCode = code;
      state.isGuest = true;
      state.onlineStatus = 'joining';

      roomRef = firebaseDb.ref('rooms/' + code);

      // Check if room exists
      roomRef.child('host/connected').once('value', function(snap) {
        if (!snap.val()) {
          state.onlineStatus = null;
          state.isGuest = false;
          roomRef = null;
          showRoomOverlayJoinError('Room not found');
          return;
        }

        // Write guest entry
        roomRef.child('guest').set({ connected: true });
        roomRef.child('guest').child('connected').onDisconnect().set(false);

        state.onlineStatus = 'connected';
        state.hostConnected = true;

        // Listen for host disconnect
        hostConnectionListener = roomRef.child('host/connected').on('value', function(hSnap) {
          if (hSnap.val() !== true && state.hostConnected) {
            state.hostConnected = false;
            state.onlineStatus = 'disconnected';
            // Return to title if host left
            if (state.screen === 'playing') {
              cleanupFirebase();
              returnToTitle();
            }
          }
        });

        // Listen for game state (this is the main sync channel)
        gameStateListener = roomRef.child('gameState').on('value', function(gsSnap) {
          const gs = gsSnap.val();
          if (!gs) return;

          if (gs.started && state.screen === 'title') {
            // Game has started, switch to the correct screen
            state.playerMode = '2p-online';
            state.activePlayerCount = 2;
            state.activePlayer = null;
            hideRoomOverlay();
            // The screen will be set by applyRemoteGameState via gs.scr
            if (gs.scr) {
              state.screen = gs.scr;
            } else {
              state.screen = 'playing';
            }
            updateTitleTouchUI();
          }

          if (gs.started) {
            applyRemoteGameState(gs);
          }
        });

        showRoomOverlayGuestConnected();
      });
    }

    function compressGameState() {
      const syncData = {
        p: [
          { x: players[0].x, y: players[0].y },
          { x: players[1].x, y: players[1].y }
        ],
        z: state.currentZone,
        e: state.eggs.map(function(egg) {
          return { t: egg.type, x: egg.x, y: egg.y, b: Math.round(egg.bobOffset * 100) / 100 };
        }),
        d: state.dragons.map(function(d) {
          return { t: d.type, fp: d.followPlayer, x: d.x, y: d.y };
        }),
        h: state.hatching.map(function(h) {
          return { t: h.type, x: h.x, y: h.y, tm: Math.round(h.timer * 100) / 100, ph: h.phase };
        }),
        c: state.collection,
        ul: state.unlockedZones,
        ue: state.unlockEffect ? { tm: Math.round(state.unlockEffect.timer * 100) / 100, zone: state.unlockEffect.zone } : null,
        m: state.mode,
        t: Math.round(state.time * 10) / 10,
        started: true
      };

      // Include screen so guest knows what mode we're in
      syncData.scr = state.screen;

      if (state.screen === 'battle' || state.screen === 'dragonSelect') {
        syncData.bat = {
          w: state.battle.wave,
          ws: state.battle.waveState,
          wt: state.battle.waveTimer,
          pd: state.battle.playerDragons,
          dsi: state.dragonSelectIndex,
          dsp: state.dragonSelectPlayer,
          bp: state.battle.battlePlayers.map(function(bp) {
            return {
              x: Math.round(bp.x), h: bp.hearts, sm: Math.round(bp.superMeter),
              a: bp.alive, rt: bp.respawnTimer, it: bp.invTimer,
              sh: bp.shieldActive, sb: bp.speedBoost,
            };
          }),
          en: state.battle.enemies.slice(0, 20).map(function(e) {
            return {
              tp: e.type, x: Math.round(e.x), y: Math.round(e.y),
              hp: e.hp, mhp: e.maxHp, c: e.curing, ct: e.cureTimer,
            };
          }),
          sh: state.battle.shots.slice(0, 30).map(function(s) {
            return {
              x: Math.round(s.x), y: Math.round(s.y),
              c: s.color, ie: !!s.isEnemy,
            };
          }),
          dr: state.battle.drops.slice(0, 10).map(function(d) {
            return {
              tp: d.type, x: Math.round(d.x), y: Math.round(d.y),
              c: d.color, sy: d.symbol,
            };
          }),
          ef: state.battle.effects.slice(0, 5).map(function(e) {
            return {
              tp: e.type, x: Math.round(e.x), y: Math.round(e.y),
              t: e.timer, mt: e.maxTimer,
            };
          }),
        };
      }

      return syncData;
    }

    function applyRemoteGameState(gs) {
      if (gs.p && gs.p[0]) {
        players[0].x = gs.p[0].x;
        players[0].y = gs.p[0].y;
      }
      if (gs.p && gs.p[1]) {
        players[1].x = gs.p[1].x;
        players[1].y = gs.p[1].y;
      }
      if (gs.z) state.currentZone = gs.z;
      if (gs.e) {
        state.eggs = gs.e.map(function(e) {
          return { type: e.t, x: e.x, y: e.y, bobOffset: e.b };
        });
      } else {
        state.eggs = [];
      }
      if (gs.d) {
        state.dragons = gs.d.map(function(d) {
          return { type: d.t, followPlayer: d.fp, x: d.x, y: d.y };
        });
      } else {
        state.dragons = [];
      }
      if (gs.h) {
        state.hatching = gs.h.map(function(h) {
          return { type: h.t, x: h.x, y: h.y, timer: h.tm, phase: h.ph };
        });
      } else {
        state.hatching = [];
      }
      if (gs.c) state.collection = gs.c;
      if (gs.ul) state.unlockedZones = gs.ul;
      if (gs.ue) {
        state.unlockEffect = { timer: gs.ue.tm, zone: gs.ue.zone };
      } else {
        state.unlockEffect = null;
      }
      if (gs.m) state.mode = gs.m;
      if (gs.t != null) state.time = gs.t;

      // Screen sync (battle / dragonSelect / playing)
      if (gs.scr) {
        state.screen = gs.scr;
      }

      // Battle state sync
      if (gs.bat) {
        const bat = gs.bat;
        state.battle.wave = bat.w;
        state.battle.waveState = bat.ws;
        state.battle.waveTimer = bat.wt;
        state.battle.playerDragons = bat.pd;
        state.dragonSelectIndex = bat.dsi;
        state.dragonSelectPlayer = bat.dsp;

        // Update battle players
        if (bat.bp) {
          bat.bp.forEach(function(bp, i) {
            const local = state.battle.battlePlayers[i];
            if (!local) return;
            local.x = bp.x; local.hearts = bp.h; local.superMeter = bp.sm;
            local.alive = bp.a; local.respawnTimer = bp.rt; local.invTimer = bp.it;
            local.shieldActive = bp.sh; local.speedBoost = bp.sb;
          });
        }

        // Replace enemies from host
        if (bat.en) {
          state.battle.enemies = bat.en.map(function(e) {
            return {
              type: e.tp, x: e.x, y: e.y, hp: e.hp, maxHp: e.mhp,
              curing: e.c, cureTimer: e.ct, timer: 0,
              size: ENEMY_TYPES[e.tp] ? ENEMY_TYPES[e.tp].size : 20,
              color: ENEMY_TYPES[e.tp] ? ENEMY_TYPES[e.tp].color : '#888',
              pattern: ENEMY_TYPES[e.tp] ? ENEMY_TYPES[e.tp].pattern : 'straight',
            };
          });
        } else {
          state.battle.enemies = [];
        }

        // Replace shots from host
        if (bat.sh) {
          state.battle.shots = bat.sh.map(function(s) {
            return { x: s.x, y: s.y, vx: 0, vy: 0, color: s.c, isEnemy: s.ie };
          });
        } else {
          state.battle.shots = [];
        }

        // Replace drops from host
        if (bat.dr) {
          state.battle.drops = bat.dr.map(function(d) {
            return { type: d.tp, x: d.x, y: d.y, vy: 0, color: d.c, symbol: d.sy };
          });
        } else {
          state.battle.drops = [];
        }

        // Replace effects from host
        if (bat.ef) {
          state.battle.effects = bat.ef.map(function(e) {
            return { type: e.tp, x: e.x, y: e.y, timer: e.t, maxTimer: e.mt };
          });
        } else {
          state.battle.effects = [];
        }
      }
    }

    function syncToFirebase() {
      if (!roomRef || !state.isHost) return;
      roomRef.child('gameState').set(compressGameState());
    }

    let guestSwapPressed = false;

    function sendGuestInput(dx, dy, battleX, superPressed) {
      if (!roomRef || !state.isGuest) return;
      const data = { dx: dx, dy: dy };
      if (battleX != null) data.bx = battleX;
      if (superPressed) data.sp = true;
      if (guestSwapPressed) { data.sw = true; guestSwapPressed = false; }
      roomRef.child('input/guest').set(data);
    }

    function startHostSync() {
      if (syncInterval) clearInterval(syncInterval);
      syncInterval = setInterval(syncToFirebase, 100); // ~10 fps

      // Keepalive heartbeat: write a timestamp every 10s to keep connection alive
      if (keepaliveInterval) clearInterval(keepaliveInterval);
      keepaliveInterval = setInterval(function() {
        if (!roomRef) return;
        const side = state.isHost ? 'host' : 'guest';
        roomRef.child(side).child('lastSeen').set(Date.now());
      }, 10000);
    }

      state.titleStep = 'mode';

    // ============================================================
    // GAME LOGIC
    // ============================================================
    const MOVE_DELAY = 0.12;

    function toggleRide(playerIdx) {
      if (state.screen !== 'playing') return;
      sfxRide();

      if (state.riding[playerIdx]) {
        // Dismount
        state.riding[playerIdx] = false;
        state.ridingDragon[playerIdx] = null;
      } else {
        // Mount -- need at least one dragon in collection
        const types = Object.keys(state.collection);
        if (types.length === 0) return;

        // Ride the most recently collected dragon type
        const lastType = state.dragons.length > 0
          ? state.dragons[state.dragons.length - 1].type
          : types[types.length - 1];

        state.riding[playerIdx] = true;
        state.ridingDragon[playerIdx] = lastType;
      }
    }

    function updateRideButtons() {
      const btnL = document.getElementById('ride-btn-left');
      const btnR = document.getElementById('ride-btn-right');
      if (!btnL || !btnR) return;

      const inGame = state.screen === 'playing' && isTouchDevice;
      const hasDragons = Object.keys(state.collection).length > 0;

      if (inGame && hasDragons) {
        if (state.activePlayerCount === 1) {
          const isLeft = state.activePlayer === 0;
          btnL.style.display = isLeft ? 'block' : 'none';
          btnR.style.display = isLeft ? 'none' : 'block';
          const activeBtn = isLeft ? btnL : btnR;
          activeBtn.textContent = state.riding[state.activePlayer] ? 'WALK' : 'RIDE';
        } else {
          btnL.style.display = 'block';
          btnR.style.display = 'block';
          btnL.textContent = state.riding[0] ? 'WALK' : 'RIDE';
          btnR.textContent = state.riding[1] ? 'WALK' : 'RIDE';
        }
      } else {
        btnL.style.display = 'none';
        btnR.style.display = 'none';
      }
    }

    function spawnEggsForZone(zoneKey) {
      state.eggs = [];
      const zone = ZONES[zoneKey];
      const eggTypes = zone.eggs;

      const candidates = [];
      for (let r = 2; r < MAP_ROWS - 2; r++) {
        for (let c = 2; c < COLS - 2; c++) {
          const tile = zone.map[r][c];
          if (tile === 'grass' || tile === 'grass2' || tile === 'cave_floor' || tile === 'snow' || tile === 'snow2' || tile === 'ash' || tile === 'rainbow_grass') {
            candidates.push({ x: c, y: r });
          }
        }
      }

      // Shuffle
      for (let i = candidates.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
      }

      const count = state.mode === 'freeplay' ? 8 : 5;
      for (let i = 0; i < Math.min(count, candidates.length); i++) {
        const type = eggTypes[Math.floor(Math.random() * eggTypes.length)];
        state.eggs.push({
          type: type,
          x: candidates[i].x,
          y: candidates[i].y,
          bobOffset: Math.random() * Math.PI * 2,
        });
      }
    }

    function checkZoneTransition() {
      if (state.inSecretRoom) return; // no zone transitions from secret rooms
      for (const conn of ZONE_CONNECTIONS) {
        if (state.currentZone !== conn.from) continue;
        if (conn.unlockRequired && !state.unlockedZones.includes(conn.to)) continue;

        for (const p of getActivePlayers()) {
          const atEdge =
            (conn.edge === 'bottom' && p.y >= MAP_ROWS - 1) ||
            (conn.edge === 'top' && p.y <= 0);

          if (atEdge) {
            const tile = ZONES[conn.from].map[p.y][p.x];
            if (tile === 'path') {
              transitionToZone(conn.to, conn.edge);
              return;
            }
          }
        }
      }
    }

    function transitionToZone(zoneKey, fromEdge) {
      state.currentZone = zoneKey;
      for (const p of getActivePlayers()) {
        if (fromEdge === 'bottom') {
          p.y = 1;
        } else {
          p.y = MAP_ROWS - 2;
        }
      }
      state.particles = [];
      spawnEggsForZone(zoneKey);
      checkQuests();
    }

    function checkEggCollection() {
      for (let i = state.eggs.length - 1; i >= 0; i--) {
        const egg = state.eggs[i];
        for (const p of getActivePlayers()) {
          if (p.x === egg.x && p.y === egg.y) {
            state.hatching.push({
              type: egg.type,
              x: egg.x,
              y: egg.y,
              timer: 0,
              phase: 'wobble',
            });
            state.eggs.splice(i, 1);
            sfxCollect();
            checkQuests();
            break;
          }
        }
      }

      // Activate secret path when all eggs collected in a zone (adventure mode)
      if (state.eggs.length === 0 && state.hatching.length === 0 && !state.inSecretRoom && !state.secretPathActive[state.currentZone] && state.mode === 'adventure') {
        state.secretPathActive[state.currentZone] = true;
        state.secretPathTimer[state.currentZone] = 0;
      }
    }

    // ============================================================
    // SECRET ROOM FUNCTIONS
    // ============================================================
    function checkSecretTiles() {
      if (state.inSecretRoom) return;
      const secret = SECRETS[state.currentZone];
      if (!secret) return;

      const activePlayers = getActivePlayers();
      for (const p of activePlayers) {
        // Check discoverable secret tiles
        for (const st of secret.secretTiles) {
          if (p.x === st.col && p.y === st.row && !state.secretRoomFound[state.currentZone]) {
            enterSecretRoom(state.currentZone);
            return;
          }
        }

        // Check earned secret path
        if (state.secretPathActive[state.currentZone]) {
          const pathCol = 12;
          const pathRow = 8;
          if (p.x === pathCol && p.y === pathRow) {
            enterSecretRoom(state.currentZone);
            return;
          }
        }
      }
    }

    function checkSecretRoomExit() {
      if (!state.inSecretRoom || !state.secretRoomMap) return;
      const map = state.secretRoomMap;
      const activePlayers = getActivePlayers();
      for (const p of activePlayers) {
        const h = map.length;
        if (p.y === h - 1 && p.x >= 4 && p.x <= 5) {
          exitSecretRoom();
          return;
        }
      }
    }

    function enterSecretRoom(zoneKey) {
      sfxSecret();
      state.inSecretRoom = true;
      state.secretRoomZone = zoneKey;
      state.secretRoomMap = generateSecretRoom(zoneKey);
      state.secretRoomFound[zoneKey] = true;

      const activePlayers = getActivePlayers();
      for (let i = 0; i < activePlayers.length; i++) {
        activePlayers[i].x = 4 + i;
        activePlayers[i].y = 6;
      }

      state.eggs = [];
      const secret = SECRETS[zoneKey];
      for (let i = 0; i < secret.room.eggCount; i++) {
        const type = secret.room.eggs[i % secret.room.eggs.length];
        state.eggs.push({
          type: type,
          x: 3 + i * 3,
          y: 3,
          bobOffset: Math.random() * Math.PI * 2,
        });
      }

      state.particles = [];
      checkQuests();
    }

    function exitSecretRoom() {
      state.inSecretRoom = false;
      state.secretRoomMap = null;

      const secret = SECRETS[state.secretRoomZone];
      if (secret && secret.secretTiles.length > 0) {
        const st = secret.secretTiles[0];
        const activePlayers = getActivePlayers();
        for (let i = 0; i < activePlayers.length; i++) {
          activePlayers[i].x = st.col + i;
          activePlayers[i].y = Math.min(st.row + 1, MAP_ROWS - 2);
        }
      }

      state.secretRoomZone = null;
      spawnEggsForZone(state.currentZone);
    }

    function updateDragons(dt) {
      for (let i = 0; i < state.dragons.length; i++) {
        const d = state.dragons[i];
        // In 1p mode, all dragons follow the single active player
        const leaderPlayerIndex = state.activePlayerCount === 1 ? state.activePlayer : d.followPlayer;
        const leader = i === 0
          ? players[leaderPlayerIndex]
          : (state.dragons[i - 1].followPlayer === leaderPlayerIndex ? state.dragons[i - 1] : players[leaderPlayerIndex]);

        const dx = leader.x - d.x;
        const dy = leader.y - d.y;
        const dist = Math.abs(dx) + Math.abs(dy);

        if (dist > 1.5) {
          d.x += Math.sign(dx) * dt * 5;
          d.y += Math.sign(dy) * dt * 5;
        }
      }
    }

    function checkUnlocks() {
      if (state.mode !== 'adventure') return;

      const totalCollected = Object.values(state.collection).reduce((a, b) => a + b, 0);

      // Count unique non-rainbow types collected (need all 11 for rainbow zone)
      const nonRainbowTypes = ['fire', 'nature', 'love', 'shadow', 'star', 'ice', 'ghost', 'thorn', 'storm', 'crystal_dragon', 'cosmic'];
      const uniqueTypesCollected = nonRainbowTypes.filter(t => (state.collection[t] || 0) > 0).length;

      const unlockThresholds = [
        { zone: 'heart', count: 5 },
        { zone: 'enchanted', count: 8 },
        { zone: 'crystal', count: 12 },
        { zone: 'snowy', count: 16 },
        { zone: 'volcano', count: 20 },
        { zone: 'rainbow', count: 25, uniqueTypes: 11 },
      ];

      for (const u of unlockThresholds) {
        const meetsCount = totalCollected >= u.count;
        const meetsTypes = !u.uniqueTypes || uniqueTypesCollected >= u.uniqueTypes;
        if (meetsCount && meetsTypes && !state.unlockedZones.includes(u.zone)) {
          state.unlockedZones.push(u.zone);
          state.unlockEffect = { timer: 0, zone: u.zone };
          sfxUnlock();
        }
      }
    }

    function updateUnlockEffect(dt) {
      if (!state.unlockEffect) return;
      state.unlockEffect.timer += dt;
      if (state.unlockEffect.timer > 2) {
        state.unlockEffect = null;
      }
    }

    function updateHatching(dt) {
      for (let i = state.hatching.length - 1; i >= 0; i--) {
        const h = state.hatching[i];
        h.timer += dt;

        if (h.phase === 'wobble' && h.timer > 0.5) {
          h.phase = 'crack';
          h.timer = 0;
        } else if (h.phase === 'crack' && h.timer > 0.4) {
          h.phase = 'hatch';
          h.timer = 0;
        } else if (h.phase === 'hatch' && h.timer > 0.6) {
          state.collection[h.type] = (state.collection[h.type] || 0) + 1;
          sfxHatch();

          const followPlayer = state.activePlayerCount === 1 ? state.activePlayer : state.dragons.length % 2;
          state.dragons.push({
            type: h.type,
            followPlayer: followPlayer,
            x: players[followPlayer].x,
            y: players[followPlayer].y,
          });

          checkUnlocks();
          checkQuests();

          state.hatching.splice(i, 1);

          // Respawn in freeplay
          if (state.mode === 'freeplay' && state.eggs.length < 3) {
            spawnEggsForZone(state.currentZone);
          }
        }
      }
    }

    function drawHatching() {
      let oC = 0, oR = 0;
      if (state.inSecretRoom && state.secretRoomMap) {
        oC = Math.floor((COLS - state.secretRoomMap[0].length) / 2);
        oR = Math.floor((MAP_ROWS - state.secretRoomMap.length) / 2);
      }
      for (const h of state.hatching) {
        const px = (h.x + oC) * TILE;
        const py = (h.y + oR + UI_ROWS) * TILE;

        if (h.phase === 'wobble') {
          const wobble = Math.sin(h.timer * 20) * 3;
          drawSprite(EGG_SPRITES[h.type], px + 4 + wobble, py, TILE * 0.75);
        } else if (h.phase === 'crack') {
          drawSprite(EGG_SPRITES[h.type], px + 4, py, TILE * 0.75);
          ctx.strokeStyle = '#333';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(px + TILE / 2, py + 4);
          ctx.lineTo(px + TILE / 2 + 4, py + TILE / 2);
          ctx.lineTo(px + TILE / 2 - 2, py + TILE - 4);
          ctx.stroke();
        } else if (h.phase === 'hatch') {
          const sparkleCount = 6;
          for (let s = 0; s < sparkleCount; s++) {
            const angle = (s / sparkleCount) * Math.PI * 2 + h.timer * 5;
            const dist = h.timer * 30;
            const sx = px + TILE / 2 + Math.cos(angle) * dist;
            const sy = py + TILE / 2 + Math.sin(angle) * dist;
            const alpha = 1 - h.timer / 0.6;
            ctx.fillStyle = `rgba(255, 255, 100, ${alpha})`;
            ctx.fillRect(sx - 2, sy - 2, 4, 4);
          }
          const scale = h.timer / 0.6;
          drawSprite(DRAGON_SPRITES[h.type], px + 6, py + 4, TILE * 0.6 * scale);
        }
      }
    }

    function isSolid(zoneKey, col, row) {
      if (state.inSecretRoom && state.secretRoomMap) {
        const w = state.secretRoomMap[0].length;
        const h = state.secretRoomMap.length;
        if (col < 0 || col >= w || row < 0 || row >= h) return true;
        const tile = state.secretRoomMap[row][col];
        if (!tile) return true;
        return SOLID_TILES.includes(tile);
      }

      const zone = ZONES[zoneKey];
      if (col < 0 || col >= COLS || row < 0 || row >= MAP_ROWS) return true;

      // Check if this is a secret tile (walkable even though it looks solid)
      if (SECRETS[zoneKey]) {
        for (const st of SECRETS[zoneKey].secretTiles) {
          if (st.col === col && st.row === row) return false;
        }
      }

      const tile = zone.map[row][col];
      return SOLID_TILES.includes(tile);
    }

    function getActivePlayers() {
      if (state.activePlayerCount === 1) {
        return [players[state.activePlayer]];
      }
      return players;
    }

    function isOccupiedByOtherPlayer(playerIndex, col, row) {
      if (state.activePlayerCount === 1) return false;
      for (let i = 0; i < players.length; i++) {
        if (i !== playerIndex && players[i].x === col && players[i].y === row) return true;
      }
      return false;
    }

    function updatePlayers(dt) {
      const activePlayers = getActivePlayers();
      for (let ai = 0; ai < activePlayers.length; ai++) {
        const p = activePlayers[ai];
        // Find the real player index for isOccupiedByOtherPlayer
        const pi = players.indexOf(p);
        p.moveTimer -= dt;
        if (p.moveTimer > 0) continue;

        // For online mode: host uses local input for player 0, remote input for player 1
        let input;
        if (state.isHost && pi === 1) {
          // Use guest's remote input
          input = { dx: remoteGuestInput.dx, dy: remoteGuestInput.dy };
        } else {
          const jSide = pi === 0 ? 'left' : 'right';
          if (joystick[jSide].active) {
            const jdx = joystick[jSide].knobX - joystick[jSide].baseX;
            const jdy = joystick[jSide].knobY - joystick[jSide].baseY;
            const jdist = Math.sqrt(jdx * jdx + jdy * jdy);
            if (jdist > 10) {
              if (Math.abs(jdx) > Math.abs(jdy)) {
                input = { dx: Math.sign(jdx), dy: 0 };
              } else {
                input = { dx: 0, dy: Math.sign(jdy) };
              }
            } else {
              input = { dx: 0, dy: 0 };
            }
          } else {
            input = getPlayerInput(p.keys.up, p.keys.down, p.keys.left, p.keys.right);
          }
        }
        if (input.dx === 0 && input.dy === 0) continue;

        const moveDelay = state.riding[pi] ? MOVE_DELAY / 2 : MOVE_DELAY;
        let moved = false;
        let nx = p.x + input.dx;
        let ny = p.y + input.dy;

        if (!isSolid(state.currentZone, nx, ny) && !isOccupiedByOtherPlayer(pi, nx, ny)) {
          p.x = nx;
          p.y = ny;
          p.moveTimer = moveDelay;
          moved = true;
        } else if (input.dx !== 0 && !isSolid(state.currentZone, p.x + input.dx, p.y) && !isOccupiedByOtherPlayer(pi, p.x + input.dx, p.y)) {
          p.x += input.dx;
          p.moveTimer = moveDelay;
          moved = true;
        } else if (input.dy !== 0 && !isSolid(state.currentZone, p.x, p.y + input.dy) && !isOccupiedByOtherPlayer(pi, p.x, p.y + input.dy)) {
          p.y += input.dy;
          p.moveTimer = moveDelay;
          moved = true;
        }

        // Riding trail particles
        if (moved && state.riding[pi] && state.ridingDragon[pi] && Math.random() < 0.3) {
          const dragonType = state.ridingDragon[pi];
          const trailColors = {
            fire: '#FF4500', ice: '#4FC3F7', nature: '#43A047',
            love: '#E91E63', shadow: '#5E35B1', star: '#FFC107', rainbow: '#FF6B6B'
          };
          const trailParticle = {
            x: p.x * TILE + TILE / 2,
            y: (p.y + UI_ROWS) * TILE + TILE,
            vx: (Math.random() - 0.5) * 15,
            vy: Math.random() * 5 + 2,
            life: 1.0,
            maxLife: 1.0,
            size: 2 + Math.random() * 2,
            color: trailColors[dragonType] || '#fff',
          };
          if (dragonType === 'love') trailParticle.isHeart = true;
          state.particles.push(trailParticle);
        }
      }
    }

        if (state.selectedChar === 'harper') {

          players[0].y = 7;

    function spawnParticle(zoneKey) {
      const p = {
        x: Math.random() * CANVAS_W,
        y: Math.random() * CANVAS_H,
        vx: (Math.random() - 0.5) * 20,
        vy: -Math.random() * 15 - 5,
        life: Math.random() * 3 + 2,
        maxLife: 0,
        size: Math.random() * 3 + 2,
        type: zoneKey,
      };
      p.maxLife = p.life;

      if (zoneKey === 'meadow') {
        p.vy = Math.random() * 10 + 5;
        p.vx = (Math.random() - 0.5) * 30;
        p.color = ['#e74c3c', '#f1c40f', '#e84393', '#fff'][Math.floor(Math.random() * 4)];
      } else if (zoneKey === 'heart') {
        p.vy = -(Math.random() * 10 + 5);
        p.vx = (Math.random() - 0.5) * 15;
        p.color = '#ff69b4';
        p.isHeart = true;
      } else if (zoneKey === 'enchanted') {
        p.vy = Math.random() * 8 + 3;
        p.vx = (Math.random() - 0.5) * 20;
        p.color = ['#1a5c14', '#E040FB', '#558B2F', '#90EE90'][Math.floor(Math.random() * 4)];
      } else if (zoneKey === 'crystal') {
        p.vy = -(Math.random() * 5 + 2);
        p.vx = (Math.random() - 0.5) * 10;
        p.color = ['#E1BEE7', '#64B5F6', '#F48FB1', '#fff'][Math.floor(Math.random() * 4)];
      } else if (zoneKey === 'snowy') {
        p.vy = Math.random() * 15 + 5;
        p.vx = (Math.random() - 0.5) * 25;
        p.color = '#fff';
      } else if (zoneKey === 'volcano') {
        p.vy = -(Math.random() * 20 + 10);
        p.vx = (Math.random() - 0.5) * 20;
        p.color = ['#FF6F00', '#E65100', '#BF360C', '#FFD700'][Math.floor(Math.random() * 4)];
      } else if (zoneKey === 'rainbow') {
        p.vy = -(Math.random() * 10 + 5);
        p.vx = (Math.random() - 0.5) * 20;
        const rainbowHue = Math.floor(Math.random() * 360);
        p.color = 'hsl(' + rainbowHue + ', 80%, 65%)';
      }

      state.particles.push(p);
    }

    function updateParticles(dt) {
      if (state.particles.length < MAX_PARTICLES && Math.random() < 0.1) {
        spawnParticle(state.currentZone);
      }

      for (let i = state.particles.length - 1; i >= 0; i--) {
        const p = state.particles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.life -= dt;

        if (p.life <= 0 || p.y < 0 || p.y > CANVAS_H || p.x < 0 || p.x > CANVAS_W) {
          state.particles.splice(i, 1);
        }
      }
    }

    function drawParticles() {
      for (const p of state.particles) {
        const alpha = Math.min(1, p.life / (p.maxLife * 0.3));
        ctx.globalAlpha = alpha * 0.6;

        if (p.isHeart) {
          ctx.fillStyle = p.color;
          ctx.font = (p.size * 3) + 'px serif';
          ctx.textAlign = 'left';
          ctx.fillText('\u2665', p.x, p.y);
        } else {
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      ctx.globalAlpha = 1;
    }

              dpadLeft.style.right = '20px';
            } else {
              dpadLeft.classList.remove('visible');
              dpadRight.classList.add('visible');
            }
          } else {
            // 2P same iPad: left stays left, right stays right
            dpadLeft.classList.add('visible');
            dpadRight.classList.add('visible');
          }
          if (rideBtnL) rideBtnL.style.display = 'none';
          if (rideBtnR) rideBtnR.style.display = 'none';
          return;
        }
        if (state.screen !== 'playing') {
          dpadLeft.classList.remove('visible');
          dpadRight.classList.remove('visible');
          if (rideBtnL) rideBtnL.style.display = 'none';
          if (rideBtnR) rideBtnR.style.display = 'none';
          return;
        }
        // Adventure mode: hide d-pads on touch devices (joystick replaces them)
        // Keep d-pads for non-touch (desktop keyboard users won't have joystick)
        if (isTouchDevice) {
          dpadLeft.classList.remove('visible');
          dpadRight.classList.remove('visible');
        } else {
          // Desktop: no d-pads needed either (keyboard controls)
          dpadLeft.classList.remove('visible');
          dpadRight.classList.remove('visible');
        }
      }
