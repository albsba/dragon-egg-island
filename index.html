      state.dragonSelectIndex = 0;
      if (state.isHost) { startHostSync(); syncToFirebase(); }
      updateTitleTouchUI();
    });

    // Show title touch UI on load if on touch device
    updateTitleTouchUI();

    // ---- Dragon select touch wiring ----
    const dragonSelectTouch = document.getElementById('dragon-select-touch');

    (function() {
      const prevBtn = document.getElementById('dragon-prev');
      const nextBtn = document.getElementById('dragon-next');
      const confirmBtn = document.getElementById('dragon-confirm');

      function wireDragonTouch(el, handler) {
        if (!el) return;
        el.addEventListener('touchstart', function(e) { e.preventDefault(); handler(); }, { passive: false });
        el.addEventListener('click', handler);
      }

      wireDragonTouch(prevBtn, function() {
        keys['ArrowLeft'] = true;
        setTimeout(function() { keys['ArrowLeft'] = false; }, 80);
      });
      wireDragonTouch(nextBtn, function() {
        keys['ArrowRight'] = true;
        setTimeout(function() { keys['ArrowRight'] = false; }, 80);
      });
      wireDragonTouch(confirmBtn, function() {
        keys['Enter'] = true;
        setTimeout(function() { keys['Enter'] = false; }, 80);
      });
    })();

    function updateDragonSelectTouch() {
      if (state.screen === 'dragonSelect' && isTouchDevice) {
        dragonSelectTouch.style.display = '';
      } else {
        dragonSelectTouch.style.display = 'none';
      }
    }

    // ============================================================
    // DRAGON SELECT SCREEN
    // ============================================================
    const DRAGON_KEYS = Object.keys(DRAGON_CONFIGS); // ['fire','ice','nature','love','shadow','star','rainbow']

    function drawDragonSelect() {
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

      // Stars background
      for (let i = 0; i < 50; i++) {
        const sx = (Math.sin(i * 127.1) * 0.5 + 0.5) * CANVAS_W;
        const sy = (Math.cos(i * 311.7) * 0.5 + 0.5) * CANVAS_H;
        const twinkle = Math.sin(state.time * 2 + i) * 0.5 + 0.5;
        ctx.fillStyle = 'rgba(255, 255, 255, ' + (twinkle * 0.5) + ')';
        ctx.fillRect(sx, sy, 2, 2);
      }

      // Title
      const selectingPlayer = state.dragonSelectPlayer;
      const playerName = selectingPlayer === 0 ? players[0].name : players[1].name;
      ctx.fillStyle = '#FFD700';
      ctx.font = 'bold 24px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(playerName + ', choose your dragon!', CANVAS_W / 2, 60);

      // Dragon row
      const totalDragons = DRAGON_KEYS.length;
      const spacing = 100;
      const startX = CANVAS_W / 2 - ((totalDragons - 1) * spacing) / 2;

      for (let i = 0; i < totalDragons; i++) {
        const key = DRAGON_KEYS[i];
        const cfg = DRAGON_CONFIGS[key];
        const dx = startX + i * spacing;
        const dy = 120;

        // Highlight box on selected
        if (i === state.dragonSelectIndex) {
          ctx.strokeStyle = '#FFD700';
          ctx.lineWidth = 3;
          ctx.strokeRect(dx - 24, dy - 8, 48, 56);
        }

        // Dragon sprite
        drawSprite(DRAGON_SPRITES[key], dx - 16, dy, 32);

        // Name underneath
        ctx.fillStyle = i === state.dragonSelectIndex ? '#FFD700' : '#888';
        ctx.font = '10px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(key.charAt(0).toUpperCase() + key.slice(1), dx, dy + 52);
      }

      // Large preview of selected dragon
      const selKey = DRAGON_KEYS[state.dragonSelectIndex];
      const selCfg = DRAGON_CONFIGS[selKey];

      drawSprite(DRAGON_SPRITES[selKey], CANVAS_W / 2 - 48, 220, 96);

      // Dragon info
      ctx.fillStyle = selCfg.color;
      ctx.font = 'bold 22px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(selCfg.name, CANVAS_W / 2, 350);

      ctx.fillStyle = '#ccc';
      ctx.font = '14px monospace';
      ctx.fillText('Shot: ' + selCfg.shotType, CANVAS_W / 2, 380);
      ctx.fillText('Super: ' + selCfg.superName, CANVAS_W / 2, 402);

      // Show player 1's choice if player 2 is selecting
      if (state.dragonSelectPlayer === 1 && state.battle.playerDragons[0] !== null) {
        const p1Key = state.battle.playerDragons[0];
        const p1Cfg = DRAGON_CONFIGS[p1Key];
        ctx.fillStyle = '#888';
        ctx.font = '13px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(players[0].name + ' chose: ' + p1Cfg.name, CANVAS_W / 2, 440);
        drawSprite(DRAGON_SPRITES[p1Key], CANVAS_W / 2 - 16, 455, 32);
      }

      // Controls hint
      ctx.fillStyle = '#555';
      ctx.font = '11px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('Left/Right to browse  |  Enter/Space to select', CANVAS_W / 2, CANVAS_H - 30);
    }

    function updateDragonSelect() {
      const totalDragons = DRAGON_KEYS.length;

      if (keys['ArrowLeft'] || keys['a']) {
        state.dragonSelectIndex = (state.dragonSelectIndex - 1 + totalDragons) % totalDragons;
        keys['ArrowLeft'] = false; keys['a'] = false;
      }
      if (keys['ArrowRight'] || keys['d']) {
        state.dragonSelectIndex = (state.dragonSelectIndex + 1) % totalDragons;
        keys['ArrowRight'] = false; keys['d'] = false;
      }
      if (keys['Enter'] || keys[' ']) {
        keys['Enter'] = false; keys[' '] = false;
        const chosenDragon = DRAGON_KEYS[state.dragonSelectIndex];
        state.battle.playerDragons[state.dragonSelectPlayer] = chosenDragon;

        if (state.dragonSelectPlayer === 0 && state.activePlayerCount === 2) {
          // Advance to player 2
          state.dragonSelectPlayer = 1;
          state.dragonSelectIndex = 0;
        } else {
          // Start the battle
          startBattle();
        }
      }
      if (keys['Escape']) {
        keys['Escape'] = false;
        if (state.dragonSelectPlayer === 1) {
          // Go back to player 1 selection
          state.dragonSelectPlayer = 0;
          state.battle.playerDragons[0] = null;
          state.dragonSelectIndex = 0;
        } else {
          // Go back to title gametype step
          state.screen = 'title';
          state.titleStep = 'gametype';
          state.titleSelection = 2;
          updateTitleTouchUI();
        }
      }

      updateDragonSelectTouch();
    }

    function startBattle() {
      state.screen = 'battle';
      state.battle.wave = 0;
      state.battle.enemies = [];
      state.battle.shots = [];
      state.battle.drops = [];
      state.battle.effects = [];
      state.battle.waveState = 'waiting';
      state.battle.waveTimer = 0;
      state.battle.hitStreak = [0, 0];
      state.battle.superActive = [null, null];

      for (let i = 0; i < 2; i++) {
        state.battle.battlePlayers[i].hearts = MAX_HEARTS;
        state.battle.battlePlayers[i].superMeter = 0;
        state.battle.battlePlayers[i].shotTimer = 0;
        state.battle.battlePlayers[i].respawnTimer = 0;
        state.battle.battlePlayers[i].invTimer = 0;
        state.battle.battlePlayers[i].shieldActive = false;
        state.battle.battlePlayers[i].speedBoost = 0;
        state.battle.battlePlayers[i].alive = true;
      }

      if (state.activePlayerCount === 1) {
        state.battle.battlePlayers[0].x = CANVAS_W / 2;
      } else {
        state.battle.battlePlayers[0].x = CANVAS_W / 2 - 60;
        state.battle.battlePlayers[1].x = CANVAS_W / 2 + 60;
      }

      updateDragonSelectTouch();
      updateTitleTouchUI();
      battleDragHintTimer = 3;

      // Start online sync if host
      if (state.isHost) {
        startHostSync();
        syncToFirebase();
      }
    }

    // ============================================================
    // BATTLE LOGIC
    // ============================================================

    function updateBattlePlayers(dt) {
      const bp = state.battle.battlePlayers;

      // Check if host should consume guest super press
      if (state.isHost && remoteGuestInput.superPressed) {
        remoteGuestInput.superPressed = false;
        if (state.activePlayerCount >= 2) {
          activateSuper(1);
        }
      }

      for (let i = 0; i < state.activePlayerCount; i++) {
        const pi = state.activePlayerCount === 1 ? state.activePlayer : i;
        const b = bp[i];

        if (!b.alive) {
          b.respawnTimer -= dt;
          if (b.respawnTimer <= 0) {
            b.alive = true;
            b.hearts = MAX_HEARTS;
            b.invTimer = INVINCIBLE_TIME;
            b.x = CANVAS_W / 2 + (i === 0 ? -60 : 60);
          }
          continue;
        }

        if (b.invTimer > 0) b.invTimer -= dt;
        if (b.speedBoost > 0) b.speedBoost -= dt;

        let dx = 0;
        const dragSide = (pi === 0) ? 'left' : 'right';

        // For online mode: host uses remote input for player 1 (battle slot 1 = Audrey/guest)
        if (state.isHost && i === 1) {
          // Guest sent their finger X position mapped to canvas coords
          if (remoteGuestInput.battleX >= 0) {
            b.x = Math.max(20, Math.min(CANVAS_W - 20, remoteGuestInput.battleX));
          } else {
            // Fall back to d-pad dx from guest
            dx = remoteGuestInput.dx;
          }
        } else if (touchDrag[dragSide].active) {
          // Touch drag: dragon follows finger X position mapped to canvas coords
          const canvasRect = canvas.getBoundingClientRect();
          const canvasScale = CANVAS_W / (canvasRect.width || CANVAS_W);
          const canvasX = (touchDrag[dragSide].currentX - canvasRect.left) * canvasScale;
          b.x = Math.max(20, Math.min(CANVAS_W - 20, canvasX));
        } else {
          // Fall back to keyboard input
          const p = players[pi];
          const input = getPlayerInput(p.keys.up, p.keys.down, p.keys.left, p.keys.right);
          dx = input.dx;
        }

        if (dx !== 0) {
          const speed = BATTLE_PLAYER_SPEED * (b.speedBoost > 0 ? 1.5 : 1);
          b.x += dx * speed * dt;
          b.x = Math.max(20, Math.min(CANVAS_W - 20, b.x));
        }

        // Auto-shoot
        b.shotTimer -= dt;
        const dragonKey = state.battle.playerDragons[i];
        if (dragonKey && b.shotTimer <= 0) {
          const cfg = DRAGON_CONFIGS[dragonKey];
          b.shotTimer = 1 / cfg.shotRate;
          spawnShots(i, b.x, BATTLE_PLAYER_Y, cfg);
        }
      }
    }

    function spawnShots(playerId, x, y, config) {
      const shots = state.battle.shots;
      const spd = config.shotSpeed;
      const col = config.color;

      switch (config.shotType) {
        case 'single':
          shots.push({ x: x, y: y, vx: 0, vy: -spd, color: col, owner: playerId });
          break;
        case 'spread':
          shots.push({ x: x, y: y, vx: -spd * 0.25, vy: -spd, color: col, owner: playerId });
          shots.push({ x: x, y: y, vx: 0, vy: -spd, color: col, owner: playerId });
          shots.push({ x: x, y: y, vx: spd * 0.25, vy: -spd, color: col, owner: playerId });
          break;
        case 'pierce':
          shots.push({ x: x, y: y, vx: 0, vy: -spd, color: col, owner: playerId, pierce: true });
          break;
        case 'wide':
          shots.push({ x: x, y: y, vx: 0, vy: -spd, color: col, owner: playerId, wide: true });
          break;
        case 'bounce':
          shots.push({ x: x, y: y, vx: spd * 0.15, vy: -spd, color: col, owner: playerId, bounces: 2 });
          break;
        case 'beam':
          shots.push({ x: x, y: y, vx: 0, vy: -spd, color: col, owner: playerId, pierce: true, beam: true });
          break;
      }
    }

    function updateShots(dt) {
      const shots = state.battle.shots;
      for (let i = shots.length - 1; i >= 0; i--) {
        const s = shots[i];
        s.x += s.vx * dt;
        s.y += s.vy * dt;

        // Bounce shots bounce off left/right edges
        if (s.bounces !== undefined && s.bounces > 0) {
          if (s.x < 4 || s.x > CANVAS_W - 4) {
            s.vx = -s.vx;
            s.bounces--;
          }
        }

        // Remove if off-screen
        if (s.y < -20 || s.y > CANVAS_H + 20 || s.x < -20 || s.x > CANVAS_W + 20) {
          shots.splice(i, 1);
        }
      }
    }

    function startNextWave() {
      state.battle.wave++;
      state.battle.waveState = 'active';
      const wave = state.battle.wave;
      let enemyList;

      if (wave <= WAVE_DEFS.length) {
        enemyList = WAVE_DEFS[wave - 1].enemies;
      } else {
        enemyList = generateWave(wave);
      }

      const speedMult = Math.pow(1.03, wave - 1);
      const spacing = CANVAS_W / (enemyList.length + 1);

      for (let i = 0; i < enemyList.length; i++) {
        const typeName = enemyList[i];
        const et = ENEMY_TYPES[typeName];
        state.battle.enemies.push({
          type: typeName,
          x: spacing * (i + 1),
          y: -et.size - (i * 30),
          hp: et.hp,
          maxHp: et.hp,
          speed: et.speed * speedMult,
          size: et.size,
          pattern: et.pattern,
          color: et.color,
          shoots: et.shoots || false,
          splits: et.splits || false,
          shootTimer: 3,
          spawnTime: state.time,
          curing: false,
          cureTimer: 0,
          frozen: 0,
          vined: 0,
        });
      }
    }

    function generateWave(waveNum) {
      const isBoss = waveNum % 5 === 0;
      if (isBoss) return ['elderDragon'];

      const hardTypes = ['shadowSlime', 'corruptedDragon', 'shadowKnight', 'stormCloud'];
      const medTypes = ['darkButterfly', 'darkMushroom', 'corruptedEgg'];
      const count = Math.min(12, 4 + Math.floor(waveNum / 3));
      const list = [];
      for (let i = 0; i < count; i++) {
        if (Math.random() < 0.4) {
          list.push(hardTypes[Math.floor(Math.random() * hardTypes.length)]);
        } else {
          list.push(medTypes[Math.floor(Math.random() * medTypes.length)]);
        }
      }
      return list;
    }

    function updateEnemies(dt) {
      const enemies = state.battle.enemies;
      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];

        // Curing animation
        if (e.curing) {
          e.cureTimer += dt;
          if (e.cureTimer >= 1) {
            // Spawn drop
            spawnDrop(e.x, e.y);
            // Add cure effect
            state.battle.effects.push({ x: e.x, y: e.y, type: 'cure', timer: 0.6, maxTimer: 0.6 });
            // Add super meter to all players
            const meterGain = 5;
            for (let p = 0; p < state.activePlayerCount; p++) {
              state.battle.battlePlayers[p].superMeter = Math.min(SUPER_METER_MAX, state.battle.battlePlayers[p].superMeter + meterGain);
            }
            enemies.splice(i, 1);
          }
          continue;
        }

        // Skip movement if frozen/vined
        if (e.frozen > 0) { e.frozen -= dt; continue; }
        if (e.vined > 0) { e.vined -= dt; continue; }

        const age = state.time - e.spawnTime;

        // Movement patterns
        switch (e.pattern) {
          case 'straight':
            e.y += e.speed * dt;
            break;
          case 'wobble':
            e.y += e.speed * dt;
            e.x += Math.sin(age * 3) * 30 * dt;
            break;
          case 'zigzag':
            e.y += e.speed * dt;
            e.x += Math.sin(age * 2) * 80 * dt;
            break;
          case 'bounce':
            e.y += e.speed * dt;
            e.x += Math.cos(age * 2.5) * 50 * dt;
            e.x = Math.max(e.size, Math.min(CANVAS_W - e.size, e.x));
            break;
          case 'swoop':
            e.y += e.speed * dt * Math.max(0.3, 1 - age * 0.1);
            e.x += Math.sin(age * 1.5) * 60 * dt;
            break;
          case 'formation':
            e.y += e.speed * dt;
            e.x += Math.sin(age * 2 + i * 0.5) * 40 * dt;
            break;
          case 'boss':
            if (e.y < 80) {
              e.y += e.speed * dt;
            } else {
              e.y = 80;
              e.x += Math.sin(age * 0.8) * 100 * dt;
              e.x = Math.max(e.size, Math.min(CANVAS_W - e.size, e.x));
            }
            break;
        }

        // Storm clouds shoot
        if (e.shoots) {
          e.shootTimer -= dt;
          if (e.shootTimer <= 0) {
            e.shootTimer = 3;
            state.battle.shots.push({
              x: e.x, y: e.y + e.size / 2,
              vx: 0, vy: 120,
              color: '#7E57C2',
              isEnemy: true,
            });
          }
        }

        // Remove if off bottom
        if (e.y > CANVAS_H + e.size) {
          enemies.splice(i, 1);
        }
      }
    }

    function checkBattleCollisions() {
      const enemies = state.battle.enemies;
      const shots = state.battle.shots;
      const bp = state.battle.battlePlayers;

      // 1. Player shots vs enemies
      for (let si = shots.length - 1; si >= 0; si--) {
        const s = shots[si];
        if (s.isEnemy) continue;
        const sw = s.wide ? 16 : 6;

        for (let ei = enemies.length - 1; ei >= 0; ei--) {
          const e = enemies[ei];
          if (e.curing) continue;
          const es = e.size / 2;

          // Rectangle overlap
          if (s.x - sw / 2 < e.x + es && s.x + sw / 2 > e.x - es &&
              s.y - 4 < e.y + es && s.y + 4 > e.y - es) {
            e.hp--;
            state.battle.effects.push({ x: s.x, y: s.y, type: 'hit', timer: 0.3, maxTimer: 0.3 });

            if (e.hp <= 0) {
              e.curing = true;
              e.cureTimer = 0;

              // Splits
              if (e.splits) {
                for (let sp = 0; sp < 2; sp++) {
                  state.battle.enemies.push({
                    type: e.type,
                    x: e.x + (sp === 0 ? -20 : 20),
                    y: e.y,
                    hp: 1,
                    maxHp: 1,
                    speed: e.speed * 1.2,
                    size: e.size * 0.7,
                    pattern: 'wobble',
                    color: e.color,
                    shoots: false,
                    splits: false,
                    shootTimer: 99,
                    spawnTime: state.time,
                    curing: false,
                    cureTimer: 0,
                    frozen: 0,
                    vined: 0,
                  });
                }
              }
            }

            if (!s.pierce) {
              shots.splice(si, 1);
              break;
            }
          }
        }
      }

      // 2. Enemies + enemy shots vs players
      for (let pi = 0; pi < state.activePlayerCount; pi++) {
        const b = bp[pi];
        if (!b.alive || b.invTimer > 0) continue;

        const px = b.x;
        const py = BATTLE_PLAYER_Y;
        const pr = 14; // player radius

        // Check enemies
        for (const e of enemies) {
          if (e.curing) continue;
          const es = e.size / 2;
          if (px - pr < e.x + es && px + pr > e.x - es &&
              py - pr < e.y + es && py + pr > e.y - es) {
            hitBattlePlayer(pi);
            break;
          }
        }

        // Check enemy shots
        if (!b.alive || b.invTimer > 0) continue;
        for (let si = shots.length - 1; si >= 0; si--) {
          const s = shots[si];
          if (!s.isEnemy) continue;
          if (Math.abs(s.x - px) < pr + 4 && Math.abs(s.y - py) < pr + 4) {
            hitBattlePlayer(pi);
            shots.splice(si, 1);
            break;
          }
        }
      }
    }

    function hitBattlePlayer(playerIdx) {
      const b = state.battle.battlePlayers[playerIdx];
      if (b.shieldActive) {
        b.shieldActive = false;
        b.invTimer = 0.5;
        state.battle.effects.push({ x: b.x, y: BATTLE_PLAYER_Y, type: 'shieldBreak', timer: 0.5, maxTimer: 0.5 });
        return;
      }
      b.hearts--;
      b.invTimer = 1;
      state.battle.hitStreak[playerIdx]++;
      state.battle.effects.push({ x: b.x, y: BATTLE_PLAYER_Y, type: 'playerHit', timer: 0.4, maxTimer: 0.4 });
      if (b.hearts <= 0) {
        b.alive = false;
        b.respawnTimer = RESPAWN_TIME;
      }
    }

    function updateBattleWaves(dt) {
      const b = state.battle;

      if (b.waveState === 'waiting') {
        b.waveTimer += dt;
        if (b.waveTimer >= 2) {
          b.waveTimer = 0;
          startNextWave();
        }
      } else if (b.waveState === 'active') {
        if (b.enemies.length === 0) {
          b.waveState = 'clearing';
          b.waveTimer = 0;
        }
      } else if (b.waveState === 'clearing') {
        b.waveTimer += dt;
        if (b.waveTimer >= 2) {
          b.waveState = 'waiting';
          b.waveTimer = 0;
        }
      }
    }

    // ============================================================
    // BATTLE RENDERING
    // ============================================================

    const battleStars = [];
    for (let i = 0; i < 60; i++) {
      battleStars.push({
        x: Math.random() * CANVAS_W,
        y: Math.random() * CANVAS_H,
        size: Math.random() * 2 + 0.5,
        speed: Math.random() * 20 + 10,
      });
    }

    function drawBattleBackground() {
      ctx.fillStyle = '#0a0a1a';
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

      for (const star of battleStars) {
        const sy = (star.y + state.time * star.speed) % CANVAS_H;
        const twinkle = Math.sin(state.time * 3 + star.x * 0.1) * 0.3 + 0.7;
        ctx.fillStyle = 'rgba(255, 255, 255, ' + twinkle * 0.6 + ')';
        ctx.fillRect(star.x, sy, star.size, star.size);
      }
    }

    function drawBattlePlayers() {
      for (let i = 0; i < state.activePlayerCount; i++) {
        const pi = state.activePlayerCount === 1 ? state.activePlayer : i;
        const b = state.battle.battlePlayers[i];
        const dragonKey = state.battle.playerDragons[i];
        if (!dragonKey) continue;

        if (!b.alive) {
          // Dizzy stars animation
          const cx = b.x;
          const cy = BATTLE_PLAYER_Y;
          for (let s = 0; s < 3; s++) {
            const angle = state.time * 4 + s * (Math.PI * 2 / 3);
            const sx = cx + Math.cos(angle) * 14;
            const sy = cy - 20 + Math.sin(angle) * 6;
            ctx.fillStyle = '#FFD700';
            ctx.font = '10px serif';
            ctx.textAlign = 'center';
            ctx.fillText('\u2605', sx, sy);
          }
          continue;
        }

        // Flash when invincible
        if (b.invTimer > 0 && Math.floor(state.time * 10) % 2 === 0) continue;

        // Shield bubble
        if (b.shieldActive) {
          ctx.strokeStyle = 'rgba(105, 240, 174, 0.6)';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(b.x, BATTLE_PLAYER_Y, 22, 0, Math.PI * 2);
          ctx.stroke();
        }

        // Dragon sprite
        drawSprite(DRAGON_SPRITES[dragonKey], b.x - 18, BATTLE_PLAYER_Y - 18, 36);
      }
    }

    function drawBattleShots() {
      for (const s of state.battle.shots) {
        if (s.isEnemy) {
          // Enemy projectile: purple circle
          ctx.fillStyle = s.color;
          ctx.beginPath();
          ctx.arc(s.x, s.y, 4, 0, Math.PI * 2);
          ctx.fill();
          continue;
        }

        if (s.beam) {
          ctx.fillStyle = s.color;
          ctx.fillRect(s.x - 2, s.y - 8, 4, 16);
        } else if (s.wide) {
          ctx.fillStyle = s.color;
          ctx.font = '14px serif';
          ctx.textAlign = 'center';
          ctx.fillText('\u2665', s.x, s.y + 4);
        } else {
          // Trail
          ctx.fillStyle = s.color + '44';
          ctx.beginPath();
          ctx.arc(s.x, s.y + 6, 3, 0, Math.PI * 2);
          ctx.fill();
          // Main dot
          ctx.fillStyle = s.color;
          ctx.beginPath();
          ctx.arc(s.x, s.y, 3, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    function drawBattleEnemies() {
      for (const e of state.battle.enemies) {
        const ex = e.x;
        const ey = e.y;
        const sz = e.size;
        const hsz = sz / 2;

        // Curing animation
        if (e.curing) {
          const t = e.cureTimer;
          const hue = (t * 360) % 360;
          const alpha = Math.max(0, 1 - t);
          ctx.globalAlpha = alpha;
          ctx.fillStyle = 'hsl(' + hue + ', 80%, 70%)';
          ctx.beginPath();
          ctx.arc(ex, ey - t * 20, hsz, 0, Math.PI * 2);
          ctx.fill();
          // Happy face
          ctx.fillStyle = '#fff';
          ctx.font = (sz * 0.5) + 'px monospace';
          ctx.textAlign = 'center';
          ctx.fillText(':)', ex, ey - t * 20 + sz * 0.15);
          ctx.globalAlpha = 1;
          continue;
        }

        // Damage flash
        const damaged = e.hp < e.maxHp;
        if (damaged && Math.floor(state.time * 15) % 3 === 0) {
          ctx.fillStyle = '#fff';
        } else {
          ctx.fillStyle = e.color;
        }

        switch (e.type) {
          case 'shadowPuff': {
            // Cloud shape: 3 circles
            const c = e.color;
            if (damaged && Math.floor(state.time * 15) % 3 === 0) ctx.fillStyle = '#fff';
            else ctx.fillStyle = c;
            ctx.beginPath();
            ctx.arc(ex - hsz * 0.4, ey, hsz * 0.6, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(ex + hsz * 0.4, ey, hsz * 0.6, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(ex, ey - hsz * 0.3, hsz * 0.7, 0, Math.PI * 2);
            ctx.fill();
            break;
          }
          case 'corruptedEgg':
            drawSprite(EGG_SPRITES.shadow, ex - hsz, ey - hsz, sz);
            break;
          case 'darkButterfly': {
            // Body
            ctx.fillRect(ex - 2, ey - hsz * 0.6, 4, hsz * 1.2);
            // Wings (flapping)
            const flap = Math.sin(state.time * 8) * 0.3 + 0.7;
            ctx.beginPath();
            ctx.ellipse(ex - hsz * 0.5, ey, hsz * 0.6, hsz * 0.4 * flap, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(ex + hsz * 0.5, ey, hsz * 0.6, hsz * 0.4 * flap, 0, 0, Math.PI * 2);
            ctx.fill();
            break;
          }
          case 'shadowSlime': {
            // Squishing ellipse
            const squish = Math.sin(state.time * 4) * 0.15 + 1;
            ctx.beginPath();
            ctx.ellipse(ex, ey, hsz * squish, hsz / squish, 0, 0, Math.PI * 2);
            ctx.fill();
            // Eyes
            ctx.fillStyle = '#fff';
            ctx.fillRect(ex - 4, ey - 3, 3, 3);
            ctx.fillRect(ex + 2, ey - 3, 3, 3);
            break;
          }
          case 'corruptedDragon':
            drawSprite(DRAGON_SPRITES.shadow, ex - hsz, ey - hsz, sz);
            break;
          case 'darkMushroom': {
            // Brown stem
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(ex - 3, ey, 6, hsz * 0.7);
            // Purple cap
            if (damaged && Math.floor(state.time * 15) % 3 === 0) ctx.fillStyle = '#fff';
            else ctx.fillStyle = e.color;
            ctx.beginPath();
            ctx.arc(ex, ey, hsz * 0.7, Math.PI, 0);
            ctx.fill();
            break;
          }
          case 'shadowKnight': {
            // Filled rectangle body
            ctx.fillRect(ex - hsz * 0.5, ey - hsz * 0.7, sz * 0.5, sz * 0.7);
            // Visor
            ctx.fillStyle = '#B39DDB';
            ctx.fillRect(ex - hsz * 0.4, ey - hsz * 0.3, sz * 0.4, 3);
            break;
          }
          case 'stormCloud': {
            // Large cloud (3 overlapping circles)
            const c2 = e.color;
            if (damaged && Math.floor(state.time * 15) % 3 === 0) ctx.fillStyle = '#fff';
            else ctx.fillStyle = c2;
            ctx.beginPath();
            ctx.arc(ex - hsz * 0.4, ey, hsz * 0.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(ex + hsz * 0.4, ey, hsz * 0.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(ex, ey - hsz * 0.25, hsz * 0.6, 0, Math.PI * 2);
            ctx.fill();
            // Lightning bolt hint
            ctx.fillStyle = '#FFD700';
            ctx.font = '10px serif';
            ctx.textAlign = 'center';
            ctx.fillText('\u26A1', ex, ey + hsz + 8);
            break;
          }
          case 'elderDragon': {
            // Large shadow dragon
            drawSprite(DRAGON_SPRITES.shadow, ex - hsz, ey - hsz, sz);
            // HP bar above
            const barW = sz * 1.2;
            const barH = 6;
            const barX = ex - barW / 2;
            const barY = ey - hsz - 12;
            const hpFrac = e.hp / e.maxHp;
            // Background
            ctx.fillStyle = '#333';
            ctx.fillRect(barX, barY, barW, barH);
            // Fill (green->yellow->red)
            if (hpFrac > 0.5) ctx.fillStyle = '#4CAF50';
            else if (hpFrac > 0.25) ctx.fillStyle = '#FFC107';
            else ctx.fillStyle = '#e74c3c';
            ctx.fillRect(barX, barY, barW * hpFrac, barH);
            // Border
            ctx.strokeStyle = '#888';
            ctx.lineWidth = 1;
            ctx.strokeRect(barX, barY, barW, barH);
            break;
          }
          default: {
            // Fallback: simple circle
            ctx.beginPath();
            ctx.arc(ex, ey, hsz, 0, Math.PI * 2);
            ctx.fill();
            break;
          }
        }
      }
    }

    // ============================================================
    // DROPS, EFFECTS & HUD
    // ============================================================

    function spawnDrop(x, y) {
      const roll = Math.random();
      let cumulative = 0;
      // If any player has hitStreak >= 3, boost heart chance (secret easy mode)
      let heartBoost = 0;
      for (let p = 0; p < state.activePlayerCount; p++) {
        if (state.battle.hitStreak[p] >= 3) { heartBoost = 0.2; break; }
      }
      for (const dKey of Object.keys(DROP_TYPES)) {
        let chance = DROP_TYPES[dKey].chance;
        if (dKey === 'heart') chance += heartBoost;
        cumulative += chance;
        if (roll < cumulative) {
          state.battle.drops.push({
            type: dKey, x: x, y: y, vy: 40,
            color: DROP_TYPES[dKey].color,
            symbol: DROP_TYPES[dKey].symbol,
          });
          return;
        }
      }
    }

    function updateDrops(dt) {
      const drops = state.battle.drops;
      for (let i = drops.length - 1; i >= 0; i--) {
        const d = drops[i];
        d.y += d.vy * dt;

        // Check collision with active players
        for (let pi = 0; pi < state.activePlayerCount; pi++) {
          const b = state.battle.battlePlayers[pi];
          if (!b.alive) continue;
          if (Math.abs(d.x - b.x) < 20 && Math.abs(d.y - BATTLE_PLAYER_Y) < 20) {
            applyDrop(d.type, pi);
            drops.splice(i, 1);
            i = Math.min(i, drops.length - 1);
            break;
          }
        }

        // Remove off-screen drops
        if (i >= 0 && i < drops.length && drops[i].y > CANVAS_H + 20) {
          drops.splice(i, 1);
        }
      }
    }

    function applyDrop(type, playerIdx) {
      const b = state.battle.battlePlayers[playerIdx];
      switch (type) {
        case 'heart':
          b.hearts = Math.min(MAX_HEARTS, b.hearts + 1);
          break;
        case 'superBoost':
          b.superMeter = Math.min(SUPER_METER_MAX, b.superMeter + 25);
          break;
        case 'speedStar':
          b.speedBoost = 5;
          break;
        case 'shield':
          b.shieldActive = true;
          break;
      }
      state.battle.effects.push({
        x: b.x, y: BATTLE_PLAYER_Y - 20,
        type: 'collect',
        timer: 0, maxTimer: 0.8,
        text: '+' + DROP_TYPES[type].symbol,
        color: DROP_TYPES[type].color,
      });
    }

    function drawDrops() {
      for (const d of state.battle.drops) {
        const bob = Math.sin(state.time * 4 + d.x * 0.1) * 3;
        ctx.font = 'bold 18px serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = d.color;
        ctx.fillText(d.symbol, d.x, d.y + bob);
      }
      ctx.textBaseline = 'alphabetic';
    }

    function updateBattleEffects(dt) {
      const effects = state.battle.effects;
      for (let i = effects.length - 1; i >= 0; i--) {
        const e = effects[i];
        e.timer -= dt;
        if (e.timer <= 0) {
          effects.splice(i, 1);
        }
      }
    }

    function drawBattleEffects() {
      for (const e of state.battle.effects) {
        const progress = 1 - (e.timer / (e.maxTimer || 0.6));
        const alpha = Math.max(0, e.timer / (e.maxTimer || 0.6));

        switch (e.type) {
          case 'cure': {
            // 8 sparkles bursting outward in rainbow colors
            for (let s = 0; s < 8; s++) {
              const angle = (s / 8) * Math.PI * 2;
              const dist = progress * 30;
              const sx = e.x + Math.cos(angle) * dist;
              const sy = e.y + Math.sin(angle) * dist;
              const hue = (s * 45 + state.time * 200) % 360;
              ctx.fillStyle = 'hsla(' + hue + ', 90%, 70%, ' + alpha + ')';
              ctx.beginPath();
              ctx.arc(sx, sy, 3 * alpha, 0, Math.PI * 2);
              ctx.fill();
            }
            break;
          }
          case 'hit': {
            // Expanding white circle, fading
            ctx.strokeStyle = 'rgba(255, 255, 255, ' + alpha + ')';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(e.x, e.y, progress * 15, 0, Math.PI * 2);
            ctx.stroke();
            break;
          }
          case 'playerHit': {
            // Expanding red ring
            ctx.strokeStyle = 'rgba(255, 50, 50, ' + alpha + ')';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(e.x, e.y, progress * 25, 0, Math.PI * 2);
            ctx.stroke();
            break;
          }
          case 'collect': {
            // Floating "+" text upward, fading
            ctx.globalAlpha = alpha;
            ctx.fillStyle = e.color || '#fff';
            ctx.font = 'bold 16px monospace';
            ctx.textAlign = 'center';
            ctx.fillText(e.text || '+', e.x, e.y - progress * 30);
            ctx.globalAlpha = 1;
            break;
          }
          case 'shieldBreak': {
            // Expanding green ring
            ctx.strokeStyle = 'rgba(105, 240, 174, ' + alpha + ')';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(e.x, e.y, progress * 30, 0, Math.PI * 2);
            ctx.stroke();
            break;
          }
          case 'flameWave': {
            // Orange semi-transparent horizontal band sweeping across screen
            ctx.fillStyle = 'rgba(255, 100, 0, ' + (alpha * 0.4) + ')';
            const bandY = CANVAS_H * (1 - progress);
            ctx.fillRect(0, bandY - 30, CANVAS_W, 60);
            break;
          }
          case 'freezeBlast': {
            // Blue tint flash across whole screen
            ctx.fillStyle = 'rgba(79, 195, 247, ' + (alpha * 0.3) + ')';
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
            break;
          }
          case 'vineBurst': {
            // Green flash + vine-like shapes from edges
            ctx.fillStyle = 'rgba(67, 160, 71, ' + (alpha * 0.25) + ')';
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
            for (let v = 0; v < 6; v++) {
              const vy = (v / 6) * CANVAS_H;
              ctx.strokeStyle = 'rgba(76, 175, 80, ' + alpha + ')';
              ctx.lineWidth = 3;
              ctx.beginPath();
              ctx.moveTo(0, vy);
              ctx.quadraticCurveTo(progress * CANVAS_W * 0.3, vy + Math.sin(v) * 30, progress * CANVAS_W * 0.5, vy);
              ctx.stroke();
              ctx.beginPath();
              ctx.moveTo(CANVAS_W, vy);
              ctx.quadraticCurveTo(CANVAS_W - progress * CANVAS_W * 0.3, vy + Math.cos(v) * 30, CANVAS_W - progress * CANVAS_W * 0.5, vy);
              ctx.stroke();
            }
            break;
          }
          case 'healWave': {
            // Pink tint + floating hearts
            ctx.fillStyle = 'rgba(233, 30, 99, ' + (alpha * 0.2) + ')';
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
            ctx.font = '16px serif';
            ctx.textAlign = 'center';
            for (let h = 0; h < 8; h++) {
              const hx = (h / 8) * CANVAS_W + 50;
              const hy = CANVAS_H - progress * CANVAS_H * 0.8 + Math.sin(h * 2) * 30;
              ctx.fillStyle = 'rgba(255, 105, 180, ' + alpha + ')';
              ctx.fillText('\u2665', hx, hy);
            }
            break;
          }
          case 'shadowCloak': {
            // Dark purple flash around player
            ctx.fillStyle = 'rgba(94, 53, 177, ' + (alpha * 0.4) + ')';
            ctx.beginPath();
            ctx.arc(e.x, e.y, 40 + progress * 20, 0, Math.PI * 2);
            ctx.fill();
            break;
          }
          case 'supernova': {
            // Golden expanding circle from center
            ctx.strokeStyle = 'rgba(255, 193, 7, ' + alpha + ')';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.arc(CANVAS_W / 2, CANVAS_H / 2, progress * Math.max(CANVAS_W, CANVAS_H) * 0.6, 0, Math.PI * 2);
            ctx.stroke();
            ctx.fillStyle = 'rgba(255, 215, 0, ' + (alpha * 0.15) + ')';
            ctx.beginPath();
            ctx.arc(CANVAS_W / 2, CANVAS_H / 2, progress * Math.max(CANVAS_W, CANVAS_H) * 0.6, 0, Math.PI * 2);
            ctx.fill();
            break;
          }
          case 'rainbowWave': {
            // Rainbow-colored dots spiraling outward
            for (let r = 0; r < 12; r++) {
              const angle = (r / 12) * Math.PI * 2 + state.time * 3;
              const dist = progress * 200;
              const rx = CANVAS_W / 2 + Math.cos(angle) * dist;
              const ry = CANVAS_H / 2 + Math.sin(angle) * dist;
              const hue = (r * 30 + state.time * 100) % 360;
              ctx.fillStyle = 'hsla(' + hue + ', 90%, 60%, ' + alpha + ')';
              ctx.beginPath();
              ctx.arc(rx, ry, 5, 0, Math.PI * 2);
              ctx.fill();
            }
            break;
          }
        }
      }
    }

    function drawBattleHUD() {
      // Wave text - top center
      ctx.font = 'bold 18px monospace';
      ctx.textAlign = 'center';
      ctx.fillStyle = '#FFD700';
      ctx.fillText('Wave ' + state.battle.wave, CANVAS_W / 2, 28);

      // Wave state messages
      if (state.battle.waveState === 'clearing') {
        ctx.font = 'bold 22px monospace';
        ctx.fillStyle = '#4CAF50';
        ctx.fillText('Wave Cleared!', CANVAS_W / 2, CANVAS_H / 2 - 20);
        // Sparkles
        for (let s = 0; s < 6; s++) {
          const angle = (s / 6) * Math.PI * 2 + state.time * 2;
          const sx = CANVAS_W / 2 + Math.cos(angle) * 60;
          const sy = CANVAS_H / 2 - 20 + Math.sin(angle) * 20;
          const hue = (s * 60 + state.time * 120) % 360;
          ctx.fillStyle = 'hsl(' + hue + ', 80%, 70%)';
          ctx.font = '12px serif';
          ctx.fillText('\u2728', sx, sy);
        }
      } else if (state.battle.waveState === 'waiting' && state.battle.wave > 0) {
        ctx.font = '16px monospace';
        ctx.fillStyle = '#aaa';
        ctx.fillText('Next wave...', CANVAS_W / 2, CANVAS_H / 2 - 20);
      }

      // Per-player HUD
      for (let i = 0; i < state.activePlayerCount; i++) {
        const pi = state.activePlayerCount === 1 ? state.activePlayer : i;
        const b = state.battle.battlePlayers[i];
        const dragonKey = state.battle.playerDragons[i];
        if (!dragonKey) continue;
        const cfg = DRAGON_CONFIGS[dragonKey];
        const pName = players[pi].name;

        const isLeft = (i === 0);
        const baseX = isLeft ? 10 : CANVAS_W - 10;
        const align = isLeft ? 'left' : 'right';
        const hudY = 10;

        // Player name + dragon name
        ctx.textAlign = align;
        ctx.font = 'bold 13px monospace';
        ctx.fillStyle = cfg.color;
        ctx.fillText(pName + ' - ' + cfg.name, baseX, hudY + 12);

        // Hearts
        const heartY = hudY + 28;
        ctx.font = '14px serif';
        for (let h = 0; h < MAX_HEARTS; h++) {
          const hx = isLeft ? baseX + h * 18 : baseX - h * 18;
          if (h < b.hearts) {
            // Filled heart - red flash when low
            if (b.hearts <= 2 && Math.floor(state.time * 4) % 2 === 0) {
              ctx.fillStyle = '#FF1744';
            } else {
              ctx.fillStyle = '#FF5252';
            }
            ctx.fillText('\u2665', hx, heartY);
          } else {
            ctx.fillStyle = '#555';
            ctx.fillText('\u2661', hx, heartY);
          }
        }

        // Super meter bar
        const barY = heartY + 14;
        const barW = 100;
        const barH = 10;
        const barX = isLeft ? baseX : baseX - barW;
        const meterFrac = b.superMeter / SUPER_METER_MAX;

        // Bar background
        ctx.fillStyle = '#222';
        ctx.fillRect(barX, barY, barW, barH);

        // Bar fill
        if (meterFrac >= 1) {
          // Rainbow cycling when full
          const hue = (state.time * 120) % 360;
          ctx.fillStyle = 'hsl(' + hue + ', 80%, 60%)';
        } else {
          ctx.fillStyle = cfg.color;
        }
        ctx.fillRect(barX, barY, barW * meterFrac, barH);

        // Bar border
        ctx.strokeStyle = '#666';
        ctx.lineWidth = 1;
        ctx.strokeRect(barX, barY, barW, barH);

        // SUPER READY text
        if (meterFrac >= 1) {
          ctx.font = 'bold 10px monospace';
          ctx.fillStyle = '#FFD700';
          ctx.textAlign = isLeft ? 'left' : 'right';
          ctx.fillText('SUPER READY!', isLeft ? barX : barX + barW, barY + barH + 12);
        }
      }
    }

    // ============================================================
    // SUPER MOVES
    // ============================================================

    function activateSuper(playerIdx) {
      const b = state.battle.battlePlayers[playerIdx];
      if (!b || !b.alive || b.superMeter < SUPER_METER_MAX) return;
      const dragonKey = state.battle.playerDragons[playerIdx];
      if (!dragonKey) return;

      b.superMeter = 0;
      const enemies = state.battle.enemies;

      switch (dragonKey) {
        case 'fire': {
          // Flame Wave: deal 3 damage to all enemies, cure those at 0hp
          for (const e of enemies) {
            if (e.curing) continue;
            e.hp -= 3;
            if (e.hp <= 0) { e.curing = true; e.cureTimer = 0; }
          }
          state.battle.effects.push({ x: 0, y: 0, type: 'flameWave', timer: 1.0, maxTimer: 1.0 });
          break;
        }
        case 'ice': {
          // Freeze Blast: freeze all enemies for 3 seconds
          state.battle.superActive[playerIdx] = { type: 'freeze', timer: 3 };
          for (const e of enemies) { if (!e.curing) e.frozen = 3; }
          state.battle.effects.push({ x: 0, y: 0, type: 'freezeBlast', timer: 1.2, maxTimer: 1.2 });
          break;
        }
        case 'nature': {
          // Vine Burst: deal 2 damage to all, vine enemies
          for (const e of enemies) {
            if (e.curing) continue;
            e.hp -= 2;
            e.vined = 2;
            if (e.hp <= 0) { e.curing = true; e.cureTimer = 0; }
          }
          state.battle.superActive[playerIdx] = { type: 'vines', timer: 2 };
          state.battle.effects.push({ x: 0, y: 0, type: 'vineBurst', timer: 1.0, maxTimer: 1.0 });
          break;
        }
        case 'love': {
          // Heal Wave: full hearts for ALL players, cure all enemies
          for (let p = 0; p < state.activePlayerCount; p++) {
            state.battle.battlePlayers[p].hearts = MAX_HEARTS;
          }
          for (const e of enemies) {
            if (!e.curing) { e.curing = true; e.cureTimer = 0; }
          }
          state.battle.effects.push({ x: 0, y: 0, type: 'healWave', timer: 1.5, maxTimer: 1.5 });
          break;
        }
        case 'shadow': {
          // Shadow Cloak: invincible for 5 seconds
          b.invTimer = 5;
          state.battle.effects.push({ x: b.x, y: BATTLE_PLAYER_Y, type: 'shadowCloak', timer: 1.0, maxTimer: 1.0 });
          break;
        }
        case 'star': {
          // Supernova: cure all enemies instantly
          for (const e of enemies) {
            if (!e.curing) { e.curing = true; e.cureTimer = 0; }
          }
          state.battle.effects.push({ x: 0, y: 0, type: 'supernova', timer: 1.5, maxTimer: 1.5 });
          break;
        }
        case 'rainbow': {
          // Rainbow Wave: double-drop from all enemies, cure all
          for (const e of enemies) {
            if (!e.curing) {
              spawnDrop(e.x, e.y);
              spawnDrop(e.x, e.y);
              e.curing = true;
              e.cureTimer = 0;
            }
          }
          state.battle.effects.push({ x: 0, y: 0, type: 'rainbowWave', timer: 1.5, maxTimer: 1.5 });
          break;
        }
      }
    }

    function updateSuperActive(dt) {
      for (let i = 0; i < 2; i++) {
        const sa = state.battle.superActive[i];
        if (sa) {
          sa.timer -= dt;
          if (sa.timer <= 0) {
            state.battle.superActive[i] = null;
          }
        }
      }
    }

    function updateSuperButtons() {
      const btnL = document.getElementById('super-btn-left');
      const btnR = document.getElementById('super-btn-right');
      if (state.screen === 'battle' && isTouchDevice) {
        // For online mode: host sees left button only, guest sees right button only
        const showLeft = state.isGuest ? false : (state.activePlayerCount >= 1);
        const showRight = state.isHost ? false : (state.activePlayerCount >= 2 || state.isGuest);

        if (showLeft) {
          btnL.style.display = 'block';
          if (state.battle.battlePlayers[0].superMeter >= SUPER_METER_MAX && state.battle.battlePlayers[0].alive) {
            btnL.classList.add('ready');
          } else {
            btnL.classList.remove('ready');
          }
        } else {
          btnL.style.display = 'none';
        }
        if (showRight) {
          btnR.style.display = 'block';
          if (state.battle.battlePlayers[1] && state.battle.battlePlayers[1].superMeter >= SUPER_METER_MAX && state.battle.battlePlayers[1].alive) {
            btnR.classList.add('ready');
          } else {
            btnR.classList.remove('ready');
          }
        } else {
          btnR.style.display = 'none';
        }
      } else {
        btnL.style.display = 'none';
        btnR.style.display = 'none';
      }
    }

    // Super button touch events
    document.getElementById('super-btn-left').addEventListener('touchstart', function(e) {
      e.preventDefault();
      if (state.isGuest) {
        guestSuperPressed = true;
      } else {
        activateSuper(0);
      }
    });
    document.getElementById('super-btn-right').addEventListener('touchstart', function(e) {
      e.preventDefault();
      if (state.isGuest) {
        guestSuperPressed = true;
      } else {
        activateSuper(1);
      }
    });

    // Keyboard super: spacebar for player 0 battle slot (or solo player in 1P), 'e'/'E' for player 1 battle slot
    document.addEventListener('keydown', function(e) {
      if (state.screen !== 'battle') return;
      if (e.key === ' ' || e.key === 'Spacebar') {
        e.preventDefault();
        // In 1P mode, activateSuper for the active player (battle slot 0)
        activateSuper(0);
      } else if (e.key === 'e' || e.key === 'E') {
        if (state.activePlayerCount >= 2) {
          activateSuper(1);
        }
      } else if (e.key === 'Escape') {
        // Return to title from battle
        const btnL = document.getElementById('super-btn-left');
        const btnR = document.getElementById('super-btn-right');
        btnL.style.display = 'none';
        btnR.style.display = 'none';
        document.getElementById('dragon-select-touch').style.display = 'none';
        returnToTitle();
        updateTitleTouchUI();
      }
    });

    // ============================================================
    // GAME LOOP
    // ============================================================
    let lastTime = 0;

    function loop(timestamp) {
      const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
      lastTime = timestamp;
      state.time += dt;

      if (state.screen === 'title') {
        updateTitleScreen();
        drawTitleScreen();
      } else if (state.screen === 'playing') {
        // Guest: send input to Firebase, skip game logic
        if (state.isGuest) {
          // Send guest d-pad input
          const guestInput = getPlayerInput(
            players[1].keys.up, players[1].keys.down,
            players[1].keys.left, players[1].keys.right
          );
          // Also check left d-pad (arrows) for convenience on guest
          const altInput = getPlayerInput('ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight');
          const dx = guestInput.dx || altInput.dx;
          const dy = guestInput.dy || altInput.dy;
          sendGuestInput(dx, dy);

          // Guest only updates particles locally for visual effect
          updateParticles(dt);
        } else {
          // Host or local: run all game logic
          updatePlayers(dt);
          checkZoneTransition();
          checkEggCollection();
          updateHatching(dt);
          updateDragons(dt);
          updateUnlockEffect(dt);
          updateParticles(dt);
        }

        // Draw (both host and guest)
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
        drawZone(ZONES[state.currentZone]);
        drawParticles();
        drawDragons();
        drawPlayers();
        drawEggs();
        drawHatching();
        drawUI();
        drawUnlockEffect();

        // Online connection status overlay
        if (state.playerMode === '2p-online' && state.onlineStatus === 'disconnected') {
          ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
          ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
          ctx.fillStyle = '#FFC107';
          ctx.font = 'bold 20px monospace';
          ctx.textAlign = 'center';
          if (state.isHost) {
            ctx.fillText('Waiting for friend to reconnect...', CANVAS_W / 2, CANVAS_H / 2);
          } else {
            ctx.fillText('Host disconnected', CANVAS_W / 2, CANVAS_H / 2);
            ctx.font = '14px monospace';
            ctx.fillStyle = '#aaa';
            ctx.fillText('Returning to title...', CANVAS_W / 2, CANVAS_H / 2 + 30);
          }
        }
      } else if (state.screen === 'dragonSelect') {
        if (!state.isGuest) {
          updateDragonSelect();
        }
        drawDragonSelect();
      } else if (state.screen === 'battle') {
        if (state.isGuest) {
          // Guest: send touch/keyboard input to host
          let battleX = -1;
          let dx = 0;
          const guestDragSide = 'right'; // guest is always player 1 (right side)
          if (touchDrag[guestDragSide].active || touchDrag['left'].active) {
            const activeSide = touchDrag[guestDragSide].active ? guestDragSide : 'left';
            const canvasRect = canvas.getBoundingClientRect();
            const canvasScale = CANVAS_W / (canvasRect.width || CANVAS_W);
            battleX = Math.round((touchDrag[activeSide].currentX - canvasRect.left) * canvasScale);
            battleX = Math.max(20, Math.min(CANVAS_W - 20, battleX));
          } else {
            // Keyboard fallback
            const guestInput = getPlayerInput(
              players[1].keys.up, players[1].keys.down,
              players[1].keys.left, players[1].keys.right
            );
            const altInput = getPlayerInput('ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight');
            dx = guestInput.dx || altInput.dx;
          }
          sendGuestInput(dx, 0, battleX, guestSuperPressed);
          guestSuperPressed = false;
        } else {
          updateBattlePlayers(dt);
          updateShots(dt);
          updateEnemies(dt);
          checkBattleCollisions();
          updateBattleWaves(dt);
          updateBattleEffects(dt);
          updateDrops(dt);
          updateSuperActive(dt);
        }
        updateSuperButtons();

        drawBattleBackground();
        drawBattleEnemies();
        drawBattleShots();
        drawBattlePlayers();
        drawDrops();
        drawBattleEffects();
        drawBattleHUD();

        // Show drag hint on first wave
        if (isTouchDevice && state.battle.wave <= 1 && battleDragHintTimer > 0) {
          battleDragHintTimer -= dt;
          const alpha = Math.min(1, battleDragHintTimer / 0.5);
          ctx.fillStyle = 'rgba(255, 215, 0, ' + alpha + ')';
          ctx.font = 'bold 20px monospace';
          ctx.textAlign = 'center';
          ctx.fillText('Drag to move!', CANVAS_W / 2, CANVAS_H - 30);
        }
      }

      requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);
  </script>
</body>
</html>
