<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dragon Egg Island</title>
  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      background: #1a1a2e;
    }

    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 3px solid #444;
    }
  </style>
</head>
<body>
  <canvas id="game" width="800" height="600"></canvas>

  <script>
    // ============================================================
    // CONSTANTS
    // ============================================================
    const CANVAS_W = 800;
    const CANVAS_H = 600;
    const TILE = 32;
    const COLS = 25;
    const ROWS = 18;

    const TILE_COLORS = {
      grass:      '#4a8f3f',
      grass2:     '#3d7a34',
      flower_r:   '#e74c3c',
      flower_y:   '#f1c40f',
      flower_p:   '#e84393',
      tree_trunk: '#8B4513',
      tree_top:   '#2d7a1e',
      water:      '#3498db',
      path:       '#c4a265',
      rock:       '#888',
      heart_tree: '#c0392b',
      heart_leaf: '#ff69b4',
      bush:       '#27ae60',
      bridge:     '#a0522d',
    };

    const UI_ROWS = 2;
    const MAP_ROWS = ROWS - UI_ROWS; // 16 playable rows

    const SOLID_TILES = ['tree_trunk', 'tree_top', 'heart_tree', 'heart_leaf', 'water', 'rock'];

    // ZONE_FLOWER_MEADOW: 16 rows x 25 cols
    const ZONE_FLOWER_MEADOW = [
      // row 0
      ['tree_top','tree_top','grass','grass','grass','grass','flower_r','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','flower_y','grass','grass','grass','grass','tree_top','tree_top'],
      // row 1
      ['tree_trunk','tree_trunk','grass','grass','flower_p','grass','grass','grass','grass','grass2','grass2','grass2','grass2','grass2','grass2','grass2','grass','grass','grass','grass','flower_r','grass','grass','tree_trunk','tree_trunk'],
      // row 2
      ['grass','grass','grass','flower_y','grass','grass','grass','grass','grass2','grass2','grass2','grass2','grass2','grass2','grass2','grass2','grass2','grass','grass','grass','grass','grass','flower_p','grass','grass'],
      // row 3
      ['grass','grass','grass','grass','grass','flower_r','grass','grass','grass2','grass2','grass2','grass2','grass2','grass2','grass2','grass2','grass2','grass','grass','flower_y','grass','grass','grass','grass','grass'],
      // row 4
      ['grass','flower_p','grass','grass','grass','grass','grass','grass','grass2','grass2','grass2','grass2','grass2','grass2','grass2','grass2','grass2','grass','grass','grass','grass','grass','grass','flower_r','grass'],
      // row 5
      ['grass','grass','grass','bush','grass','grass','flower_y','grass','grass','grass2','grass2','grass2','grass2','grass2','grass2','grass2','grass','grass','grass','bush','grass','grass','grass','grass','grass'],
      // row 6
      ['grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass2','grass2','grass2','grass2','grass2','grass','grass','grass','grass','grass','flower_p','grass','grass','grass','grass'],
      // row 7
      ['grass','grass','flower_r','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass2','grass2','grass','grass','grass','grass','grass','grass','grass','grass','grass','flower_y','grass'],
      // row 8
      ['grass','grass','grass','grass','grass','flower_p','grass','grass','grass','rock','grass','grass','grass','grass','grass','grass','rock','grass','grass','grass','grass','flower_r','grass','grass','grass'],
      // row 9
      ['grass','flower_y','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','flower_p'],
      // row 10
      ['grass','grass','grass','grass','flower_r','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','flower_y','grass','grass','grass','grass','grass'],
      // row 11
      ['grass','grass','bush','grass','grass','grass','grass','flower_p','grass','grass','grass','grass','grass','grass','grass','grass','grass','flower_r','grass','grass','grass','grass','bush','grass','grass'],
      // row 12
      ['grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass'],
      // row 13
      ['grass','grass','grass','flower_y','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass'],
      // row 14
      ['tree_top','tree_top','grass','grass','grass','grass','grass','grass','path','path','path','path','path','path','path','path','path','grass','grass','grass','grass','grass','grass','tree_top','tree_top'],
      // row 15
      ['tree_trunk','tree_trunk','grass','grass','grass','grass','grass','grass','path','path','path','path','path','path','path','path','path','grass','grass','grass','grass','grass','grass','tree_trunk','tree_trunk'],
    ];

    // ZONE_HEART_FOREST: 16 rows x 25 cols
    const ZONE_HEART_FOREST = [
      // row 0
      ['grass','grass','grass','grass','path','path','path','path','path','path','path','path','path','path','path','path','path','grass','grass','grass','grass','grass','grass','grass','grass'],
      // row 1
      ['grass','grass','grass','grass','path','path','path','path','path','path','path','path','path','path','path','path','path','grass','grass','grass','grass','grass','grass','grass','grass'],
      // row 2
      ['heart_leaf','heart_leaf','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','heart_leaf','heart_leaf','grass'],
      // row 3
      ['heart_tree','heart_tree','grass','grass','flower_p','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','flower_p','grass','grass','grass','grass','heart_tree','heart_tree','grass'],
      // row 4
      ['grass','grass','grass','flower_p','grass','grass','grass','grass','flower_p','grass','grass','grass','grass','grass','grass','flower_p','grass','grass','grass','grass','flower_p','grass','grass','grass','grass'],
      // row 5
      ['grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','flower_p','grass','flower_p','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass'],
      // row 6
      ['grass','heart_leaf','heart_leaf','grass','grass','grass','grass','grass','grass','grass','grass','water','water','water','water','grass','grass','grass','grass','grass','grass','heart_leaf','heart_leaf','grass','grass'],
      // row 7
      ['grass','heart_tree','heart_tree','grass','flower_p','grass','grass','grass','grass','grass','water','water','water','water','water','grass','grass','grass','grass','flower_p','grass','heart_tree','heart_tree','grass','grass'],
      // row 8
      ['grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','water','water','water','water','water','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass'],
      // row 9
      ['grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','water','water','water','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass'],
      // row 10
      ['grass','grass','flower_p','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','flower_p','grass','grass'],
      // row 11
      ['grass','heart_leaf','heart_leaf','grass','grass','grass','flower_p','grass','grass','grass','grass','grass','grass','grass','grass','grass','flower_p','grass','grass','grass','grass','heart_leaf','heart_leaf','grass','grass'],
      // row 12
      ['grass','heart_tree','heart_tree','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','heart_tree','heart_tree','grass','grass'],
      // row 13
      ['grass','grass','grass','grass','flower_p','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','flower_p','grass','grass','grass','grass','grass','grass'],
      // row 14
      ['heart_leaf','heart_leaf','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','heart_leaf','heart_leaf','grass'],
      // row 15
      ['heart_tree','heart_tree','grass','grass','grass','flower_p','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','grass','flower_p','grass','grass','heart_tree','heart_tree','grass'],
    ];

    const ZONES = {
      meadow: { map: ZONE_FLOWER_MEADOW, name: 'Flower Meadow', eggs: ['fire', 'nature'] },
      heart:  { map: ZONE_HEART_FOREST,  name: 'Heart Forest',  eggs: ['love'] },
    };

    const ZONE_CONNECTIONS = [
      { from: 'meadow', edge: 'bottom', to: 'heart', unlockRequired: true },
      { from: 'heart', edge: 'top', to: 'meadow', unlockRequired: false },
    ];

    // ============================================================
    // SPRITE DATA
    // ============================================================
    const SPRITES = {
      harper: [
        ['','','','#87CEEB','#87CEEB','#87CEEB','#87CEEB','','',''],
        ['','','#87CEEB','#87CEEB','#87CEEB','#87CEEB','#87CEEB','#87CEEB','',''],
        ['','','#87CEEB','#FFDAB9','#FFDAB9','#FFDAB9','#FFDAB9','#87CEEB','',''],
        ['','','#FFDAB9','#FFDAB9','#FFDAB9','#FFDAB9','#FFDAB9','#FFDAB9','',''],
        ['','','#FFDAB9','#333','','','#333','#FFDAB9','',''],
        ['','','#FFDAB9','','','','','#FFDAB9','',''],
        ['','','','#FFDAB9','#f9a','#f9a','#FFDAB9','','',''],
        ['','','#B0E0E6','#B0E0E6','#B0E0E6','#B0E0E6','#B0E0E6','#B0E0E6','',''],
        ['','#FFDAB9','#B0E0E6','#B0E0E6','#B0E0E6','#B0E0E6','#B0E0E6','#B0E0E6','#FFDAB9',''],
        ['','','#B0E0E6','#B0E0E6','#E0F7FA','#B0E0E6','#B0E0E6','#B0E0E6','',''],
        ['','','','#5b8','','','#5b8','','',''],
        ['','','','#654','','','#654','','',''],
      ],
      audrey: [
        ['','','','#9B59B6','#9B59B6','#9B59B6','#9B59B6','','',''],
        ['','','#9B59B6','#9B59B6','#9B59B6','#9B59B6','#9B59B6','#9B59B6','',''],
        ['','','#9B59B6','#FFDAB9','#FFDAB9','#FFDAB9','#FFDAB9','#9B59B6','',''],
        ['','','#FFDAB9','#FFDAB9','#FFDAB9','#FFDAB9','#FFDAB9','#FFDAB9','',''],
        ['','','#FFDAB9','#333','','','#333','#FFDAB9','',''],
        ['','','#FFDAB9','','','','','#FFDAB9','',''],
        ['','','','#FFDAB9','#f9a','#f9a','#FFDAB9','','',''],
        ['','','#8E44AD','#8E44AD','#8E44AD','#8E44AD','#8E44AD','#8E44AD','',''],
        ['','#FFDAB9','#8E44AD','#8E44AD','#8E44AD','#8E44AD','#8E44AD','#8E44AD','#FFDAB9',''],
        ['','','#8E44AD','#8E44AD','#D7BDE2','#8E44AD','#8E44AD','#8E44AD','',''],
        ['','','','#c6e','','','#c6e','','',''],
        ['','','','#654','','','#654','','',''],
      ],
    };

    function drawSprite(sprite, x, y, size) {
      const rows = sprite.length;
      const cols = sprite[0].length;
      const px = size / Math.max(rows, cols);
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (sprite[r][c]) {
            ctx.fillStyle = sprite[r][c];
            ctx.fillRect(x + c * px, y + r * px, Math.ceil(px), Math.ceil(px));
          }
        }
      }
    }

    function makeEggSprite(color1, color2, shine) {
      return [
        ['','','',color1,color1,'','',''],
        ['','',color1,color1,color1,color1,'',''],
        ['',color1,color1,shine,color1,color1,color1,''],
        ['',color1,color1,shine,color1,color1,color1,''],
        [color2,color1,color1,color1,color1,color1,color1,color2],
        [color2,color2,color1,color1,color1,color1,color2,color2],
        ['',color2,color2,color1,color1,color2,color2,''],
        ['','',color2,color2,color2,color2,'',''],
      ];
    }

    const EGG_SPRITES = {
      fire:   makeEggSprite('#FF6B35', '#FF4500', '#FFD700'),
      nature: makeEggSprite('#66BB6A', '#43A047', '#A5D6A7'),
      love:   makeEggSprite('#FF69B4', '#E91E63', '#FFB6C1'),
    };

    function makeDragonSprite(body, belly, eye) {
      return [
        ['','',body,body,body,'','',''],
        ['',body,eye,body,body,body,'',''],
        ['',body,body,body,belly,body,'',''],
        [body,body,body,belly,belly,body,'',''],
        ['',body,body,belly,body,body,body,''],
        ['','',body,body,body,'',body,''],
        ['','',body,'',body,'','',''],
        ['','',body,'',body,'','',''],
      ];
    }

    const DRAGON_SPRITES = {
      fire:   makeDragonSprite('#FF4500', '#FFD700', '#333'),
      nature: makeDragonSprite('#43A047', '#A5D6A7', '#333'),
      love:   makeDragonSprite('#E91E63', '#FFB6C1', '#333'),
    };

    // ============================================================
    // INPUT
    // ============================================================
    const keys = {};

    window.addEventListener('keydown', (e) => {
      keys[e.key] = true;
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) {
        e.preventDefault();
      }
    });

    window.addEventListener('keyup', (e) => {
      keys[e.key] = false;
    });

    function getPlayerInput(up, down, left, right) {
      let dx = 0, dy = 0;
      if (keys[up]) dy = -1;
      if (keys[down]) dy = 1;
      if (keys[left]) dx = -1;
      if (keys[right]) dx = 1;
      return { dx, dy };
    }

    // ============================================================
    // RENDERING
    // ============================================================
    function drawTile(type, col, row) {
      const x = col * TILE;
      const y = (row + UI_ROWS) * TILE;
      const color = TILE_COLORS[type];

      if (type === 'flower_r' || type === 'flower_y' || type === 'flower_p') {
        // grass background
        ctx.fillStyle = TILE_COLORS['grass'];
        ctx.fillRect(x, y, TILE, TILE);
        // small colored circle
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(x + TILE / 2, y + TILE / 2, TILE * 0.28, 0, Math.PI * 2);
        ctx.fill();
        // white center
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(x + TILE / 2, y + TILE / 2, TILE * 0.1, 0, Math.PI * 2);
        ctx.fill();
      } else if (type === 'bush') {
        // grass background
        ctx.fillStyle = TILE_COLORS['grass'];
        ctx.fillRect(x, y, TILE, TILE);
        // green circle
        ctx.fillStyle = TILE_COLORS['bush'];
        ctx.beginPath();
        ctx.arc(x + TILE / 2, y + TILE * 0.6, TILE * 0.32, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.fillStyle = color || '#000';
        ctx.fillRect(x, y, TILE, TILE);
      }
    }

    function drawZone(zone) {
      for (let row = 0; row < MAP_ROWS; row++) {
        for (let col = 0; col < COLS; col++) {
          drawTile(zone.map[row][col], col, row);
        }
      }
    }

    function drawPlayers() {
      for (const p of players) {
        drawSprite(p.sprite, p.x * TILE, (p.y + UI_ROWS) * TILE, TILE);
      }
    }

    function drawEggs() {
      for (const egg of state.eggs) {
        const bob = Math.sin(state.time * 2 + egg.bobOffset) * 3;
        const px = egg.x * TILE + 4;
        const py = (egg.y + UI_ROWS) * TILE + bob;

        // Glow effect
        const glowAlpha = 0.3 + Math.sin(state.time * 3 + egg.bobOffset) * 0.15;
        ctx.fillStyle = `rgba(255, 255, 200, ${glowAlpha})`;
        ctx.beginPath();
        ctx.arc(egg.x * TILE + TILE / 2, (egg.y + UI_ROWS) * TILE + TILE / 2 + bob, TILE / 2, 0, Math.PI * 2);
        ctx.fill();

        drawSprite(EGG_SPRITES[egg.type], px, py, TILE * 0.75);
      }
    }

    // ============================================================
    // GAME STATE
    // ============================================================
    const state = {
      screen: 'playing',
      mode: null,
      time: 0,
    };

    const players = [
      {
        name: 'Harper',
        x: 12, y: 7,
        sprite: SPRITES.harper,
        color: '#87CEEB',
        keys: { up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight' },
        moveTimer: 0,
      },
      {
        name: 'Audrey',
        x: 13, y: 7,
        sprite: SPRITES.audrey,
        color: '#9B59B6',
        keys: { up: 'w', down: 's', left: 'a', right: 'd' },
        moveTimer: 0,
      },
    ];

    state.currentZone = 'meadow';
    state.unlockedZones = ['meadow', 'heart'];
    state.collection = {};
    state.dragons = [];
    state.eggs = [];
    state.hatching = [];

    // ============================================================
    // GAME LOGIC
    // ============================================================
    const MOVE_DELAY = 0.12;

    function spawnEggsForZone(zoneKey) {
      state.eggs = [];
      const zone = ZONES[zoneKey];
      const eggTypes = zone.eggs;

      const candidates = [];
      for (let r = 2; r < MAP_ROWS - 2; r++) {
        for (let c = 2; c < COLS - 2; c++) {
          const tile = zone.map[r][c];
          if (tile === 'grass' || tile === 'grass2') {
            candidates.push({ x: c, y: r });
          }
        }
      }

      // Shuffle
      for (let i = candidates.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
      }

      const count = state.mode === 'freeplay' ? 8 : 5;
      for (let i = 0; i < Math.min(count, candidates.length); i++) {
        const type = eggTypes[Math.floor(Math.random() * eggTypes.length)];
        state.eggs.push({
          type: type,
          x: candidates[i].x,
          y: candidates[i].y,
          bobOffset: Math.random() * Math.PI * 2,
        });
      }
    }

    function checkZoneTransition() {
      for (const conn of ZONE_CONNECTIONS) {
        if (state.currentZone !== conn.from) continue;
        if (conn.unlockRequired && !state.unlockedZones.includes(conn.to)) continue;

        for (const p of players) {
          const atEdge =
            (conn.edge === 'bottom' && p.y >= MAP_ROWS - 1) ||
            (conn.edge === 'top' && p.y <= 0);

          if (atEdge) {
            const tile = ZONES[conn.from].map[p.y][p.x];
            if (tile === 'path') {
              transitionToZone(conn.to, conn.edge);
              return;
            }
          }
        }
      }
    }

    function transitionToZone(zoneKey, fromEdge) {
      state.currentZone = zoneKey;
      for (const p of players) {
        if (fromEdge === 'bottom') {
          p.y = 1;
        } else {
          p.y = MAP_ROWS - 2;
        }
      }
      spawnEggsForZone(zoneKey);
    }

    function checkEggCollection() {
      for (let i = state.eggs.length - 1; i >= 0; i--) {
        const egg = state.eggs[i];
        for (const p of players) {
          if (p.x === egg.x && p.y === egg.y) {
            state.hatching.push({
              type: egg.type,
              x: egg.x,
              y: egg.y,
              timer: 0,
              phase: 'wobble',
            });
            state.eggs.splice(i, 1);
            break;
          }
        }
      }
    }

    function updateHatching(dt) {
      for (let i = state.hatching.length - 1; i >= 0; i--) {
        const h = state.hatching[i];
        h.timer += dt;

        if (h.phase === 'wobble' && h.timer > 0.5) {
          h.phase = 'crack';
          h.timer = 0;
        } else if (h.phase === 'crack' && h.timer > 0.4) {
          h.phase = 'hatch';
          h.timer = 0;
        } else if (h.phase === 'hatch' && h.timer > 0.6) {
          state.collection[h.type] = (state.collection[h.type] || 0) + 1;

          const followPlayer = state.dragons.length % 2;
          state.dragons.push({
            type: h.type,
            followPlayer: followPlayer,
            x: players[followPlayer].x,
            y: players[followPlayer].y,
          });

          state.hatching.splice(i, 1);

          // Respawn in freeplay
          if (state.mode === 'freeplay' && state.eggs.length < 3) {
            spawnEggsForZone(state.currentZone);
          }
        }
      }
    }

    function drawHatching() {
      for (const h of state.hatching) {
        const px = h.x * TILE;
        const py = (h.y + UI_ROWS) * TILE;

        if (h.phase === 'wobble') {
          const wobble = Math.sin(h.timer * 20) * 3;
          drawSprite(EGG_SPRITES[h.type], px + 4 + wobble, py, TILE * 0.75);
        } else if (h.phase === 'crack') {
          drawSprite(EGG_SPRITES[h.type], px + 4, py, TILE * 0.75);
          ctx.strokeStyle = '#333';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(px + TILE / 2, py + 4);
          ctx.lineTo(px + TILE / 2 + 4, py + TILE / 2);
          ctx.lineTo(px + TILE / 2 - 2, py + TILE - 4);
          ctx.stroke();
        } else if (h.phase === 'hatch') {
          const sparkleCount = 6;
          for (let s = 0; s < sparkleCount; s++) {
            const angle = (s / sparkleCount) * Math.PI * 2 + h.timer * 5;
            const dist = h.timer * 30;
            const sx = px + TILE / 2 + Math.cos(angle) * dist;
            const sy = py + TILE / 2 + Math.sin(angle) * dist;
            const alpha = 1 - h.timer / 0.6;
            ctx.fillStyle = `rgba(255, 255, 100, ${alpha})`;
            ctx.fillRect(sx - 2, sy - 2, 4, 4);
          }
          const scale = h.timer / 0.6;
          drawSprite(DRAGON_SPRITES[h.type], px + 6, py + 4, TILE * 0.6 * scale);
        }
      }
    }

    function isSolid(zoneKey, col, row) {
      const zone = ZONES[zoneKey];
      if (col < 0 || col >= COLS || row < 0 || row >= MAP_ROWS) return true;
      const tile = zone.map[row][col];
      return SOLID_TILES.includes(tile);
    }

    function isOccupiedByOtherPlayer(playerIndex, col, row) {
      for (let i = 0; i < players.length; i++) {
        if (i !== playerIndex && players[i].x === col && players[i].y === row) return true;
      }
      return false;
    }

    function updatePlayers(dt) {
      for (let i = 0; i < players.length; i++) {
        const p = players[i];
        p.moveTimer -= dt;
        if (p.moveTimer > 0) continue;

        const input = getPlayerInput(p.keys.up, p.keys.down, p.keys.left, p.keys.right);
        if (input.dx === 0 && input.dy === 0) continue;

        let nx = p.x + input.dx;
        let ny = p.y + input.dy;

        if (!isSolid(state.currentZone, nx, ny) && !isOccupiedByOtherPlayer(i, nx, ny)) {
          p.x = nx;
          p.y = ny;
          p.moveTimer = MOVE_DELAY;
        } else if (input.dx !== 0 && !isSolid(state.currentZone, p.x + input.dx, p.y) && !isOccupiedByOtherPlayer(i, p.x + input.dx, p.y)) {
          p.x += input.dx;
          p.moveTimer = MOVE_DELAY;
        } else if (input.dy !== 0 && !isSolid(state.currentZone, p.x, p.y + input.dy) && !isOccupiedByOtherPlayer(i, p.x, p.y + input.dy)) {
          p.y += input.dy;
          p.moveTimer = MOVE_DELAY;
        }
      }
    }

    // ============================================================
    // CANVAS SETUP
    // ============================================================
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    // ============================================================
    // GAME LOOP
    // ============================================================
    let lastTime = 0;

    function loop(timestamp) {
      let dt = (timestamp - lastTime) / 1000;
      lastTime = timestamp;
      if (dt > 0.1) dt = 0.1;

      state.time += dt;

      // Update
      if (state.screen === 'playing') {
        updatePlayers(dt);
        checkZoneTransition();
        checkEggCollection();
        updateHatching(dt);
      }

      // Clear screen
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

      // Draw
      if (state.screen === 'playing') {
        drawZone(ZONES[state.currentZone]);
        drawPlayers();
        drawEggs();
        drawHatching();
      } else {
        // Placeholder title text
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 48px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('Dragon Egg Island', CANVAS_W / 2, CANVAS_H / 2);
      }

      requestAnimationFrame(loop);
    }

    spawnEggsForZone('meadow');
    requestAnimationFrame(loop);
  </script>
</body>
</html>
